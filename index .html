<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AR Laptop Scanner</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
        html, body { margin: 0; overflow: hidden; background: #000; width: 100%; height: 100%; }

        /* Camera error message - HTML layer, screen fixed (mokada meka
           object tracking ekata sambandha na - just a status message) */
        .status-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            z-index: 3;
            font-size: 16px;
            background: rgba(200,0,0,0.85);
            padding: 14px 22px;
            border-radius: 6px;
            display: none;
            text-align: center;
            max-width: 80%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Tap-to-start overlay - camera eka start karanna user gesture
           ekak illanna, ehema una nathnam phone browser tika (esp. iOS)
           silently camera eka block karanawa */
        #startOverlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 18px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #startBtn {
            padding: 16px 34px;
            font-size: 17px;
            font-weight: bold;
            letter-spacing: 1px;
            color: #001018;
            background: #00fff2;
            border: none;
            border-radius: 30px;
            box-shadow: 0 0 20px rgba(0,255,242,0.6);
        }

        #startOverlay p {
            color: #00fff2;
            font-size: 14px;
            opacity: 0.8;
        }

        /* Small scanning hint text - screen top, real object status
           penna, ehema una passe fade wenawa */
        .scan-hint {
            position: fixed;
            top: 20px;
            left: 0;
            width: 100%;
            text-align: center;
            color: #00fff2;
            font-size: 15px;
            font-weight: bold;
            letter-spacing: 2px;
            text-shadow: 0 0 8px rgba(0, 255, 242, 0.7);
            z-index: 3;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: opacity 0.4s ease;
        }
        /* Safety net - MindAR ekenma default widiyata add karana ovi UI
           overlay/loading classes tika force hide karanawa, uiLoading:no
           eka hariyata apply una nathnam vath meken cover wenawa */
        .mindar-ui-overlay,
        .mindar-ui-loading,
        .mindar-ui-scanning,
        .mindar-ui-error {
            display: none !important;
        }
    </style>
</head>
<body>

    <div id="startOverlay">
        <button id="startBtn">📷 START AR SCANNER</button>
        <p>Tap to allow camera access</p>
    </div>

    <div id="errorMessage" class="status-message">
        Camera access denied or not supported.<br>Please check site permissions (tap the 🔒/ⓘ icon next to the address bar → Camera → Allow) and reload.
    </div>
    <div id="scanHint" class="scan-hint" style="opacity:0;">SYSTEM: STARTING CAMERA...</div>

    <!--
      autoStart: true      -> page eka load unath passe kelinma camera
                               permission illala real-time tracking patan gannawa
      uiLoading/uiScanning/uiError: no -> MindAR default screens ain karala
      Meka pahalin thiyena ok ok entity tika, object eke child widiyata
      thiyena nisa - object eka camera eken kohomath penuna, e angle ekatama
      "attach" wela real-time-ma follow karanawa (screen-fixed HUD ekak neme)
    -->
    <a-scene
        mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiLoading: no; uiScanning: no; uiError: no;"
        color-space="sRGB"
        renderer="colorManagement: true, physicallyCorrectLights"
        vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false"
    >
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="laptopTarget" mindar-image-target="targetIndex: 0">

            <!-- NAME - object eke uda, object eka penuna gaman pipenawa -->
            <a-entity
                position="0 0.75 0"
                text="value: ASUS ExpertBook; color: #00F0FF; align: center; width: 3;"
                scale="0.001 0.001 0.001"
                animation__in="property: scale; to: 1 1 1; dur: 500; delay: 100; easing: easeOutElastic; startEvents: targetFound"
                animation__out="property: scale; to: 0.001 0.001 0.001; dur: 250; easing: easeInBack; startEvents: targetLost"
            ></a-entity>

            <!-- Glow ring - object eke uda spin wena widiyata -->
            <a-ring
                position="0 0 0.01"
                radius-inner="0.25" radius-outer="0.27"
                color="#00F0FF" rotation="-90 0 0"
                scale="0.001 0.001 0.001"
                material="shader: flat; opacity: 0.8"
                animation__in="property: scale; to: 1 1 1; dur: 500; startEvents: targetFound"
                animation__spin="property: rotation; to: -90 0 360; loop: true; dur: 6000; easing: linear; startEvents: targetFound"
                animation__out="property: scale; to: 0.001 0.001 0.001; dur: 250; startEvents: targetLost"
            ></a-ring>

            <!-- CARD 1: Processor - object eke wateta wetila, hemin bob wenawa -->
            <a-entity
                position="-0.9 2.0 0"
                scale="0.001 0.001 0.001"
                geometry="primitive: plane; width: 1.5; height: 0.35"
                material="color: #0B1E3D; opacity: 0.85; shader: flat"
                animation__scale="property: scale; to: 1 1 1; dur: 350; delay: 200; startEvents: targetFound"
                animation__fall="property: position; to: -0.9 0.35 0; dur: 900; delay: 200; easing: easeOutBounce; startEvents: targetFound"
                animation__bob="property: position; to: -0.9 0.42 0; dir: alternate; loop: true; dur: 1500; delay: 1200; easing: easeInOutSine; startEvents: targetFound"
                animation__out="property: scale; to: 0.001 0.001 0.001; dur: 250; startEvents: targetLost"
            >
                <a-text value="🧠 Core i5 · 11th Gen" color="#00FF9C" align="center" width="2" position="0 0 0.01"></a-text>
            </a-entity>

            <!-- CARD 2: RAM -->
            <a-entity
                position="0.9 2.2 0"
                scale="0.001 0.001 0.001"
                geometry="primitive: plane; width: 1.3; height: 0.35"
                material="color: #0B1E3D; opacity: 0.85; shader: flat"
                animation__scale="property: scale; to: 1 1 1; dur: 350; delay: 400; startEvents: targetFound"
                animation__fall="property: position; to: 0.9 0.55 0; dur: 1000; delay: 400; easing: easeOutBounce; startEvents: targetFound"
                animation__bob="property: position; to: 0.9 0.62 0; dir: alternate; loop: true; dur: 1700; delay: 1400; easing: easeInOutSine; startEvents: targetFound"
                animation__out="property: scale; to: 0.001 0.001 0.001; dur: 250; startEvents: targetLost"
            >
                <a-text value="💾 8GB RAM" color="#00FF9C" align="center" width="2" position="0 0 0.01"></a-text>
            </a-entity>

            <!-- CARD 3: Storage -->
            <a-entity
                position="-1.0 -1.2 0"
                scale="0.001 0.001 0.001"
                geometry="primitive: plane; width: 1.4; height: 0.35"
                material="color: #0B1E3D; opacity: 0.85; shader: flat"
                animation__scale="property: scale; to: 1 1 1; dur: 350; delay: 600; startEvents: targetFound"
                animation__fall="property: position; to: -1.0 -0.55 0; dur: 900; delay: 600; easing: easeOutBounce; startEvents: targetFound"
                animation__bob="property: position; to: -1.0 -0.48 0; dir: alternate; loop: true; dur: 1600; delay: 1600; easing: easeInOutSine; startEvents: targetFound"
                animation__out="property: scale; to: 0.001 0.001 0.001; dur: 250; startEvents: targetLost"
            >
                <a-text value="💽 512GB SSD" color="#00FF9C" align="center" width="2" position="0 0 0.01"></a-text>
            </a-entity>

            <!-- CARD 4: Display -->
            <a-entity
                position="1.0 -1.3 0"
                scale="0.001 0.001 0.001"
                geometry="primitive: plane; width: 1.5; height: 0.35"
                material="color: #0B1E3D; opacity: 0.85; shader: flat"
                animation__scale="property: scale; to: 1 1 1; dur: 350; delay: 800; startEvents: targetFound"
                animation__fall="property: position; to: 1.0 -0.65 0; dur: 950; delay: 800; easing: easeOutBounce; startEvents: targetFound"
                animation__bob="property: position; to: 1.0 -0.58 0; dir: alternate; loop: true; dur: 1800; delay: 1800; easing: easeInOutSine; startEvents: targetFound"
                animation__out="property: scale; to: 0.001 0.001 0.001; dur: 250; startEvents: targetLost"
            >
                <a-text value="🖥️ 14&quot; FHD Display" color="#00FF9C" align="center" width="2" position="0 0 0.01"></a-text>
            </a-entity>

            <!-- CARD 5: Battery -->
            <a-entity
                position="0 -1.9 0"
                scale="0.001 0.001 0.001"
                geometry="primitive: plane; width: 1.4; height: 0.35"
                material="color: #0B1E3D; opacity: 0.85; shader: flat"
                animation__scale="property: scale; to: 1 1 1; dur: 350; delay: 1000; startEvents: targetFound"
                animation__fall="property: position; to: 0 -1.15 0; dur: 1050; delay: 1000; easing: easeOutBounce; startEvents: targetFound"
                animation__bob="property: position; to: 0 -1.08 0; dir: alternate; loop: true; dur: 1600; delay: 2000; easing: easeInOutSine; startEvents: targetFound"
                animation__out="property: scale; to: 0.001 0.001 0.001; dur: 250; startEvents: targetLost"
            >
                <a-text value="🔋 42Wh Battery" color="#00FF9C" align="center" width="2" position="0 0 0.01"></a-text>
            </a-entity>

        </a-entity>
    </a-scene>

    <script>
        const scanHint     = document.getElementById('scanHint');
        const errorMsg     = document.getElementById('errorMessage');
        const sceneEl      = document.querySelector('a-scene');
        const targetEl     = document.getElementById('laptopTarget');
        const startOverlay = document.getElementById('startOverlay');
        const startBtn     = document.getElementById('startBtn');

        sceneEl.addEventListener('arReady', () => {
            scanHint.innerText = "SYSTEM: SCANNING FOR LAPTOP TARGET...";
        });

        sceneEl.addEventListener('arError', () => {
            scanHint.innerText = "SYSTEM: CAMERA ERROR";
            errorMsg.style.display = "block";
            startOverlay.style.display = "flex";
        });

        // Camera eka start karanne user tap ekakin - meken tamai
        // mobile browser tika (Safari/Chrome) permission dialog eka
        // hariyata pennanne, ehema nathnam silently block wenawa
        startBtn.addEventListener('click', async () => {
            startBtn.innerText = "STARTING...";
            errorMsg.style.display = "none";

            // STEP 1: Explicit-ma camera permission ekak illanawa.
            // Meken confirm karanne native permission dialog eka
            // hariyata pennanawada kiyala, ehema nathnam exact error eka
            // (denied / no camera / not https) screen ekema pennanawa.
            //
            // Timeout ekakuth dala thiyenne - WhatsApp/FB/Instagram wage
            // "in-app browser" ekakin link eka open kalahama camera API eka
            // silently hang wenawa (permission ekak illanne ne, error ekakuth
            // dෙන්නෙ ne) - eeka detect karanna.
            const withTimeout = (promise, ms) => Promise.race([
                promise,
                new Promise((_, reject) => setTimeout(() => reject({ name: "TimeoutError" }), ms))
            ]);

            try {
                const testStream = await withTimeout(
                    navigator.mediaDevices.getUserMedia({
                        video: { facingMode: "environment" },
                        audio: false
                    }),
                    8000
                );
                // Test ekata witharak illagaththa stream eka release karanawa,
                // mokada MindAR eke stream eka aye illanawa
                testStream.getTracks().forEach(track => track.stop());
            } catch (err) {
                console.error("getUserMedia error:", err.name, err.message);
                let msg = "Camera access failed: " + err.name + ".";
                if (err.name === "TimeoutError") {
                    msg = "No response from camera after 8s. This usually means the page was opened inside an in-app browser (WhatsApp / Facebook / Instagram / Messenger link preview). Tap the ⋮ or share icon and choose 'Open in Chrome' / 'Open in Safari', then try again.";
                } else if (err.name === "NotAllowedError") {
                    msg = "Camera permission denied. Tap the 🔒/ⓘ icon next to the address bar → Site settings → Camera → Allow, then reload.";
                } else if (err.name === "NotFoundError") {
                    msg = "No camera found on this device.";
                } else if (err.name === "NotReadableError") {
                    msg = "Camera is already in use by another app. Close other camera apps and reload.";
                } else if (location.protocol !== "https:") {
                    msg = "This page must be opened over HTTPS for camera access to work.";
                }
                errorMsg.innerHTML = msg;
                errorMsg.style.display = "block";
                startBtn.innerText = "📷 START AR SCANNER";
                return;
            }

            // STEP 2: Permission ok nam, MindAR eke tracking system eka start karanawa
            try {
                if (sceneEl.hasLoaded) {
                    await withTimeout(sceneEl.systems["mindar-image-system"].start(), 8000);
                } else {
                    await new Promise(resolve => sceneEl.addEventListener('loaded', resolve, { once: true }));
                    await withTimeout(sceneEl.systems["mindar-image-system"].start(), 8000);
                }
                startOverlay.style.display = "none";
                scanHint.style.opacity = "1";
                scanHint.innerText = "SYSTEM: STARTING CAMERA...";
            } catch (err) {
                console.error("MindAR start error:", err);
                errorMsg.innerText = err.name === "TimeoutError"
                    ? "AR tracking system did not start within 8s. The .mind target file may have failed to load (check it's uploaded alongside index.html) or the library failed to initialize."
                    : "AR tracking failed to start: " + (err.message || err.name);
                errorMsg.style.display = "block";
                startBtn.innerText = "📷 START AR SCANNER";
            }
        });

        // Real-time: object eka hamba unahama specs "watenawa",
        // camera eka move karaddi object ekathamai eka follow wenawa
        targetEl.addEventListener('targetFound', () => {
            scanHint.style.opacity = "0";
        });

        targetEl.addEventListener('targetLost', () => {
            scanHint.innerText = "SYSTEM: SCANNING FOR LAPTOP TARGET...";
            scanHint.style.opacity = "1";
        });
    </script>
</body>
</html>
