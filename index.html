<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>3D Spatial Laptop Spec Scanner</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <style>
        html, body { margin: 0; overflow: hidden; background: #000; width: 100%; height: 100%; }
        .mindar-ui-overlay { display: none !important; }
        
        /* Modern Premium Interactive Overlay to kickstart camera permission cleanly */
        #start-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #0c1a30 0%, #020813 100%);
            z-index: 9999; display: flex; flex-direction: column;
            justify-content: center; align-items: center; font-family: sans-serif;
        }
        .scan-btn {
            background: linear-gradient(45deg, #00f0ff, #00ff9c);
            border: none; color: #020813; padding: 16px 45px; font-size: 18px;
            font-weight: bold; border-radius: 35px; cursor: pointer; letter-spacing: 1px;
            box-shadow: 0 0 25px rgba(0, 240, 255, 0.4); transition: 0.2s;
        }
        .scan-btn:hover { transform: scale(1.05); box-shadow: 0 0 35px rgba(0, 255, 156, 0.7); }
        #status-txt { color: #00f0ff; margin-top: 22px; font-size: 13px; letter-spacing: 2px; }
        
        /* Live View HUD Scanning Guide */
        #scan-hint {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
            color: #00ff9c; background: rgba(2, 8, 19, 0.9); padding: 12px 25px;
            border-radius: 20px; font-size: 13px; font-family: sans-serif; z-index: 99;
            border: 1px solid #00ff9c; pointer-events: none; opacity: 0; transition: opacity 0.4s;
        }
    </style>
</head>
<body>

    <div id="start-overlay">
        <button class="scan-btn" id="activate-btn">START AR SCANNER</button>
        <div id="status-txt">TAP TO INITIALIZE SECURE CAMERA LAYER</div>
    </div>

    <div id="scan-hint">POINT CAMERA AT LAPTOP TARGET IMAGE</div>

    <a-scene
        id="main-scene"
        mindar-image="imageTargetSrc: targets.mind; autoStart: false; uiLoading: no; uiScanning: no; uiError: no;"
        color-space="sRGB"
        renderer="colorManagement: true; antialias: false; precision: mediump;"
        vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false"
    >
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="laptop-anchor" mindar-image-target="targetIndex: 0">
            
            <a-entity id="spatial-cards" scale="0.001 0.001 0.001"
                      animation__in="property: scale; to: 1 1 1; dur: 550; easing: easeOutBack; startEvents: animateFound"
                      animation__out="property: scale; to: 0.001 0.001 0.001; dur: 150; easing: linear; startEvents: animateLost">

                <a-ring color="#00f0ff" radius-inner="0.75" radius-outer="0.8" rotation="-90 0 0" position="0 -0.25 0" opacity="0.6" shader="flat"></a-ring>
                
                <a-entity position="0 0.85 -0.1" text="value: ASUS EXPERTBOOK; color: #00f0ff; align: center; width: 4.6; font: kelsonsans; bold: true"></a-entity>

                <a-entity position="-0.95 0.35 0.3" rotation="0 35 0">
                    <a-plane width="1.35" height="0.32" color="#030b18" opacity="0.9" shader="flat">
                        <a-text value="Intel Core i5\n11th Gen Processor" color="#00ff9c" align="center" width="2.3" position="0 0 0.01"></a-text>
                    </a-plane>
                </a-entity>

                <a-entity position="0.95 0.35 0.3" rotation="0 -35 0">
                    <a-plane width="1.2" height="0.32" color="#030b18" opacity="0.9" shader="flat">
                        <a-text value="8GB DDR4 RAM\nHigh-Speed Memory" color="#00ff9c" align="center" width="2.3" position="0 0 0.01"></a-text>
                    </a-plane>
                </a-entity>

                <a-entity position="-1.1 0.15 -0.4" rotation="0 65 0">
                    <a-plane width="1.25" height="0.32" color="#030b18" opacity="0.9" shader="flat">
                        <a-text value="512GB M.2 NVMe\nUltra-Fast SSD" color="#00f0ff" align="center" width="2.3" position="0 0 0.01"></a-text>
                    </a-plane>
                </a-entity>

                <a-entity position="1.1 0.15 -0.4" rotation="0 -68 0">
                    <a-plane width="1.35" height="0.32" color="#030b18" opacity="0.9" shader="flat">
                        <a-text value="14 FHD Display\nAnti-Glare Screen" color="#00f0ff" align="center" width="2.3" position="0 0 0.01"></a-text>
                    </a-plane>
                </a-entity>

                <a-entity position="0 1.25 -0.15" rotation="10 0 0">
                    <a-plane width="1.25" height="0.32" color="#030b18" opacity="0.9" shader="flat">
                        <a-text value="42Wh Battery\nLong-Life Runtime" color="#00ff9c" align="center" width="2.3" position="0 0 0.01"></a-text>
                    </a-plane>
                </a-entity>

            </a-entity>
        </a-entity>
    </a-scene>

    <script>
        const sceneEl = document.querySelector('#main-scene');
        const activateBtn = document.querySelector('#activate-btn');
        const overlay = document.querySelector('#start-overlay');
        const statusTxt = document.querySelector('#status-txt');
        const anchorEl = document.querySelector('#laptop-anchor');
        const cardsContainer = document.querySelector('#spatial-cards');
        const scanHint = document.querySelector('#scan-hint');

        // Handles secure programmatic camera injection upon explicit button click
        activateBtn.addEventListener('click', async () => {
            statusTxt.innerText = "OPENING SECURE CAMERA FEED...";
            try {
                if (sceneEl.hasLoaded) {
                    await sceneEl.systems["mindar-image-system"].start();
                } else {
                    sceneEl.addEventListener('loaded', async () => {
                        await sceneEl.systems["mindar-image-system"].start();
                    });
                }
                overlay.style.display = 'none'; // Unveils the camera view completely
                scanHint.style.opacity = "1";
            } catch (err) {
                console.error("Camera engine initialization crashed:", err);
                statusTxt.innerText = "ERROR: PERMISSION DENIED OR DEVICE INCOMPATIBLE.";
            }
        });

        // Trigger animations when the camera registers the laptop image descriptors
        anchorEl.addEventListener('targetFound', () => {
            cardsContainer.emit('animateFound');
            scanHint.style.opacity = "0"; // Clears HUD overlay text when tracking
        });

        // Instantly scale down and hide cards the moment laptop goes out of frame
        anchorEl.addEventListener('targetLost', () => {
            cardsContainer.emit('animateLost');
            scanHint.style.opacity = "1"; // Re-display scanner guide prompt
        });
    </script>
</body>
</html>
