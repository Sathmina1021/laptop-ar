<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Bajaj Pulsar NS400 AR Scanner</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <style>
        :root{
            --brand-amber:#ffb100;
            --brand-orange:#ff6a00;
            --brand-dark:#150800;
        }
        html, body { margin: 0; overflow: hidden; width: 100%; height: 100%; background-color: transparent;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
        a-scene { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        .mindar-ui-overlay { display: none !important; }

        /* START SCREEN OVERLAY */
        #start-overlay {
            position: fixed; inset: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 40%, #241205 0%, #0a0402 70%, #030201 100%);
            z-index: 9999; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            padding: 24px; box-sizing: border-box;
            transition: opacity 0.5s ease;
        }
        .brand-mark{ display:flex; align-items:center; gap: clamp(8px,2vw,14px); margin-bottom: clamp(18px, 4vh, 34px); }
        .gear-icon{ width: clamp(38px,7vw,56px); height: clamp(38px,7vw,56px); animation: spinGear 3.2s linear infinite; filter: drop-shadow(0 0 8px rgba(255,177,0,0.55)); }
        @keyframes spinGear{ from{transform:rotate(0)} to{transform:rotate(360deg)} }
        .brand-title{ color: var(--brand-amber); font-size: clamp(15px, 3vw, 20px); letter-spacing: 3px; font-weight: 700; }
        .brand-title span{ color: var(--brand-orange); }
        .scan-ring-wrap{ position: relative; width: clamp(150px, 32vw, 230px); height: clamp(150px, 32vw, 230px); display:flex; align-items:center; justify-content:center; margin-bottom: clamp(20px, 4vh, 32px); }
        .scan-ring-wrap svg{ position:absolute; inset:0; width:100%; height:100%; }
        .scan-ring-bg{ fill:none; stroke: rgba(255,177,0,0.12); stroke-width: 4; }
        .scan-ring-fg{ fill:none; stroke: url(#ringGrad); stroke-width: 4; stroke-linecap: round; stroke-dasharray: 500; stroke-dashoffset: 500; animation: ringSweep 2.6s ease-in-out infinite; }
        @keyframes ringSweep{ 0%{ stroke-dashoffset: 500; } 50%{ stroke-dashoffset: 90; } 100%{ stroke-dashoffset: 500; } }
        .scan-bike-emoji{ font-size: clamp(38px, 8vw, 60px); animation: floatBike 2.2s ease-in-out infinite; }
        @keyframes floatBike{ 0%,100%{ transform: translateY(0); } 50%{ transform: translateY(-8px); } }
        .scan-btn { background: linear-gradient(45deg, #ff3d1a, #ffb100); border: none; color: #150800; padding: clamp(13px,2.6vh,17px) clamp(32px,8vw,50px); font-size: clamp(14px, 2.4vw, 18px); font-weight: bold; border-radius: 40px; cursor: pointer; letter-spacing: 1.5px; box-shadow: 0 0 25px rgba(255, 61, 26, 0.45); transition: 0.2s; animation: pulseBtn 1.8s ease-in-out infinite; max-width: 90vw; }
        @keyframes pulseBtn { 0%, 100% { box-shadow: 0 0 25px rgba(255, 61, 26, 0.45); transform: scale(1); } 50% { box-shadow: 0 0 40px rgba(255, 177, 0, 0.65); transform: scale(1.03); } }
        #status-txt { color: #ffb100; margin-top: clamp(16px,3vh,22px); font-size: clamp(11px, 2vw, 13px); letter-spacing: 2px; text-align: center; min-height: 18px; }
        #status-sub{ color: rgba(255,177,0,0.55); margin-top: 8px; font-size: clamp(10px, 1.6vw, 12px); letter-spacing: 1px; text-align:center; max-width: 320px; }
        #boot-progress{ width: min(260px, 70vw); height: 4px; border-radius: 4px; background: rgba(255,177,0,0.15); overflow: hidden; margin-top: 18px; display: none; }
        #boot-progress-fill{ width: 0%; height: 100%; border-radius: 4px; background: linear-gradient(90deg, #ff6a00, #ffb100); transition: width 0.25s ease; }

        /* SCAN HINT */
        #scan-hint { position: fixed; bottom: max(24px, env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%); color: #ffb100; background: rgba(21, 8, 0, 0.85); padding: clamp(9px,1.6vh,13px) clamp(16px,4vw,26px); border-radius: 20px; font-size: clamp(11px,1.8vw,13px); z-index: 99; border: 1px solid #ffb100; pointer-events: none; opacity: 0; transition: opacity 0.4s; text-align: center; width: 75%; max-width: 300px; animation: hintFloat 2.4s ease-in-out infinite; }
        @keyframes hintFloat { 0%, 100% { transform: translateX(-50%) translateY(0); } 50% { transform: translateX(-50%) translateY(-6px); } }
    </style>
</head>
<body>

    <div id="start-overlay">
        <div class="brand-mark">
            <svg class="gear-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 8a4 4 0 100 8 4 4 0 000-8z" stroke="#ffb100" stroke-width="1.6"/>
                <path d="M12 2.5v2.2M12 19.3v2.2M21.5 12h-2.2M4.7 12H2.5M18.4 5.6l-1.55 1.55M7.15 16.85L5.6 18.4M18.4 18.4l-1.55-1.55M7.15 7.15L5.6 5.6" stroke="#ff6a00" stroke-width="1.6" stroke-linecap="round"/>
            </svg>
            <div class="brand-title">BAJAJ <span>AR SCANNER</span></div>
        </div>
        <div class="scan-ring-wrap">
            <svg viewBox="0 0 100 100">
                <defs>
                    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#ff3d1a"/>
                        <stop offset="100%" stop-color="#ffb100"/>
                    </linearGradient>
                </defs>
                <circle class="scan-ring-bg" cx="50" cy="50" r="44"/>
                <circle class="scan-ring-fg" cx="50" cy="50" r="44" pathLength="500"/>
            </svg>
            <div class="scan-bike-emoji">🏍️</div>
        </div>
        <button class="scan-btn" id="activate-btn">START BIKE SCANNER</button>
        <div id="status-txt">TAP TO ACTIVATE BIKE AR SCANNER</div>
        <div id="status-sub">Point your camera at the bike once the scanner is live</div>
        <div id="boot-progress"><div id="boot-progress-fill"></div></div>
    </div>

    <div id="scan-hint">POINT CAMERA AT THE BIKE TO SCAN</div>

    <a-scene
        id="main-scene"
        embedded
        mindar-image="imageTargetSrc: targets.mind; autoStart: false; uiLoading: no; uiScanning: no; uiError: no; filterMinCF: 0.0003; filterBeta: 0.06;"
        color-space="sRGB"
        renderer="colorManagement: true; antialias: true; alpha: true; precision: mediump;"
        vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false"
    >
        <a-assets>
            </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="bike-anchor" mindar-image-target="targetIndex: 0">
            
            <a-entity id="spatial-cards" scale="0.001 0.001 0.001"
                      animation__scale="property: scale; to: 0.55 0.55 0.55; dur: 1000; easing: easeOutElastic; startEvents: animateFound"
                      animation__out="property: scale; to: 0.001 0.001 0.001; dur: 300; easing: linear; startEvents: animateLost"
                      animation__rotate="property: rotation; to: 0 360 0; loop: true; dur: 25000; easing: linear; startEvents: animateFound">

                <a-ring color="#ff6a00" radius-inner="1.4" radius-outer="1.45" rotation="-90 0 0" position="0 -0.5 0" opacity="0.6" shader="flat"
                        animation="property: rotation; to: -90 0 360; loop: true; dur: 8000; easing: linear"></a-ring>
                <a-ring color="#ffb100" radius-inner="1.52" radius-outer="1.55" rotation="-90 0 0" position="0 -0.5 0" opacity="0.4" shader="flat"
                        animation="property: rotation; to: -90 0 -360; loop: true; dur: 12000; easing: linear"></a-ring>

                <a-entity id="title-float" position="0 1.6 0" rotation="0 0 0">
                    <a-plane width="2.4" height="0.5" color="#150800" opacity="0.9" shader="flat"></a-plane>
                    <a-plane width="2.4" height="0.02" color="#ffb100" position="0 0.25 0.01" shader="flat"></a-plane>
                    <a-plane width="2.4" height="0.02" color="#ff6a00" position="0 -0.25 0.01" shader="flat"></a-plane>
                    <a-text value="BAJAJ PULSAR NS400" color="#ffb100" align="center" width="4.0" position="0 0.08 0.02" font="kelsonsans"></a-text>
                    <a-text value="STREET NAKED . ADVENTURE SPORT" color="#ff6a00" align="center" width="2.0" position="0 -0.12 0.02"></a-text>
                </a-entity>

                <a-entity position="1.6 0.3 0" rotation="0 90 0" class="spec-card">
                    <a-plane width="1.4" height="0.5" color="#1a0e05" opacity="0.95" shader="flat" class="card-base" scale="1 0.001 1">
                        <a-plane width="1.4" height="0.04" color="#ffb100" position="0 0.23 0.01" shader="flat"></a-plane>
                        <a-text value="ENGINE" color="#150800" bgcolor="#ffb100" align="center" width="1.8" position="0 0.23 0.02"></a-text>
                        <a-text value="373.27cc Liquid-Cooled\n40 HP . 35 Nm\n6-Speed Gearbox" color="#ffb100" align="center" width="1.8" position="0 -0.05 0.02"></a-text>
                    </a-plane>
                </a-entity>

                <a-entity position="0.8 0.3 -1.4" rotation="0 30 0" class="spec-card">
                    <a-plane width="1.4" height="0.5" color="#1a0e05" opacity="0.95" shader="flat" class="card-base" scale="1 0.001 1">
                        <a-plane width="1.4" height="0.04" color="#ff6a00" position="0 0.23 0.01" shader="flat"></a-plane>
                        <a-text value="CHASSIS" color="#150800" bgcolor="#ff6a00" align="center" width="1.8" position="0 0.23 0.02"></a-text>
                        <a-text value="Dual Channel ABS + TC\n320mm F . 230mm R Disc\n110/70-17 . 140/70-17" color="#ff6a00" align="center" width="1.8" position="0 -0.05 0.02"></a-text>
                    </a-plane>
                </a-entity>

                <a-entity position="-0.8 0.3 -1.4" rotation="0 -30 0" class="spec-card">
                    <a-plane width="1.4" height="0.5" color="#1a0e05" opacity="0.95" shader="flat" class="card-base" scale="1 0.001 1">
                        <a-plane width="1.4" height="0.04" color="#ffb100" position="0 0.23 0.01" shader="flat"></a-plane>
                        <a-text value="DIMENSIONS" color="#150800" bgcolor="#ffb100" align="center" width="1.8" position="0 0.23 0.02"></a-text>
                        <a-text value="Wheelbase 1344mm\nGround Clear. 168mm\nSeat Height 807mm" color="#ffb100" align="center" width="1.8" position="0 -0.05 0.02"></a-text>
                    </a-plane>
                </a-entity>

                <a-entity position="-1.6 0.3 0" rotation="0 -90 0" class="spec-card">
                    <a-plane width="1.4" height="0.5" color="#1a0e05" opacity="0.95" shader="flat" class="card-base" scale="1 0.001 1">
                        <a-plane width="1.4" height="0.04" color="#ff6a00" position="0 0.23 0.01" shader="flat"></a-plane>
                        <a-text value="PERFORMANCE" color="#150800" bgcolor="#ff6a00" align="center" width="1.8" position="0 0.23 0.02"></a-text>
                        <a-text value="12L Fuel Tank\nTop Speed 170 km/h" color="#ff6a00" align="center" width="1.8" position="0 -0.05 0.02"></a-text>
                    </a-plane>
                </a-entity>

                <a-entity position="-0.8 0.3 1.4" rotation="0 -150 0" class="spec-card">
                    <a-plane width="1.4" height="0.5" color="#1a0e05" opacity="0.95" shader="flat" class="card-base" scale="1 0.001 1">
                        <a-plane width="1.4" height="0.04" color="#ffb100" position="0 0.23 0.01" shader="flat"></a-plane>
                        <a-text value="ELECTRONICS" color="#150800" bgcolor="#ffb100" align="center" width="1.8" position="0 0.23 0.02"></a-text>
                        <a-text value="Full LCD Console\nFull-LED Lighting" color="#ffb100" align="center" width="1.8" position="0 -0.05 0.02"></a-text>
                    </a-plane>
                </a-entity>

                <a-entity position="0.8 0.3 1.4" rotation="0 150 0" class="spec-card">
                    <a-plane width="1.4" height="0.5" color="#1a0e05" opacity="0.95" shader="flat" class="card-base" scale="1 0.001 1">
                        <a-plane width="1.4" height="0.04" color="#ff6a00" position="0 0.23 0.01" shader="flat"></a-plane>
                        <a-text value="WEIGHT" color="#150800" bgcolor="#ff6a00" align="center" width="1.8" position="0 0.23 0.02"></a-text>
                        <a-text value="Kerb Weight 174 kg" color="#ff6a00" align="center" width="1.8" position="0 -0.05 0.02"></a-text>
                    </a-plane>
                </a-entity>

            </a-entity>
        </a-entity>
    </a-scene>

    <script>
        const sceneEl = document.querySelector('#main-scene');
        const activateBtn = document.querySelector('#activate-btn');
        const overlay = document.querySelector('#start-overlay');
        const statusTxt = document.querySelector('#status-txt');
        const statusSub = document.querySelector('#status-sub');
        const anchorEl = document.querySelector('#bike-anchor');
        const cardsContainer = document.querySelector('#spatial-cards');
        const scanHint = document.querySelector('#scan-hint');
        const bootProgress = document.querySelector('#boot-progress');
        const bootFill = document.querySelector('#boot-progress-fill');

        const bootMessages = [
            "INITIALIZING BIKE SCAN CORE...",
            "CALIBRATING OPTICS...",
            "WARMING UP AR ENGINE...",
            "LOCKING FRAME REFERENCE..."
        ];

        activateBtn.addEventListener('click', async () => {
            activateBtn.style.display = 'none';
            statusSub.style.display = 'none';
            bootProgress.style.display = 'block';

            let msgIndex = 0;
            statusTxt.innerText = bootMessages[0];
            const msgInterval = setInterval(() => {
                msgIndex = (msgIndex + 1) % bootMessages.length;
                statusTxt.innerText = bootMessages[msgIndex];
            }, 700);

            let pct = 0;
            const fillInterval = setInterval(() => {
                pct = Math.min(pct + Math.random() * 18, 92);
                bootFill.style.width = pct + '%';
            }, 220);

            try {
                if (sceneEl.hasLoaded) {
                    await sceneEl.systems["mindar-image-system"].start();
                } else {
                    await new Promise(resolve => sceneEl.addEventListener('loaded', resolve, { once: true }));
                    await sceneEl.systems["mindar-image-system"].start();
                }
                clearInterval(msgInterval);
                clearInterval(fillInterval);
                bootFill.style.width = '100%';
                setTimeout(() => {
                    overlay.style.opacity = '0';
                    setTimeout(() => { overlay.style.display = 'none'; }, 500);
                    scanHint.style.opacity = "1";
                }, 250);
            } catch (err) {
                console.error(err);
                clearInterval(msgInterval);
                clearInterval(fillInterval);
                statusTxt.innerText = "ERROR: CAMERA ACCESS DENIED.";
                bootProgress.style.display = 'none';
                activateBtn.style.display = 'inline-block';
                activateBtn.innerText = "RETRY SCANNER";
                statusSub.style.display = 'block';
                statusSub.innerText = "Please allow camera permission and try again";
            }
        });

        // බයික් එක Scan වුණ සැනින් ක්‍රියාත්මක වන කොටස (Target Found)
        anchorEl.addEventListener('targetFound', () => {
            cardsContainer.emit('animateFound');
            scanHint.style.opacity = "0";

            // එකින් එක (Staggered) කාඩ්පත් මතු වන ඇනිමේෂන් ස්ක්‍රිප්ට් එක
            const cards = document.querySelectorAll('.card-base');
            cards.forEach((card, index) => {
                // මුලින්ම Scale එක බිංදු කරලා තියාගන්නවා
                card.setAttribute('animation', {
                    property: 'scale',
                    from: '1 0.001 1',
                    to: '1 1 1',
                    dur: 800,
                    delay: index * 350, // තත්පර 0.35 ක Gap එකකින් එකින් එක මතු වේ (360效果)
                    easing: 'easeOutElastic'
                });
            });
        });

        // කැමරාවෙන් බයික් එක මඟහැරුණු විට (Target Lost)
        anchorEl.addEventListener('targetLost', () => {
            cardsContainer.emit('animateLost');
            scanHint.style.opacity = "1";

            const cards = document.querySelectorAll('.card-base');
            cards.forEach((card) => {
                card.removeAttribute('animation');
                card.setAttribute('scale', '1 0.001 1'); // නැවත නොපෙනෙන තත්ත්වයට පත් කිරීම
            });
        });
    </script>
</body>
</html>
