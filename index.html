<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>XQOM AR - Realistic Vehicle HUD</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  /* ============ GLOBAL RESET & FONTS ============ */
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
  html, body { 
    width: 100%; height: 100%; overflow: hidden; background: #000; 
    font-family: 'Rajdhani', sans-serif; color: #fff; 
  }

  /* GLOBAL AR CAMERA OVERLAY (CRT/Scanlines for Realism) */
  body::after {
    content: "";
    position: fixed; inset: 0; z-index: 999; pointer-events: none;
    background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%), 
                linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
    background-size: 100% 3px, 3px 100%;
    box-shadow: inset 0 0 100px rgba(0,0,0,0.9); /* Vignette */
    mix-blend-mode: overlay;
  }

  /* ============ LIVE CAMERA / BACKGROUND ============ */
  #camera-feed {
    position: fixed; inset: 0; width: 100%; height: 100%;
    object-fit: cover; z-index: 1; background: #050a0f;
    filter: contrast(1.1) brightness(0.85) saturate(1.2);
  }

  /* ============ SPLASH SCREEN ============ */
  #splash {
    position: fixed; inset: 0; z-index: 100;
    background: radial-gradient(circle at 50% 50%, rgba(4, 12, 24, 0.8) 0%, rgba(0, 0, 0, 1) 100%);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; padding: 24px; cursor: pointer;
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  }
  
  /* Cyber Grid on Splash */
  #splash::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(transparent 95%, rgba(0, 240, 255, 0.05) 100%),
                linear-gradient(90deg, transparent 95%, rgba(0, 240, 255, 0.05) 100%);
    background-size: 40px 40px; pointer-events: none;
    mask-image: radial-gradient(ellipse at center, black 20%, transparent 80%);
    -webkit-mask-image: radial-gradient(ellipse at center, black 20%, transparent 80%);
  }

  #splash .logo { 
    font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 42px; letter-spacing: 8px; 
    color: transparent; -webkit-text-stroke: 1.5px #ff2d55;
    text-shadow: 0 0 15px rgba(255,45,85,0.5); position: relative; z-index: 2;
  }
  #splash .logo span { 
    color: #00f0ff; -webkit-text-stroke: 0; 
    text-shadow: 0 0 20px rgba(0,240,255,0.8), 0 0 40px rgba(0,240,255,0.4); 
  }
  #splash .tagline { 
    margin-top: 15px; font-size: 13px; font-weight: 600; letter-spacing: 6px; 
    color: #94a3b8; text-transform: uppercase; z-index: 2;
  }

  /* High-Tech Pulse Button */
  #start-btn {
    margin-top: 60px; width: 100px; height: 100px; border-radius: 50%;
    border: 1px solid rgba(255,45,85,0.4); 
    background: rgba(255, 45, 85, 0.05);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 30px rgba(255,45,85,0.3), inset 0 0 20px rgba(255,45,85,0.2);
    position: relative; z-index: 2;
    transition: all 0.3s ease;
  }
  #start-btn::before {
    content: ''; position: absolute; inset: -10px; border-radius: 50%;
    border: 2px dashed rgba(0,240,255,0.6);
    animation: spinRotate 12s linear infinite;
  }
  #start-btn::after {
    content: ''; position: absolute; inset: -2px; border-radius: 50%;
    border: 2px solid transparent; border-top-color: #ff2d55; border-bottom-color: #ff2d55;
    animation: spinRotate 4s linear infinite reverse;
  }
  #start-btn svg { 
    width: 40px; height: 40px; 
    filter: drop-shadow(0 0 8px #ff2d55);
    animation: pulseIcon 2s infinite alternate;
  }
  
  @keyframes spinRotate { 100% { transform: rotate(360deg); } }
  @keyframes pulseIcon { 0% { transform: scale(0.9); opacity: 0.8; } 100% { transform: scale(1.1); opacity: 1; } }

  #splash .hint { 
    margin-top: 40px; font-family: 'Orbitron', sans-serif; font-size: 10px; font-weight: 700;
    letter-spacing: 4px; color: #00f0ff; text-shadow: 0 0 10px rgba(0,240,255,0.8); 
    animation: blinkOpacity 1.5s infinite; z-index: 2;
  }
  @keyframes blinkOpacity { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

  /* ============ ADVANCED LOADING SCREEN ============ */
  #loading { 
    position: fixed; inset: 0; z-index: 90; background: #02050a; 
    display: none; flex-direction: column; align-items: center; justify-content: center; 
  }
  #loading.show { display: flex; }
  
  .spinner { position: relative; width: 120px; height: 120px; display: flex; align-items: center; justify-content: center; }
  
  /* Conic Radar Sweep */
  .spinner::before {
    content: ''; position: absolute; inset: 0; border-radius: 50%;
    background: conic-gradient(from 0deg, transparent 70%, rgba(0, 240, 255, 0.8) 100%);
    animation: spinRotate 1.2s linear infinite;
    mask-image: radial-gradient(transparent 55%, black 56%);
    -webkit-mask-image: radial-gradient(transparent 55%, black 56%);
  }
  
  .spinner .ring { 
    position: absolute; inset: 15px; border-radius: 50%; 
    border: 1px solid rgba(255,45,85,0.2); border-top-color: #ff2d55; 
    box-shadow: 0 0 15px rgba(255,45,85,0.5);
    animation: spinRotate 2s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite; 
  }
  .spinner .ring.r2 { 
    inset: 30px; border-color: rgba(0,240,255,0.1); border-bottom-color: #00f0ff; border-left-color: #00f0ff; 
    box-shadow: 0 0 10px rgba(0,240,255,0.5);
    animation-duration: 1.5s; animation-direction: reverse; 
  }
  
  /* Core glowing dot */
  .spinner::after {
    content: ''; position: absolute; width: 8px; height: 8px; border-radius: 50%;
    background: #fff; box-shadow: 0 0 20px 5px #00f0ff;
    animation: pulseIcon 1s infinite alternate;
  }

  #loading .txt { 
    margin-top: 40px; font-family: 'Orbitron', sans-serif; font-size: 12px; font-weight: 700;
    letter-spacing: 5px; color: #00f0ff; text-shadow: 0 0 12px rgba(0,240,255,0.6); 
  }

  /* ============ HEADER ============ */
  #header {
    position: fixed; top: 0; left: 0; width: 100%; z-index: 20; pointer-events: none;
    padding: 25px 20px 40px; text-align: center;
    background: linear-gradient(180deg, rgba(0,4,10,0.95) 0%, rgba(0,4,10,0.6) 50%, transparent 100%);
    opacity: 0; transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1);
  }
  #header.show { opacity: 1; }
  #header .h1 { 
    font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 26px; letter-spacing: 6px; 
    color: #fff; text-shadow: 0 0 15px rgba(255,45,85,0.9), 0 0 30px rgba(255,45,85,0.4); 
  }
  #header .h2 { 
    margin-top: 6px; font-family: 'Orbitron', sans-serif; font-size: 9px; font-weight: 700;
    letter-spacing: 5px; color: #00f0ff; text-shadow: 0 0 8px rgba(0,240,255,0.8); 
  }

  /* ============ MILITARY-GRADE SCAN RETICLE ============ */
  #reticle {
    position: fixed; left: 50%; top: 48%; width: 60vw; max-width: 320px; aspect-ratio: 1.4/1;
    transform: translate(-50%, -50%); z-index: 10; pointer-events: none;
    opacity: 0; transition: opacity 0.6s ease;
  }
  #reticle.show { opacity: 1; }
  
  /* Center Crosshairs */
  #reticle::before, #reticle::after {
    content: ''; position: absolute; background: rgba(0,240,255,0.4);
    top: 50%; left: 50%; transform: translate(-50%, -50%);
  }
  #reticle::before { width: 40px; height: 1px; }
  #reticle::after { width: 1px; height: 40px; }

  #reticle .chip {
    position: absolute; top: -40px; left: 50%; transform: translateX(-50%);
    display: flex; align-items: center; gap: 8px; padding: 6px 16px;
    background: rgba(2, 8, 16, 0.85); border: 1px solid rgba(0,240,255,0.3); border-radius: 4px;
    font-family: 'Orbitron', sans-serif; font-size: 9px; font-weight: 700; letter-spacing: 3px; color: #00f0ff;
    box-shadow: 0 0 20px rgba(0,240,255,0.15), inset 0 0 10px rgba(0,240,255,0.1);
    backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
    clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
    transition: all 0.3s ease;
  }
  #reticle .chip .dot { 
    width: 5px; height: 5px; background: #00f0ff; box-shadow: 0 0 10px #00f0ff;
    animation: dotPulse 0.8s ease-in-out infinite alternate; 
  }
  
  #reticle.locked .chip { 
    border-color: #ff2d55; color: #fff; background: rgba(30, 4, 10, 0.9); 
    box-shadow: 0 0 25px rgba(255,45,85,0.4), inset 0 0 15px rgba(255,45,85,0.3);
  }
  #reticle.locked .chip .dot { background: #ff2d55; box-shadow: 0 0 12px #ff2d55, 0 0 24px #ff2d55; animation: none; }
  
  /* Precision Corners */
  .r-corner { 
    position: absolute; width: 25px; height: 25px; 
    border: 1.5px solid #00f0ff; filter: drop-shadow(0 0 5px #00f0ff); 
    transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); 
  }
  .r-corner::before { content: ''; position: absolute; background: #00f0ff; box-shadow: 0 0 8px #00f0ff; }
  
  .r-corner.tl { top: 0; left: 0; border-right: none; border-bottom: none; }
  .r-corner.tl::before { top: -1.5px; left: -1.5px; width: 6px; height: 6px; }
  
  .r-corner.tr { top: 0; right: 0; border-left: none; border-bottom: none; }
  .r-corner.tr::before { top: -1.5px; right: -1.5px; width: 6px; height: 6px; }
  
  .r-corner.bl { bottom: 0; left: 0; border-right: none; border-top: none; }
  .r-corner.bl::before { bottom: -1.5px; left: -1.5px; width: 6px; height: 6px; }
  
  .r-corner.br { bottom: 0; right: 0; border-left: none; border-top: none; }
  .r-corner.br::before { bottom: -1.5px; right: -1.5px; width: 6px; height: 6px; }

  #reticle.locked .r-corner { 
    border-color: #ff2d55; filter: drop-shadow(0 0 8px #ff2d55); 
    width: 15px; height: 15px; padding: 5px; transform: scale(0.9);
  }
  #reticle.locked .r-corner::before { background: #fff; box-shadow: 0 0 10px #fff; }

  /* Holographic Scanline */
  #reticle .scanline {
    position: absolute; left: 0; right: 0; top: 10%; height: 2px;
    background: linear-gradient(90deg, transparent 0%, #00f0ff 50%, transparent 100%);
    box-shadow: 0 0 15px 2px rgba(0,240,255,0.6); 
    animation: scanMove 2s ease-in-out infinite;
  }
  #reticle .scanline::after {
    content: ''; position: absolute; top: 2px; left: 0; right: 0; height: 40px;
    background: linear-gradient(180deg, rgba(0,240,255,0.15) 0%, transparent 100%);
  }
  #reticle.locked .scanline { opacity: 0; }
  @keyframes scanMove { 0% { top: 0%; opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { top: 98%; opacity: 0; } }

  /* ============ AR SCENE & CREATIVE IMAGE CARDS ============ */
  #ar-scene {
    position: fixed; inset: 0; z-index: 12; pointer-events: none; perspective: 1200px;
    transform-style: preserve-3d; transition: transform 0.1s ease-out;
  }

  /* Connecting Laser Lines */
  .spec-line {
    stroke-dasharray: 1000; stroke-dashoffset: 1000; opacity: 0;
    filter: drop-shadow(0 0 6px #ff2d55);
    transition: stroke-dashoffset 0.8s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.6s ease;
  }
  .active-tracking .spec-line { stroke-dashoffset: 0; opacity: 1; animation: linePulse 2s infinite alternate; }
  @keyframes linePulse { 0% { filter: drop-shadow(0 0 4px #ff2d55); stroke-width: 1.5; } 100% { filter: drop-shadow(0 0 10px #ff2d55); stroke-width: 2.5; } }

  /* Target Nodes (Vehicle Tracking Points) */
  .target {
    position: absolute; width: 34px; height: 34px;
    transform: translate(-50%, -50%) scale(0.1); opacity: 0;
    transition: opacity 0.4s ease, transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .active-tracking .target { opacity: 1; transform: translate(-50%, -50%) scale(1); }
  
  .target .dot {
    position: absolute; top: 50%; left: 50%; width: 6px; height: 6px; background: #fff; border-radius: 50%;
    transform: translate(-50%, -50%); box-shadow: 0 0 15px #fff, 0 0 25px #ff2d55;
  }
  .target .arcs {
    position: absolute; inset: 0; border: 1.5px dashed rgba(255,45,85,0.8); border-radius: 50%;
    filter: drop-shadow(0 0 5px #ff2d55); animation: spinRotate 4s linear infinite;
  }
  /* Ripple effect on targets */
  .target::after {
    content: ''; position: absolute; inset: 0; border-radius: 50%;
    border: 1px solid #ff2d55; opacity: 0;
    animation: rippleTarget 2s cubic-bezier(0.16, 1, 0.3, 1) infinite;
  }
  @keyframes rippleTarget { 0% { transform: scale(0.5); opacity: 1; } 100% { transform: scale(2); opacity: 0; } }

  /* --- Premium Holographic Image Cards --- */
  .spec-card {
    position: absolute; width: 130px; opacity: 0;
    transform: translateY(30px) scale(0.6) translateZ(-50px) rotateX(-20deg);
    transition: all 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
    filter: drop-shadow(0 15px 30px rgba(0,0,0,0.9));
  }
  .active-tracking .spec-card { opacity: 1; transform: translateY(0) scale(1) translateZ(0) rotateX(0deg); }
  
  .active-tracking .card-delay-1 { transition-delay: 0.1s; }
  .active-tracking .card-delay-2 { transition-delay: 0.2s; }
  .active-tracking .card-delay-3 { transition-delay: 0.3s; }
  .active-tracking .card-delay-4 { transition-delay: 0.4s; }

  /* Techy Label */
  .spec-label {
    font-family: 'Orbitron', sans-serif; font-size: 8px; font-weight: 700;
    color: #fff; letter-spacing: 1.5px; margin-bottom: 6px;
    text-shadow: 0 0 8px rgba(255,255,255,0.8);
    display: flex; align-items: center; gap: 5px;
    background: linear-gradient(90deg, rgba(255,45,85,0.4) 0%, transparent 100%);
    padding: 3px 6px; border-left: 2px solid #ff2d55;
  }

  /* Ultra-Realistic Glassmorphism Container */
  .spec-image-box {
    width: 100%; position: relative; overflow: hidden;
    border: 1px solid rgba(0, 240, 255, 0.3);
    border-top-color: rgba(0, 240, 255, 0.9); /* Top Edge Light */
    background: linear-gradient(135deg, rgba(4, 12, 24, 0.8) 0%, rgba(1, 3, 6, 0.9) 100%);
    backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
    padding: 6px; border-radius: 2px;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.95), inset 0 0 20px rgba(0, 240, 255, 0.1);
  }
  
  /* Corner Brackets on Cards */
  .spec-image-box::before {
    content: ''; position: absolute; bottom: 0; right: 0; width: 12px; height: 12px;
    border-bottom: 2px solid #ff2d55; border-right: 2px solid #ff2d55; z-index: 3;
    box-shadow: 2px 2px 8px rgba(255,45,85,0.5);
  }

  /* Vertical Holographic Scanner */
  .spec-image-box::after {
    content: ''; position: absolute; top: -100%; left: 0; width: 100%; height: 3px;
    background: #00f0ff; box-shadow: 0 0 15px 3px #00f0ff, 0 -20px 20px rgba(0,240,255,0.2);
    animation: holoScan 4s ease-in-out infinite; z-index: 4; mix-blend-mode: screen;
  }
  @keyframes holoScan { 0%, 100% { top: -10%; opacity: 0; } 10%, 90% { opacity: 1; } 50% { top: 110%; } }

  /* Image styling */
  .spec-image-box img {
    width: 100%; height: auto; min-height: 70px; display: block; 
    object-fit: cover; background: #000;
    filter: contrast(1.1) brightness(1.1);
    position: relative; z-index: 1;
  }
  
  /* Fallback Icon Styling */
  .spec-image-box .fallback-icon {
    display: none; width: 100%; aspect-ratio: 4/3; align-items: center; justify-content: center;
    background: radial-gradient(circle, rgba(0,240,255,0.1) 0%, transparent 80%);
  }
  .spec-image-box .fallback-icon svg { width: 40%; height: 40%; filter: drop-shadow(0 0 10px #00f0ff); }
  .spec-image-box.img-failed img { display: none; }
  .spec-image-box.img-failed .fallback-icon { display: flex; }

  /* ============ BOTTOM STATUS BAR ============ */
  #found-bar {
    position: fixed; bottom: 0; left: 0; width: 100%; padding: 20px 20px 35px; z-index: 20;
    background: linear-gradient(0deg, rgba(0,3,8,0.98) 0%, rgba(0,3,8,0.8) 40%, transparent 100%);
    text-align: center; opacity: 0; transform: translateY(20px);
    transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1); pointer-events: none;
    border-top: 1px solid rgba(0,240,255,0.1);
  }
  #found-bar.show { opacity: 1; transform: translateY(0); }
  
  #found-bar .title { 
    font-family: 'Orbitron', sans-serif; font-size: 13px; font-weight: 700;
    letter-spacing: 3px; color: #fff; 
  }
  #found-bar .title span { color: #00f0ff; text-shadow: 0 0 15px rgba(0,240,255,0.8); }
  
  #found-bar .sub { 
    margin-top: 6px; font-size: 10px; font-weight: 600; letter-spacing: 2px; 
    color: rgba(255,255,255,0.5); text-transform: uppercase;
  }
  
  /* Data loading indicator */
  #found-bar .sub::after {
    content: ''; display: inline-block; width: 60px; height: 2px; margin-left: 10px; vertical-align: middle;
    background: linear-gradient(90deg, #ff2d55, transparent);
    animation: loadBar 1.5s infinite;
  }
  @keyframes loadBar { 0% { background-position: -60px 0; } 100% { background-position: 60px 0; } }

</style>
</head>
