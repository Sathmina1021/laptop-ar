<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Bajaj Pulsar NS200 AR Interactive Scanner</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
        :root {
            --brand-orange: #ff4500;
            --brand-amber: #ffb100;
        }
        html, body { margin: 0; overflow: hidden; width: 100%; height: 100%; background-color: transparent; font-family: system-ui, sans-serif; }
        a-scene { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

        /* START SCREEN OVERLAY */
        #start-overlay {
            position: fixed; inset: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #140701 0%, #000000 100%);
            z-index: 9999; display: flex; flex-direction: column;
            justify-content: center; align-items: center; padding: 20px; box-sizing: border-box;
            transition: opacity 0.5s ease;
        }
        .brand-title { color: #fff; font-size: 28px; letter-spacing: 4px; font-weight: 900; text-align: center; text-transform: uppercase; margin-bottom: 30px; }
        .brand-title span { color: var(--brand-orange); text-shadow: 0 0 10px var(--brand-orange); }
        
        .scan-btn { 
            background: linear-gradient(135deg, var(--brand-orange), var(--brand-amber)); 
            border: none; color: #000; padding: 16px 40px; font-size: 15px; font-weight: 800; 
            border-radius: 50px; cursor: pointer; letter-spacing: 2px; box-shadow: 0 0 25px rgba(255, 69, 0, 0.4); 
        }

        /* BOTTOM SCAN HINT */
        #scan-hint { 
            position: fixed; bottom: max(40px, env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%); 
            color: #fff; background: rgba(0, 0, 0, 0.85); padding: 14px 30px; border-radius: 30px; 
            font-size: 13px; font-weight: 700; z-index: 99; border: 2px solid var(--brand-orange); 
            pointer-events: none; text-align: center; letter-spacing: 2px;
            box-shadow: 0 0 20px rgba(255, 69, 0, 0.5);
        }
    </style>
</head>
<body>

    <!-- Onboarding Screen -->
    <div id="start-overlay">
        <div class="brand-title">PULSAR NS200<br><span>AR SCANNER</span></div>
        <button class="scan-btn" id="activate-btn">START SCANNER</button>
    </div>

    <!-- Scan Hint Overlay -->
    <div id="scan-hint">ALIGN CAMERA WITH THE PULSAR IMAGE</div>

    <!-- AR Scene -->
    <a-scene
        id="main-scene"
        mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiScanning: no; uiLoading: no;"
        color-space="sRGB"
        renderer="colorManagement: true; antialias: true; alpha: true;"
        vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false"
    >
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <!-- AR Target Anchor (Bike Center) -->
        <a-entity id="bike-anchor" mindar-image-target="targetIndex: 0">
            
            <!-- 1. MAIN ANIMATED TOP TITLE (Fired right above the bike) -->
            <a-entity position="0 0.65 0" id="main-title-group" scale="0 0 0">
                <!-- Outer Neon Border Glow -->
                <a-plane width="0.9" height="0.16" color="#ff4500" shader="flat" opacity="0.8"></a-plane>
                <!-- Inner Dark Core -->
                <a-plane width="0.86" height="0.12" color="#050201" shader="flat" position="0 0 0.001"></a-plane>
                <!-- Text inside -->
                <a-text value="BAJAJ PULSAR NS200" color="#ffffff" align="center" width="2.2" font="exo2bold" position="0 0 0.002"
                        animation="property: scale; to: 1.05 1.05 1.05; dir: alternate; dur: 1000; loop: true; easing: easeInOutQuad">
                </a-text>
            </a-entity>

            <!-- Tech HUD Circle under/around the elements -->
            <a-circle radius="0.5" color="#ffb100" opacity="0.2" shader="flat" position="0 0 -0.01"
                      animation="property: rotation; to: 0 0 360; dur: 12000; loop: true; easing: linear">
            </a-circle>

            <!-- =========================================================
                 SPEC CARDS PLACED BEAUTIFULLY AROUND THE BIKE
                 ========================================================= -->

            <!-- CARD 1: ENGINE (Top Right) -->
            <a-entity position="0.55 0.35 0" class="spec-card" scale="0 0 0">
                <a-line start="-0.15 -0.1 0" end="0 0 0" color="#ff4500"></a-line>
                <a-plane width="0.36" height="0.15" color="#0a0401" opacity="0.9" shader="flat">
                    <a-plane width="0.36" height="0.015" color="#ff4500" position="0 0.067 0.001"></a-plane>
                    <a-text value="ENGINE" color="#ffb100" align="center" width="1.1" position="0 0.04 0.002" font="exo2bold"></a-text>
                    <a-text value="199.5cc Liquid Cooled\n24.5 PS Power\n18.74 Nm Torque" color="#fff" align="center" width="0.75" position="0 -0.02 0.002"></a-text>
                </a-plane>
            </a-entity>

            <!-- CARD 2: BRAKES & SAFETY (Mid Right) -->
            <a-entity position="0.6 0 0" class="spec-card" scale="0 0 0">
                <a-line start="-0.15 0 0" end="0 0 0" color="#ffb100"></a-line>
                <a-plane width="0.36" height="0.15" color="#0a0401" opacity="0.9" shader="flat">
                    <a-plane width="0.36" height="0.015" color="#ffb100" position="0 0.067 0.001"></a-plane>
                    <a-text value="BRAKES & SAFETY" color="#ff4500" align="center" width="1.1" position="0 0.04 0.002" font="exo2bold"></a-text>
                    <a-text value="Dual Channel ABS\n300mm Front Disc\n230mm Rear Disc" color="#fff" align="center" width="0.75" position="0 -0.02 0.002"></a-text>
                </a-plane>
            </a-entity>

            <!-- CARD 3: SUSPENSION (Top Left) -->
            <a-entity position="-0.55 0.35 0" class="spec-card" scale="0 0 0">
                <a-line start="0.15 -0.1 0" end="0 0 0" color="#ffb100"></a-line>
                <a-plane width="0.36" height="0.15" color="#0a0401" opacity="0.9" shader="flat">
                    <a-plane width="0.36" height="0.015" color="#ffb100" position="0 0.067 0.001"></a-plane>
                    <a-text value="SUSPENSION" color="#ff4500" align="center" width="1.1" position="0 0.04 0.002" font="exo2bold"></a-text>
                    <a-text value="USD Front Forks\nNitrox Monoshock\nRear Absorber" color="#fff" align="center" width="0.75" position="0 -0.02 0.002"></a-text>
                </a-plane>
            </a-entity>

            <!-- CARD 4: CONSOLE (Mid Left) -->
            <a-entity position="-0.6 0 0" class="spec-card" scale="0 0 0">
                <a-line start="0.15 0 0" end="0 0 0" color="#ff4500"></a-line>
                <a-plane width="0.36" height="0.15" color="#0a0401" opacity="0.9" shader="flat">
                    <a-plane width="0.36" height="0.015" color="#ff4500" position="0 0.067 0.001"></a-plane>
                    <a-text value="CONSOLE" color="#ffb100" align="center" width="1.1" position="0 0.04 0.002" font="exo2bold"></a-text>
                    <a-text value="Digital LCD Console\nGear Indicator\nBluetooth Connectivity" color="#fff" align="center" width="0.75" position="0 -0.02 0.002"></a-text>
                </a-plane>
            </a-entity>

        </a-entity>
    </a-scene>

    <script>
        const sceneEl = document.querySelector('#main-scene');
        const activateBtn = document.querySelector('#activate-btn');
        const overlay = document.querySelector('#start-overlay');
        const scanHint = document.querySelector('#scan-hint');
        const anchor = document.querySelector('#bike-anchor');
        
        const mainTitle = document.querySelector('#main-title-group');
        const specCards = document.querySelectorAll('.spec-card');

        // Start AR System on Button Click
        activateBtn.addEventListener('click', async () => {
            try {
                if (!sceneEl.hasLoaded) {
                    await new Promise(resolve => sceneEl.addEventListener('loaded', resolve, { once: true }));
                }
                await sceneEl.systems['mindar-image-system'].start();
                overlay.style.opacity = '0';
                setTimeout(() => { overlay.style.display = 'none'; }, 500);
            } catch (err) {
                console.error(err);
                alert("Camera access is required for AR!");
            }
        });

        // Trigger Animations When Image is Tracked Perfectly
        anchor.addEventListener('targetFound', () => {
            scanHint.style.display = 'none';
            
            // Pop up Main Title
            mainTitle.setAttribute('animation', {
                property: 'scale', from: '0 0 0', to: '1 1 1', dur: 600, easing: 'easeOutBack'
            });

            // Staggered pop up for Spec Cards
            specCards.forEach((card, index) => {
                card.setAttribute('animation', {
                    property: 'scale', from: '0 0 0', to: '1 1 1', dur: 500, delay: index * 200, easing: 'easeOutElastic'
                });
            });
        });

        // Hide when target is lost
        anchor.addEventListener('targetLost', () => {
            scanHint.style.display = 'block';
            mainTitle.setAttribute('scale', '0 0 0');
            mainTitle.removeAttribute('animation');
            specCards.forEach(card => {
                card.setAttribute('scale', '0 0 0');
                card.removeAttribute('animation');
            });
        });
    </script>
</body>
</html>
