<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>XQOM Sport — AR Telemetry</title>
<script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;overflow:hidden;width:100%;height:100%;background-color:transparent;}
  #scan-hint{
    position:fixed;bottom:10%;left:50%;transform:translateX(-50%);
    color:#00f0ff;background:rgba(0,0,0,0.7);padding:15px 25px;border-radius:20px;
    font-family:'Rajdhani',sans-serif;font-size:18px;z-index:99;
    border:1px solid #00f0ff;backdrop-filter: blur(5px);
  }
</style>
</head>
<body>

<div id="scan-hint">Scanning Target...</div>

<a-scene id="ar-scene" mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; filterMinCF: 0.0001; filterBeta: 0.001; missTolerance: 20; uiScanning: no;" 
         color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false">

  <a-assets>
    <img id="img-engine" src="image/engine.png">
    <img id="img-frame" src="image/frame.png">
    <img id="img-frok" src="image/frok.png">
    <img id="img-led" src="image/led%20system.png">
    <img id="img-styling" src="image/styling.png">
  </a-assets>

  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
</a-scene>

<script>
  // UI Layout Settings
  const accentPalette = ['#ff003c', '#00f0ff', '#ffaa00', '#00ff66', '#d900ff'];
  const arData = [
    { title: "FI ENGINE", imgSrc: "#img-engine" },
    { title: "AERO CHASSIS", imgSrc: "#img-frame" },
    { title: "CBS BRAKING", imgSrc: "#img-frok" },
    { title: "TWIN LED", imgSrc: "#img-led" },
    { title: "SPORT STYLING", imgSrc: "#img-styling" }
  ];

  document.addEventListener("DOMContentLoaded", () => {
    const scene = document.querySelector('a-scene');
    
    // Create Anchor for all 4 targets (as defined in targets.mind)
    for(let i = 0; i < 4; i++) {
        const anchor = document.createElement('a-entity');
        anchor.setAttribute('mindar-image-target', `targetIndex: ${i}`);
        
        // Wrapper for better control
        const wrapper = document.createElement('a-entity');
        
        // Create Cards in an Arc
        const radius = 0.55; 
        const total = arData.length;
        
        arData.forEach((card, index) => {
            const angle = (index / total) * Math.PI - (Math.PI / 2);
            const posX = Math.sin(angle) * radius;
            const posY = Math.cos(angle) * radius * 0.4;
            const posZ = 0.4; // Pushed forward so it floats in front of car

            const cardEnt = document.createElement('a-entity');
            cardEnt.setAttribute('position', `${posX} ${posY} ${posZ}`);
            cardEnt.setAttribute('look-at', '[camera]');

            // The Card
            const plane = document.createElement('a-plane');
            plane.setAttribute('width', '0.35');
            plane.setAttribute('height', '0.22');
            plane.setAttribute('src', card.imgSrc);
            plane.setAttribute('material', 'shader: flat; side: double');
            
            // Glow effect
            const border = document.createElement('a-plane');
            border.setAttribute('width', '0.37');
            border.setAttribute('height', '0.24');
            border.setAttribute('color', accentPalette[index]);
            border.setAttribute('position', '0 0 -0.01');
            
            cardEnt.appendChild(border);
            cardEnt.appendChild(plane);
            wrapper.appendChild(cardEnt);
        });

        anchor.appendChild(wrapper);
        scene.appendChild(anchor);
    }
  });
</script>
</body>
</html>
