<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>XQOM AR - Realistic Vehicle HUD</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  * { 
    margin: 0; 
    padding: 0; 
    box-sizing: border-box; 
    -webkit-tap-highlight-color: transparent; 
    user-select: none;
  }
  
  html, body { 
    width: 100%; 
    height: 100%; 
    overflow: hidden; 
    background: #03070d; 
    font-family: 'Rajdhani', sans-serif; 
    color: #fff; 
  }

  /* ============ LIVE CAMERA / BACKGROUND ============ */
  #camera-feed {
    position: fixed; inset: 0; width: 100%; height: 100%;
    object-fit: cover; z-index: 1;
    background: #000;
    filter: contrast(1.05) brightness(0.95);
  }

  /* ============ SPLASH SCREEN ============ */
  #splash {
    position: fixed; inset: 0; z-index: 100;
    background: radial-gradient(circle at center, rgba(15, 23, 42, 0.85) 0%, rgba(3, 7, 13, 0.98) 100%),
                linear-gradient(0deg, rgba(255,45,85,0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,45,85,0.05) 1px, transparent 1px);
    background-size: 100% 100%, 30px 30px, 30px 30px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; padding: 24px; cursor: pointer;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
  }

  #splash .logo { 
    font-family: 'Orbitron', sans-serif; 
    font-weight: 900; 
    font-size: 38px; 
    letter-spacing: 6px; 
    color: #ff2d55; 
    text-shadow: 0 0 12px rgba(255,45,85,0.8), 0 0 30px rgba(255,45,85,0.4); 
    position: relative;
  }

  #splash .logo span { 
    color: #00f0ff; 
    text-shadow: 0 0 12px rgba(0,240,255,0.8), 0 0 30px rgba(0,240,255,0.4);
  }

  #splash .tagline { 
    margin-top: 12px; 
    font-family: 'Orbitron', sans-serif;
    font-size: 11px; 
    letter-spacing: 4px; 
    color: rgba(255,255,255,0.7); 
    text-transform: uppercase;
  }

  #start-btn {
    margin-top: 50px; width: 90px; height: 90px; border-radius: 50%;
    border: 1px solid rgba(255,45,85,0.6); 
    background: radial-gradient(circle, rgba(255,45,85,0.25) 0%, rgba(255,45,85,0.05) 70%);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 25px rgba(255,45,85,0.4), inset 0 0 15px rgba(255,45,85,0.3);
    animation: pulseBtn 2s infinite ease-in-out;
    position: relative;
  }

  #start-btn::before {
    content: ''; position: absolute; inset: -6px; border-radius: 50%;
    border: 1px dashed rgba(0,240,255,0.5);
    animation: spin 10s linear infinite;
  }

  #start-btn svg { width: 36px; height: 36px; filter: drop-shadow(0 0 6px #ff2d55); }

  @keyframes pulseBtn {
    0%, 100% { transform: scale(1); box-shadow: 0 0 20px rgba(255,45,85,0.4), inset 0 0 15px rgba(255,45,85,0.3); }
    50% { transform: scale(1.08); box-shadow: 0 0 40px rgba(255,45,85,0.8), inset 0 0 25px rgba(255,45,85,0.5); }
  }

  #splash .hint { 
    margin-top: 28px; 
    font-family: 'Orbitron', sans-serif; 
    font-size: 11px; 
    letter-spacing: 3px; 
    color: #00f0ff; 
    text-shadow: 0 0 8px rgba(0,240,255,0.6);
    animation: blink 1.5s infinite;
  }

  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

  /* ============ HIGH-TECH CREATIVE LOADING SCREEN ============ */
  #loading { 
    position: fixed; inset: 0; z-index: 90; 
    background: radial-gradient(circle at center, rgba(6, 15, 25, 0.95) 0%, rgba(1, 4, 8, 0.98) 100%);
    display: none; flex-direction: column; align-items: center; justify-content: center; 
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }

  #loading.show { display: flex; }

  .spinner { 
    position: relative; 
    width: 100px; 
    height: 100px; 
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Center Radar Grid Effect */
  .spinner::before {
    content: ''; position: absolute; inset: 10px; border-radius: 50%;
    border: 1px solid rgba(0,240,255,0.15);
    background: radial-gradient(circle, rgba(0,240,255,0.05) 0%, transparent 70%);
  }

  .spinner .ring { 
    position: absolute; inset: 0; border-radius: 50%; 
    border: 2px solid transparent; 
    border-top-color: #ff2d55; 
    border-right-color: rgba(255,45,85,0.3); 
    filter: drop-shadow(0 0 8px #ff2d55);
    animation: spin 1s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite; 
  }

  .spinner .ring.r2 { 
    inset: 14px; 
    border-top-color: transparent; 
    border-right-color: transparent; 
    border-bottom-color: #00f0ff; 
    border-left-color: rgba(0,240,255,0.3); 
    filter: drop-shadow(0 0 8px #00f0ff);
    animation-duration: 1.4s; 
    animation-direction: reverse; 
  }

  /* Outer Scanning Radar Arc */
  .spinner::after {
    content: ''; position: absolute; inset: -12px; border-radius: 50%;
    border: 1px solid transparent;
    border-left-color: #00f0ff;
    animation: spin 2.5s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  #loading .txt { 
    margin-top: 32px; 
    font-family: 'Orbitron', sans-serif; 
    font-size: 11px; 
    font-weight: 700;
    letter-spacing: 4px; 
    color: #00f0ff; 
    text-shadow: 0 0 10px rgba(0,240,255,0.8); 
    display: flex;
    align-items: center;
    gap: 4px;
  }

  /* ============ HEADER ============ */
  #header {
    position: fixed; top: 0; left: 0; width: 100%; z-index: 20; pointer-events: none;
    padding: 20px 16px 30px; text-align: center;
    background: linear-gradient(180deg, rgba(2, 6, 12, 0.95) 0%, rgba(2, 6, 12, 0.6) 60%, rgba(0,0,0,0) 100%);
    opacity: 0; transition: opacity 0.6s ease;
  }

  #header.show { opacity: 1; }

  #header .h1 { 
    font-family: 'Orbitron', sans-serif; 
    font-weight: 900; 
    font-size: 26px; 
    letter-spacing: 5px; 
    color: #fff; 
    text-shadow: 0 0 10px rgba(255,255,255,0.6), 0 0 20px rgba(255,45,85,0.8); 
  }

  #header .h2 { 
    margin-top: 4px; 
    font-family: 'Orbitron', sans-serif; 
    font-size: 9px; 
    font-weight: 700;
    letter-spacing: 4px; 
    color: #00f0ff; 
    text-shadow: 0 0 8px rgba(0,240,255,0.7);
  }

  /* ============ SCAN RETICLE ============ */
  #reticle {
    position: fixed; left: 50%; top: 48%; width: 55vw; max-width: 280px; aspect-ratio: 1.35/1;
    transform: translate(-50%, -50%); z-index: 10; pointer-events: none;
    opacity: 0; transition: opacity 0.5s ease;
  }

  #reticle.show { opacity: 1; }

  #reticle .chip {
    position: absolute; top: -34px; left: 50%; transform: translateX(-50%);
    display: flex; align-items: center; gap: 8px; padding: 5px 14px;
    background: rgba(3, 10, 18, 0.75); 
    border: 1px solid rgba(0,240,255,0.5); 
    border-radius: 20px;
    font-family: 'Orbitron', sans-serif; font-size: 9px; font-weight: 700; letter-spacing: 2px; color: #00f0ff;
    box-shadow: 0 0 15px rgba(0,240,255,0.2), inset 0 0 8px rgba(0,240,255,0.1);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    transition: all 0.3s ease;
  }

  #reticle .chip .dot { 
    width: 6px; height: 6px; border-radius: 50%; background: #00f0ff; 
    box-shadow: 0 0 8px #00f0ff;
    animation: dotPulse 1s ease-in-out infinite; 
  }

  @keyframes dotPulse { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.3; transform: scale(0.7); } }
  
  #reticle.locked .chip { 
    border-color: rgba(255,45,85,0.8); color: #fff; 
    background: rgba(40, 6, 15, 0.85); 
    box-shadow: 0 0 20px rgba(255,45,85,0.4), inset 0 0 10px rgba(255,45,85,0.3);
  }

  #reticle.locked .chip .dot { 
    background: #ff2d55; animation: none; box-shadow: 0 0 10px #ff2d55; 
  }

  .r-corner { 
    position: absolute; width: 22px; height: 22px; 
    border: 2px solid #00f0ff; 
    filter: drop-shadow(0 0 6px #00f0ff); 
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
  }

  .r-corner.tl { top: 0; left: 0; border-right: none; border-bottom: none; border-radius: 6px 0 0 0; }
  .r-corner.tr { top: 0; right: 0; border-left: none; border-bottom: none; border-radius: 0 6px 0 0; }
  .r-corner.bl { bottom: 0; left: 0; border-right: none; border-top: none; border-radius: 0 0 0 6px; }
  .r-corner.br { bottom: 0; right: 0; border-left: none; border-top: none; border-radius: 0 0 6px 0; }

  #reticle.locked .r-corner { 
    border-color: #ff2d55; 
    filter: drop-shadow(0 0 8px #ff2d55); 
    width: 14px; height: 14px; 
  }

  #reticle .scanline {
    position: absolute; left: 2%; right: 2%; top: 10%; height: 2px;
    background: linear-gradient(90deg, transparent, #00f0ff, transparent);
    box-shadow: 0 0 12px #00f0ff; animation: scanMove 1.8s linear infinite;
  }

  #reticle.locked .scanline { display: none; }

  @keyframes scanMove { 
    0% { top: 5%; opacity: 0; } 
    15% { opacity: 1; } 
    85% { opacity: 1; } 
    100% { top: 92%; opacity: 0; } 
  }

  /* ============ AR SCENE & CREATIVE IMAGE CARDS ============ */
  #ar-scene {
    position: fixed; inset: 0; z-index: 12;
    pointer-events: none; perspective: 1000px;
    transform-style: preserve-3d; transition: transform 0.1s ease-out;
  }

  /* Connecting Lines */
  .spec-line {
    stroke-dasharray: 1000; stroke-dashoffset: 1000; opacity: 0;
    filter: drop-shadow(0 0 4px rgba(255, 45, 85, 0.8));
    transition: stroke-dashoffset 0.8s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.6s ease;
  }

  .active-tracking .spec-line { stroke-dashoffset: 0; opacity: 1; }

  /* Target Markers */
  .target {
    position: absolute; width: 26px; height: 26px;
    transform: translate(-50%, -50%) scale(0.1); opacity: 0;
    transition: opacity 0.4s ease, transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .active-tracking .target { opacity: 1; transform: translate(-50%, -50%) scale(1); }
  
  .target .dot {
    position: absolute; top: 50%; left: 50%;
    width: 6px; height: 6px; background: #fff; border-radius: 50%;
    transform: translate(-50%, -50%); box-shadow: 0 0 10px #fff, 0 0 18px #ff2d55;
  }

  .target .arcs {
    position: absolute; inset: 0; border: 1.5px solid rgba(255,45,85,0.9); border-radius: 50%;
    border-top-color: transparent; border-bottom-color: transparent;
    filter: drop-shadow(0 0 6px #ff2d55);
    animation: spinTarget 2s linear infinite;
  }

  @keyframes spinTarget { to { transform: rotate(360deg); } }

  /* --- Compact & Creative Realistic Holographic Image Cards --- */
  .spec-card {
    position: absolute;
    width: 125px;
    opacity: 0;
    transform: translateY(20px) scale(0.7) translateZ(-40px) rotateX(-15deg);
    transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    filter: drop-shadow(0 10px 20px rgba(0,0,0,0.85));
  }
  
  .active-tracking .spec-card { 
    opacity: 1; 
    transform: translateY(0) scale(1) translateZ(0) rotateX(0deg); 
  }
  
  .active-tracking .card-delay-1 { transition-delay: 0.1s; }
  .active-tracking .card-delay-2 { transition-delay: 0.2s; }
  .active-tracking .card-delay-3 { transition-delay: 0.3s; }
  .active-tracking .card-delay-4 { transition-delay: 0.4s; }

  /* Techy Label above image */
  .spec-label {
    font-family: 'Orbitron', sans-serif; font-size: 8px; font-weight: 700;
    color: #ff2d55; letter-spacing: 1.2px; margin-bottom: 5px;
    text-shadow: 0 0 8px rgba(255,45,85,0.8);
    display: flex; align-items: center; gap: 5px;
  }

  .spec-label::before {
    content: ''; display: inline-block; width: 5px; height: 5px;
    background: #ff2d55; border-radius: 50%;
    box-shadow: 0 0 6px #ff2d55;
  }

  /* Glassmorphism Futuristic Image Container */
  .spec-image-box {
    width: 100%;
    border: 1px solid rgba(255, 45, 85, 0.6);
    background: radial-gradient(circle at top left, rgba(255, 45, 85, 0.15) 0%, rgba(3, 8, 16, 0.85) 100%);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-radius: 8px;
    padding: 5px;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6), inset 0 0 10px rgba(255, 45, 85, 0.25);
    position: relative;
    overflow: hidden;
  }

  /* Tech Corners on Image Box */
  .spec-image-box::before {
    content: ''; position: absolute; top: 0; right: 0;
    width: 8px; height: 8px;
    border-top: 2px solid #00f0ff; border-right: 2px solid #00f0ff;
    z-index: 3;
  }

  /* Cyber scanning line inside image box */
  .spec-image-box::after {
    content: ''; position: absolute; top: -100%; left: 0; width: 100%; height: 3px;
    background: linear-gradient(90deg, transparent, #ff2d55, transparent);
    box-shadow: 0 0 10px #ff2d55;
    animation: techScan 3.5s ease-in-out infinite; z-index: 2;
  }

  @keyframes techScan { 0%, 100% { top: -10%; opacity: 0; } 50% { top: 110%; opacity: 1; } }

  .spec-image-box img {
    width: 100%; height: auto; min-height: 70px; display: block; border-radius: 4px;
    object-fit: cover; background: rgba(255,255,255,0.02);
    filter: contrast(1.05) brightness(1.02);
  }

  .spec-image-box .fallback-icon {
    display: none; width: 100%; aspect-ratio: 4/3; align-items: center; justify-content: center;
    border-radius: 4px; background: rgba(0,240,255,0.05);
  }

  .spec-image-box .fallback-icon svg { width: 42%; height: 42%; filter: drop-shadow(0 0 6px #00f0ff); }
  .spec-image-box.img-failed img { display: none; }
  .spec-image-box.img-failed .fallback-icon { display: flex; }

  /* ============ BOTTOM STATUS BAR ============ */
  #found-bar {
    position: fixed; bottom: 0; left: 0; width: 100%; padding: 18px 20px 28px; z-index: 20;
    background: linear-gradient(0deg, rgba(2, 6, 12, 0.95) 0%, rgba(2, 6, 12, 0.5) 70%, rgba(0,0,0,0) 100%);
    text-align: center; opacity: 0; transform: translateY(15px);
    transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); pointer-events: none;
  }

  #found-bar.show { opacity: 1; transform: translateY(0); }

  #found-bar .title { 
    font-family: 'Orbitron', sans-serif; 
    font-size: 12px; 
    font-weight: 700;
    letter-spacing: 2px; 
    color: #fff; 
  }

  #found-bar .title span { 
    color: #ff2d55; 
    text-shadow: 0 0 10px #ff2d55; 
  }

  #found-bar .sub { 
    margin-top: 5px; 
    font-size: 10px; 
    letter-spacing: 1.5px; 
    color: rgba(0,240,255,0.8); 
    text-shadow: 0 0 5px rgba(0,240,255,0.4);
  }

</style>
</head>
<body>

<video id="camera-feed" autoplay playsinline muted></video>

<div id="splash">
  <div class="logo">XQOM <span>AR</span></div>
  <div class="tagline">VEHICLE SPEC SCANNER</div>
  <div id="start-btn">
    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M4 8V6a2 2 0 0 1 2-2h2M4 16v2a2 2 0 0 0 2 2h2M20 8V6a2 2 0 0 0-2-2h-2M20 16v2a2 2 0 0 1-2 2h-2" stroke="#ff2d55" stroke-width="2" stroke-linecap="round"/>
      <circle cx="12" cy="12" r="3.4" stroke="#ff2d55" stroke-width="2"/>
    </svg>
  </div>
  <div class="hint">TAP ANYWHERE TO START</div>
</div>

<div id="loading">
  <div class="spinner"><div class="ring"></div><div class="ring r2"></div></div>
  <div class="txt">INITIALIZING SYSTEM<span>...</span></div>
</div>

<div id="header">
  <div class="h1">VEHICLE SPECS</div>
  <div class="h2">[ LIVE TELEMETRY ]</div>
</div>

<div id="reticle">
  <div class="chip"><span class="dot"></span><span class="chip-text">SCANNING</span></div>
  <div class="r-corner tl"></div>
  <div class="r-corner tr"></div>
  <div class="r-corner bl"></div>
  <div class="r-corner br"></div>
  <div class="scanline"></div>
</div>

<div id="ar-scene">
  
  <!-- Dynamic SVG Lines Linking Image Cards to Targets -->
  <svg id="ar-lines" style="position: absolute; inset: 0; width: 100%; height: 100%; z-index: 1;">
    <line x1="30%" y1="23%" x2="42%" y2="40%" stroke="rgba(255,45,85,0.6)" stroke-width="1.5" class="spec-line" id="line1"/>
    <line x1="30%" y1="63%" x2="48%" y2="60%" stroke="rgba(255,45,85,0.6)" stroke-width="1.5" class="spec-line card-delay-1" id="line2"/>
    <line x1="65%" y1="23%" x2="58%" y2="45%" stroke="rgba(255,45,85,0.6)" stroke-width="1.5" class="spec-line card-delay-2" id="line3"/>
    <line x1="65%" y1="48%" x2="55%" y2="50%" stroke="rgba(255,45,85,0.6)" stroke-width="1.5" class="spec-line card-delay-3" id="line4"/>
    <line x1="65%" y1="73%" x2="62%" y2="65%" stroke="rgba(255,45,85,0.6)" stroke-width="1.5" class="spec-line card-delay-4" id="line5"/>
  </svg>

  <!-- Tracked Target Points on the Vehicle -->
  <div class="target" id="target1" style="left: 42%; top: 40%;"><div class="dot"></div><div class="arcs"></div></div>
  <div class="target card-delay-1" id="target2" style="left: 48%; top: 60%;"><div class="dot"></div><div class="arcs"></div></div>
  <div class="target card-delay-2" id="target3" style="left: 58%; top: 45%;"><div class="dot"></div><div class="arcs"></div></div>
  <div class="target card-delay-3" id="target4" style="left: 55%; top: 50%;"><div class="dot"></div><div class="arcs"></div></div>
  <div class="target card-delay-4" id="target5" style="left: 62%; top: 65%;"><div class="dot"></div><div class="arcs"></div></div>

  <!-- CARD 1: LED LIGHTING SYSTEM -->
  <div class="spec-card" id="card1" data-line="line1" data-target="target1" style="left: 8%; top: 18%;">
    <div class="spec-label">SYS.01 // OPTICS</div>
    <div class="spec-image-box">
      <img src="image/led-system.png" alt="LED System" onerror="this.parentElement.classList.add('img-failed')" onload="checkImgContent(this)">
      <div class="fallback-icon"><svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M9 18h6M10 21h4M12 3a6 6 0 0 0-4 10.5c.7.6 1 1.4 1 2.5h6c0-1.1.3-1.9 1-2.5A6 6 0 0 0 12 3Z" stroke="#00f0ff" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
    </div>
  </div>

  <!-- CARD 2: ENGINE -->
  <div class="spec-card card-delay-1" id="card2" data-line="line2" data-target="target2" style="left: 8%; top: 58%;">
    <div class="spec-label">SYS.02 // POWER</div>
    <div class="spec-image-box">
      <img src="image/engine.png" alt="Engine" onerror="this.parentElement.classList.add('img-failed')" onload="checkImgContent(this)">
      <div class="fallback-icon"><svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="3" y="9" width="9" height="7" rx="1" stroke="#00f0ff" stroke-width="1.4"/><path d="M12 11h3l3-3h2M12 14h3l3 3h2M6 9V6h4v3" stroke="#00f0ff" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
    </div>
  </div>

  <!-- CARD 3: FROK / FRONT FORK -->
  <div class="spec-card card-delay-2" id="card3" data-line="line3" data-target="target3" style="left: 65%; top: 18%;">
    <div class="spec-label">SYS.03 // SUSPENSION</div>
    <div class="spec-image-box">
      <img src="image/frok.png" alt="Front Fork" onerror="this.parentElement.classList.add('img-failed')" onload="checkImgContent(this)">
      <div class="fallback-icon"><svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M8 3v7M16 3v7M8 10c0 3 2 3 2 6v5M16 10c0 3-2 3-2 6v5" stroke="#00f0ff" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
    </div>
  </div>

  <!-- CARD 4: STYLING -->
  <div class="spec-card card-delay-3" id="card4" data-line="line4" data-target="target4" style="left: 65%; top: 43%;">
    <div class="spec-label">SYS.04 // AERO</div>
    <div class="spec-image-box">
      <img src="image/styling.png" alt="Styling" onerror="this.parentElement.classList.add('img-failed')" onload="checkImgContent(this)">
      <div class="fallback-icon"><svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M3 12h13M3 12a3 3 0 1 0 3 3M16 12a3 3 0 1 0-3-3M9 19h9a3 3 0 1 0-3-3" stroke="#00f0ff" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
    </div>
  </div>

  <!-- CARD 5: PERIMETER FRAME -->
  <div class="spec-card card-delay-4" id="card5" data-line="line5" data-target="target5" style="left: 65%; top: 68%;">
    <div class="spec-label">SYS.05 // CHASSIS</div>
    <div class="spec-image-box">
      <img src="image/frame.png" alt="Perimeter Frame" onerror="this.parentElement.classList.add('img-failed')" onload="checkImgContent(this)">
      <div class="fallback-icon"><svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 2 3 7v10l9 5 9-5V7l-9-5Z" stroke="#00f0ff" stroke-width="1.4" stroke-linejoin="round"/><path d="M3 7l9 5 9-5M12 22V12" stroke="#00f0ff" stroke-width="1.4" stroke-linejoin="round"/></svg></div>
    </div>
  </div>

</div>

<div id="found-bar">
  <div class="title">TARGET LOCKED <span>&mdash; DATA STREAM ACTIVE</span></div>
  <div class="sub">Holographic modules displaying live telemetry</div>
</div>

<script>
  const video      = document.getElementById('camera-feed');
  const splash     = document.getElementById('splash');
  const loading    = document.getElementById('loading');
  const header     = document.getElementById('header');
  const reticle    = document.getElementById('reticle');
  const chipText   = document.querySelector('#reticle .chip-text');
  const foundBar   = document.getElementById('found-bar');
  const arScene    = document.getElementById('ar-scene');

  const arLinesSvg = document.getElementById('ar-lines');

  function syncSpecLines() {
    const sceneRect = arScene.getBoundingClientRect();
    if (!sceneRect.width || !sceneRect.height) return;

    document.querySelectorAll('.spec-card').forEach(card => {
      const line = document.getElementById(card.dataset.line);
      const target = document.getElementById(card.dataset.target);
      const box = card.querySelector('.spec-image-box');
      if (!line || !target || !box) return;

      const boxRect = box.getBoundingClientRect();
      const targetRect = target.getBoundingClientRect();

      const targetX = targetRect.left + targetRect.width / 2 - sceneRect.left;
      const targetY = targetRect.top + targetRect.height / 2 - sceneRect.top;
      const boxCenterX = boxRect.left + boxRect.width / 2 - sceneRect.left;
      const boxCenterY = boxRect.top + boxRect.height / 2 - sceneRect.top;

      const startX = targetX > boxCenterX ? boxRect.right - sceneRect.left : boxRect.left - sceneRect.left;
      const startY = boxCenterY;

      line.setAttribute('x1', ((startX / sceneRect.width) * 100).toFixed(2) + '%');
      line.setAttribute('y1', ((startY / sceneRect.height) * 100).toFixed(2) + '%');
      line.setAttribute('x2', ((targetX / sceneRect.width) * 100).toFixed(2) + '%');
      line.setAttribute('y2', ((targetY / sceneRect.height) * 100).toFixed(2) + '%');
    });
  }

  window.addEventListener('resize', syncSpecLines);
  window.addEventListener('orientationchange', () => setTimeout(syncSpecLines, 300));

  function isImageBlank(img) {
    try {
      const w = 24, h = 24;
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      const data = ctx.getImageData(0, 0, w, h).data;
      let minLum = 255, maxLum = 0, transparent = 0;
      for (let i = 0; i < data.length; i += 4) {
        const a = data[i + 3];
        if (a < 10) { transparent++; continue; }
        const lum = (data[i] + data[i + 1] + data[i + 2]) / 3;
        if (lum < minLum) minLum = lum;
        if (lum > maxLum) maxLum = lum;
      }
      const total = w * h;
      if (transparent / total > 0.95) return true;
      if ((maxLum - minLum) < 8) return true;
      return false;
    } catch (e) {
      return false;
    }
  }

  function checkImgContent(img) {
    if (isImageBlank(img)) {
      img.parentElement.classList.add('img-failed');
    }
  }

  let isScanningActive = false;
  let isLocked = false;
  let baseBeta = null, baseGamma = null;
  let smoothBeta = 0, smoothGamma = 0; 
  const SMOOTHING = 0.12; 
  const LOSE_THRESHOLD = 25;
  const REGAIN_THRESHOLD = 8;

  async function startSequence() {
    splash.style.display = 'none';
    loading.classList.add('show');
    
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: { ideal: 'environment' } }, audio: false
      });
      video.srcObject = stream;
      await video.play();
    } catch (err) {
      console.warn("Camera unavailable. Using fallback background.");
    }

    try {
      if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
        const response = await DeviceOrientationEvent.requestPermission();
        if (response === 'granted') {
          window.addEventListener('deviceorientation', handleOrientation);
        }
      } else {
        window.addEventListener('deviceorientation', handleOrientation);
      }
    } catch (err) {
      console.error("Motion tracking permission denied.");
    }

    loading.classList.remove('show');
    header.classList.add('show');
    reticle.classList.add('show');
    isScanningActive = true;
    syncSpecLines();
    
    setTimeout(lockOnTarget, 2000);
  }

  function lockOnTarget() {
    if (isLocked || !isScanningActive) return;
    isLocked = true;
    
    reticle.classList.add('locked');
    chipText.textContent = 'LOCKED';
    foundBar.classList.add('show');
    
    arScene.classList.add('active-tracking');
    setTimeout(syncSpecLines, 950);
  }

  function loseTargetTracking() {
    if (!isLocked) return;
    isLocked = false;
    
    reticle.classList.remove('locked');
    chipText.textContent = 'SCANNING';
    foundBar.classList.remove('show');
    
    arScene.classList.remove('active-tracking');
  }

  function handleOrientation(e) {
    if (!isScanningActive || e.beta === null || e.gamma === null) return;

    if (baseBeta === null) { baseBeta = e.beta; baseGamma = e.gamma; return; }

    smoothBeta += ((e.beta - baseBeta) - smoothBeta) * SMOOTHING;
    smoothGamma += ((e.gamma - baseGamma) - smoothGamma) * SMOOTHING;

    const driftAngle = Math.hypot(smoothBeta, smoothGamma);

    if (isLocked) {
      if (driftAngle > LOSE_THRESHOLD) {
        loseTargetTracking();
        return;
      }
      const MAX_SHIFT = 14;
      const shiftX = Math.max(-MAX_SHIFT, Math.min(MAX_SHIFT, smoothGamma * 0.9));
      const shiftY = Math.max(-MAX_SHIFT, Math.min(MAX_SHIFT, smoothBeta * -0.9));
      arScene.style.transform = `translate(${shiftX}px, ${shiftY}px)`;
    } 
    else {
      if (driftAngle < REGAIN_THRESHOLD) { 
        lockOnTarget(); 
      }
    }
  }

  splash.addEventListener('click', startSequence);
</script>

</body>
</html>
