<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Bajaj Pulsar NS400 AR Scanner</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <style>
        html, body { margin: 0; overflow: hidden; width: 100%; height: 100%; background-color: transparent; }
        a-scene { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

        .mindar-ui-overlay { display: none !important; }

        /* Premium Interactive Overlay */
        #start-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #1a0e05 0%, #030201 100%);
            z-index: 9999; display: flex; flex-direction: column;
            justify-content: center; align-items: center; font-family: sans-serif;
        }
        .scan-btn {
            background: linear-gradient(45deg, #ff3d1a, #ffb100);
            border: none; color: #150800; padding: 16px 45px; font-size: 18px;
            font-weight: bold; border-radius: 35px; cursor: pointer; letter-spacing: 1px;
            box-shadow: 0 0 25px rgba(255, 61, 26, 0.45); transition: 0.2s;
            animation: pulseBtn 1.8s ease-in-out infinite;
        }
        @keyframes pulseBtn {
            0%, 100% { box-shadow: 0 0 25px rgba(255, 61, 26, 0.45); transform: scale(1); }
            50% { box-shadow: 0 0 40px rgba(255, 177, 0, 0.65); transform: scale(1.03); }
        }
        #status-txt { color: #ffb100; margin-top: 22px; font-size: 13px; letter-spacing: 2px; }

        /* Mobile HUD Scan Guide */
        #scan-hint {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            color: #ffb100; background: rgba(21, 8, 0, 0.85); padding: 12px 25px;
            border-radius: 20px; font-size: 12px; font-family: sans-serif; z-index: 99;
            border: 1px solid #ffb100; pointer-events: none; opacity: 0; transition: opacity 0.4s;
            text-align: center; width: 75%; max-width: 280px;
            animation: hintFloat 2.4s ease-in-out infinite;
        }
        @keyframes hintFloat {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(-6px); }
        }
    </style>
</head>
<body>

    <div id="start-overlay">
        <button class="scan-btn" id="activate-btn">START BIKE SCANNER</button>
        <div id="status-txt">TAP TO ACTIVATE BIKE AR SCANNER</div>
    </div>

    <div id="scan-hint">POINT CAMERA AT THE BIKE TO SCAN</div>

    <a-scene
        id="main-scene"
        embedded
        mindar-image="imageTargetSrc: targets.mind; autoStart: false; uiLoading: no; uiScanning: no; uiError: no; filterMinCF: 0.0003; filterBeta: 0.06;"
        color-space="sRGB"
        renderer="colorManagement: true; antialias: true; alpha: true; precision: mediump;"
        vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false"
    >
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="bike-anchor" mindar-image-target="targetIndex: 0">

            <a-entity id="spatial-cards" scale="0.001 0.001 0.001"
                      animation__scale="property: scale; to: 0.65 0.65 0.65; dur: 900; easing: easeOutElastic; startEvents: animateFound"
                      animation__out="property: scale; to: 0.001 0.001 0.001; dur: 200; easing: linear; startEvents: animateLost">

                <!-- Rotating energy ring -->
                <a-ring color="#ff6a00" radius-inner="0.63" radius-outer="0.7" rotation="-90 0 0" position="0 -0.35 0" opacity="0.55" shader="flat"
                        animation="property: rotation; to: -90 0 360; loop: true; dur: 6000; easing: linear"></a-ring>
                <a-ring color="#ffb100" radius-inner="0.72" radius-outer="0.74" rotation="-90 0 0" position="0 -0.35 0" opacity="0.3" shader="flat"
                        animation="property: rotation; to: -90 0 -360; loop: true; dur: 9000; easing: linear"></a-ring>

                <!-- Title / model badge : moved higher + stronger highlight treatment -->
                <a-entity position="0 1.25 -0.1">
                    <!-- outer glow halo behind badge -->
                    <a-plane width="2.05" height="0.46" color="#ff6a00" opacity="0" shader="flat"
                             animation__fade="property: material.opacity; from: 0; to: 0.35; dur: 500; startEvents: animateFound"
                             animation__glow="property: material.opacity; from: 0.2; to: 0.5; dir: alternate; loop: true; dur: 1400; startEvents: animateFound"></a-plane>
                    <!-- thin accent border -->
                    <a-plane width="1.85" height="0.36" color="#ffb100" opacity="0" position="0 0 0.005" shader="flat"
                             animation__fade="property: material.opacity; from: 0; to: 0.9; dur: 400; startEvents: animateFound"></a-plane>
                    <!-- dark badge body -->
                    <a-plane width="1.78" height="0.30" color="#150800" opacity="0" shader="flat" position="0 0 0.01"
                             animation__fade="property: material.opacity; from: 0; to: 0.95; dur: 400; delay: 60; startEvents: animateFound"></a-plane>
                    <a-text value="BAJAJ PULSAR NS400" color="#ffb100" align="center" width="3.7" position="0 0.02 0.02" font="kelsonsans"
                            animation__pulse="property: color; from: #ffb100; to: #ff6a00; dir: alternate; loop: true; dur: 1400"></a-text>
                    <a-text value="STREET NAKED · ADVENTURE SPORT" color="#ff9d3d" align="center" width="1.6" position="0 -0.1 0.02" opacity="0.85"></a-text>
                </a-entity>

                <!-- Modern symmetric halo layout: 3 cards left / 3 cards right, evenly spaced -->

                <!-- LEFT COLUMN -->
                <!-- ENGINE (upper-left) -->
                <a-entity position="-0.95 0.45 0.3" rotation="0 25 0">
                    <a-plane width="1.4" height="0.5" color="#1a0e05" opacity="0.9" shader="flat"
                             animation__fade="property: material.opacity; from: 0; to: 0.9; dur: 500; delay: 100; startEvents: animateFound"
                             animation__slide="property: position; from: -1.3 0.45 0.3; to: -0.95 0.45 0.3; dur: 600; delay: 100; easing: easeOutCubic; startEvents: animateFound">
                        <a-text value="⚙ ENGINE\n373.27cc Liquid-Cooled\n40 HP (30kW) / 35 Nm\n6-Speed Gearbox" color="#ffb100" align="center" width="2.15" position="0 0 0.01"></a-text>
                    </a-plane>
                </a-entity>

                <!-- DIMENSIONS (mid-left) -->
                <a-entity position="-0.95 0 0.18" rotation="0 25 0">
                    <a-plane width="1.4" height="0.5" color="#1a0e05" opacity="0.9" shader="flat"
                             animation__fade="property: material.opacity; from: 0; to: 0.9; dur: 500; delay: 250; startEvents: animateFound"
                             animation__slide="property: position; from: -1.3 0 0.18; to: -0.95 0 0.18; dur: 600; delay: 250; easing: easeOutCubic; startEvents: animateFound">
                        <a-text value="📐 DIMENSIONS\nWheelbase 1344mm\nGround Clear. 168mm\nSeat Height 807mm" color="#ff6a00" align="center" width="2.15" position="0 0 0.01"></a-text>
                    </a-plane>
                </a-entity>

                <!-- ELECTRONICS (lower-left) -->
                <a-entity position="-0.95 -0.45 0.3" rotation="0 25 0">
                    <a-plane width="1.4" height="0.42" color="#1a0e05" opacity="0.9" shader="flat"
                             animation__fade="property: material.opacity; from: 0; to: 0.9; dur: 500; delay: 400; startEvents: animateFound"
                             animation__slide="property: position; from: -1.3 -0.45 0.3; to: -0.95 -0.45 0.3; dur: 600; delay: 400; easing: easeOutCubic; startEvents: animateFound">
                        <a-text value="📟 Full LCD Console\n💡 Full-LED Lighting" color="#ffb100" align="center" width="2.05" position="0 0 0.01"></a-text>
                    </a-plane>
                </a-entity>

                <!-- RIGHT COLUMN -->
                <!-- CHASSIS / BRAKES (upper-right) -->
                <a-entity position="0.95 0.45 0.3" rotation="0 -25 0">
                    <a-plane width="1.4" height="0.5" color="#1a0e05" opacity="0.9" shader="flat"
                             animation__fade="property: material.opacity; from: 0; to: 0.9; dur: 500; delay: 175; startEvents: animateFound"
                             animation__slide="property: position; from: 1.3 0.45 0.3; to: 0.95 0.45 0.3; dur: 600; delay: 175; easing: easeOutCubic; startEvents: animateFound">
                        <a-text value="🛞 CHASSIS\nDual Channel ABS + TC\n320mm F / 230mm R Disc\n110/70-17 · 140/70-17" color="#ff6a00" align="center" width="2.15" position="0 0 0.01"></a-text>
                    </a-plane>
                </a-entity>

                <!-- FUEL / TOP SPEED (mid-right) -->
                <a-entity position="0.95 0 0.18" rotation="0 -25 0">
                    <a-plane width="1.4" height="0.42" color="#1a0e05" opacity="0.9" shader="flat"
                             animation__fade="property: material.opacity; from: 0; to: 0.9; dur: 500; delay: 325; startEvents: animateFound"
                             animation__slide="property: position; from: 1.3 0 0.18; to: 0.95 0 0.18; dur: 600; delay: 325; easing: easeOutCubic; startEvents: animateFound">
                        <a-text value="⛽ 12L Tank\n🚀 Top Speed 170 km/h" color="#ffb100" align="center" width="2.05" position="0 0 0.01"></a-text>
                    </a-plane>
                </a-entity>

                <!-- WEIGHT (lower-right) -->
                <a-entity position="0.95 -0.45 0.3" rotation="0 -25 0">
                    <a-plane width="1.2" height="0.4" color="#1a0e05" opacity="0.9" shader="flat"
                             animation__fade="property: material.opacity; from: 0; to: 0.9; dur: 500; delay: 475; startEvents: animateFound"
                             animation__slide="property: position; from: 1.3 -0.45 0.3; to: 0.95 -0.45 0.3; dur: 600; delay: 475; easing: easeOutCubic; startEvents: animateFound">
                        <a-text value="⚖ Kerb Weight\n174 kg" color="#ff6a00" align="center" width="2.0" position="0 0 0.01"></a-text>
                    </a-plane>
                </a-entity>

                <!-- Bottom glow accent line -->
                <a-plane width="1.4" height="0.02" color="#ffb100" position="0 -0.55 0.05" opacity="0.6" shader="flat"
                         animation__glow="property: material.opacity; from: 0.2; to: 0.8; dir: alternate; loop: true; dur: 1200; startEvents: animateFound"></a-plane>

            </a-entity>
        </a-entity>
    </a-scene>

    <script>
        const sceneEl = document.querySelector('#main-scene');
        const activateBtn = document.querySelector('#activate-btn');
        const overlay = document.querySelector('#start-overlay');
        const statusTxt = document.querySelector('#status-txt');
        const anchorEl = document.querySelector('#bike-anchor');
        const cardsContainer = document.querySelector('#spatial-cards');
        const scanHint = document.querySelector('#scan-hint');

        activateBtn.addEventListener('click', async () => {
            statusTxt.innerText = "INITIALIZING BIKE SCAN CORE...";
            try {
                if (sceneEl.hasLoaded) {
                    await sceneEl.systems["mindar-image-system"].start();
                } else {
                    sceneEl.addEventListener('loaded', async () => {
                        await sceneEl.systems["mindar-image-system"].start();
                    });
                }
                overlay.style.display = 'none';
                scanHint.style.opacity = "1";
            } catch (err) {
                console.error(err);
                statusTxt.innerText = "ERROR: CAMERA LAYER DENIED.";
            }
        });

        anchorEl.addEventListener('targetFound', () => {
            cardsContainer.emit('animateFound');
            scanHint.style.opacity = "0";
        });

        anchorEl.addEventListener('targetLost', () => {
            cardsContainer.emit('animateLost');
            scanHint.style.opacity = "1";
        });
    </script>
</body>
</html>
