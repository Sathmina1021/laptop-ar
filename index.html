<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>AR Reality Tech</title>
<script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
</head>
<body>

<a-scene mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiScanning: no;" color-space="sRGB" renderer="colorManagement: true" vr-mode-ui="enabled: false">
  
  <a-assets>
    <!-- පින්තූර ටික PNG (Transparent) විදියට දාගන්න, එතකොට පරණ සුදු box එක එන්නේ නෑ -->
    <img id="card1" src="image/engine.png">
    <img id="card2" src="image/frame.png">
    <img id="card3" src="image/frok.png">
    <img id="card4" src="image/led.png">
  </a-assets>

  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <a-entity mindar-image-target="targetIndex: 0">
    <!-- Floating Cards -->
    <a-entity position="0.5 0.3 0" scale="0.4 0.4 0.4">
        <!-- Glow border එකක් -->
        <a-plane width="1.1" height="1.1" color="#00f0ff" opacity="0.3"></a-plane>
        <!-- කාඩ් එක -->
        <a-plane width="1.0" height="1.0" src="#card1" transparent="true" alpha-test="0.5"></a-plane>
    </a-entity>

    <a-entity position="-0.5 0.3 0" scale="0.4 0.4 0.4">
        <a-plane width="1.1" height="1.1" color="#ff003c" opacity="0.3"></a-plane>
        <a-plane width="1.0" height="1.0" src="#card2" transparent="true" alpha-test="0.5"></a-plane>
    </a-entity>
  </a-entity>
</a-scene>

<script>
    // මේකෙන් අර "Scanning Target" කියන එක ලස්සනට මැකිලා යන්න හදනවා
    const scene = document.querySelector('a-scene');
    scene.addEventListener("loaded", () => {
        document.getElementById("scan-hint").style.display = "none";
    });
</script>
</body>
</html>
