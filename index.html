<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Smart Scooter — AR Spec Scanner</title>
<script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800;900&family=Rajdhani:wght@500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{
  --carbon:#0a0a0c;
  --carbon-2:#141416;
  --pulsar-orange:#ff4b12;
  --pulsar-amber:#ffb400;
  --telemetry-cyan:#00e0ff;
  --geo-silver:#d9dde1;
  --ink:#f3efe6;
  --ink-dim:#9a9a9e;
}
*{box-sizing:border-box;}
html,body{margin:0;overflow:hidden;width:100%;height:100%;background-color:transparent;font-family:'Rajdhani',sans-serif;}
a-scene{position:absolute;top:0;left:0;width:100%;height:100%;z-index:1;}

#mindar-ui-scanning, .mindar-ui-overlay { display: none !important; }

/* ============ MODERN LOADING SCREEN ============ */
#start-overlay{
  position:fixed;inset:0;width:100%;height:100%;z-index:9999;
  background:radial-gradient(circle at center, #141416 0%, #050506 100%);
  display:flex;flex-direction:column;
  transition:all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
  overflow:hidden;
}
.hero-photo-wrap{
  position:relative;width:100%;height:48%;min-height:240px;overflow:hidden;
  clip-path:polygon(0 0,100% 0,100% 86%,0 100%);
  border-bottom: 2px solid var(--pulsar-orange);
}
.hero-photo-wrap img{
  width:100%;height:100%;object-fit:cover;object-position:center 35%;
  filter:saturate(1.1) contrast(1.1);
  transition: transform 6s ease;
}
#start-overlay:hover .hero-photo-wrap img { transform: scale(1.06); }
.hero-photo-wrap::after{
  content:"";position:absolute;inset:0;
  background:linear-gradient(180deg, rgba(5,5,6,0) 30%, rgba(5,5,6,0.98) 98%),
             linear-gradient(90deg, rgba(5,5,6,0.5) 0%, rgba(5,5,6,0) 50%);
}

.content-wrap{
  flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;
  padding:20px max(26px, 5%) max(26px, env(safe-area-inset-bottom)) max(26px, 5%);
  text-align:center;
}
.eyebrow-row{ display:flex;align-items:center;gap:10px;margin-bottom:12px; }
.led-dot{width:9px;height:9px;border-radius:50%;background:var(--pulsar-orange);
  box-shadow:0 0 12px var(--pulsar-orange);animation:pulse 1.4s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.3;transform:scale(0.85);}}
.eyebrow{
  font-family:'JetBrains Mono',monospace;font-size:clamp(10px, 2.5vw, 13px);letter-spacing:4px;
  color:var(--telemetry-cyan);text-transform:uppercase;
}
.brand-title{
  font-family:'Orbitron',sans-serif;font-weight:900;color:var(--ink);
  font-size:clamp(30px, 8vw, 52px);line-height:1.1;letter-spacing:2px;
  text-transform:uppercase;margin:0;
  text-shadow: 0 4px 20px rgba(0,0,0,0.6);
}
.brand-title .accent{ color:var(--pulsar-orange); }

.stat-strip{
  display:grid;grid-template-columns:repeat(3, 1fr);gap:12px;
  width:100%;max-width:640px;margin:28px 0;
  background:rgba(255,255,255,0.03);border-radius:14px;
  border:1px solid rgba(255,255,255,0.08);padding:16px;
}
.stat{ text-align:center;border-right:1px solid rgba(255,255,255,0.08); }
.stat:last-child{border-right:none;}
.stat-value{
  font-family:'Orbitron',sans-serif;font-weight:800;font-size:clamp(16px, 4.5vw, 24px);color:var(--ink);
  display:block;
}
.stat-label{
  font-family:'JetBrains Mono',monospace;font-size:clamp(9px, 2.3vw, 11px);letter-spacing:1.5px;
  color:var(--ink-dim);text-transform:uppercase;display:block;margin-top:6px;
}

.scan-btn{
  position:relative;overflow:hidden;
  background:linear-gradient(135deg,var(--pulsar-orange),var(--pulsar-amber));
  border:none;color:#0a0a0a;padding:18px 45px;font-size:clamp(13px, 3.5vw, 16px);font-weight:900;
  font-family:'Orbitron',sans-serif;border-radius:50px;cursor:pointer;letter-spacing:3px;text-transform:uppercase;
  box-shadow:0 8px 32px rgba(255,75,18,0.45);width:100%;max-width:340px;transition:all 0.3s ease;
}
.scan-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(255,75,18,0.6); }
.scan-btn::after{
  content:"";position:absolute;top:0;left:-100%;width:50%;height:100%;
  background:linear-gradient(120deg, transparent, rgba(255,255,255,0.6), transparent);
  animation:sweep 3s ease-in-out infinite;
}
@keyframes sweep{ 0%{left:-100%;} 50%{left:200%;} 100%{left:200%;} }

#scan-hint{
  position:fixed;bottom:max(36px, env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);
  color:var(--ink);background:rgba(10,10,12,0.92);padding:14px 24px;border-radius:12px;
  font-family:'JetBrains Mono',monospace;font-size:clamp(10px,3vw,12px);font-weight:600;z-index:99;
  border:1px solid var(--pulsar-orange);pointer-events:none;text-align:center;letter-spacing:1.5px;
  backdrop-filter: blur(8px); max-width:90vw; width:max-content;
}
</style>
</head>
<body>

<div id="start-overlay">
  <div class="hero-photo-wrap">
    <img id="bike-hero-img" src="image/images.jpeg" alt="Scooter Preview">
  </div>
  <div class="content-wrap">
    <div>
      <div class="eyebrow-row">
        <div class="led-dot"></div>
        <span id="app-eyebrow" class="eyebrow">AR Spec System</span>
      </div>
      <h1 id="app-title" class="brand-title">Scooter <span class="accent">BKU-0929</span></h1>
    </div>
    <div class="stat-strip" id="json-stats-container"></div>
    <button class="scan-btn" onclick="startScanner()">
      <span>Launch AR Telemetry</span>
    </button>
  </div>
</div>

<div id="scan-hint">Aim Camera at Scooter Target Image</div>

<a-scene id="ar-scene" mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; filterMinCF: 0.0001; filterBeta: 0.005; uiScanning: no;" 
         color-space="sRGB" 
         renderer="colorManagement: true, physicallyCorrectLights" 
         vr-mode-ui="enabled: false" 
         device-orientation-permission-ui="enabled: false">

  <a-assets>
    <a-asset-item id="frame-model" src="./scooter_hud.glb"></a-asset-item>

    <img id="img-engine" src="image/images.jpeg">
    <img id="img-light" src="image/light.jpeg">
    <img id="img-brake" src="image/brake.jpeg">
    <img id="img-gearbox" src="image/gearbox.jpeg">
  </a-assets>

  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

</a-scene>

<script>
  const USE_GLB_FRAME = true;

  // MULTI-ANGLE CONFIGURATION WITH IMAGE MAPS
  const bikeDatabase = [
    {
      "targetIdx": 0,
      "brandName": "Scooter",
      "modelName": "BKU-0929",
      "systemTag": "AR Spec Scanner",
      "dashboardSpecs": [
        { "value": "124.8 cc", "label": "Engine Capacity" },
        { "value": "9.38 PS", "label": "Max Power" },
        { "value": "SmartXonnect", "label": "Telemetry" }
      ],
      "arSeparateCards": [
        { "title": "ENGINE", "imgSrc": "#img-engine", "desc": "124.8 CC\nSINGLE CYLINDER" },
        { "title": "POWER", "imgSrc": "#img-EX-01", "desc": "9.38 PS\n@ 7000 RPM" },
        { "title": "TORQUE", "imgSrc": "#img-light", "desc": "10.5 NM\n@ 5500 RPM" },
        { "title": "BRAKES", "imgSrc": "#img-brake", "desc": "SYNCHRONIZED\nBREATHING ABS" },
        { "title": "GEARBOX", "imgSrc": "#img-gearbox", "desc": "AUTOMATIC\nCENTRIFUGAL" }
      ]
    },
    { "targetIdx": 1, "useSameAs": 0 },
    { "targetIdx": 2, "useSameAs": 0 },
    { "targetIdx": 3, "useSameAs": 0 }
  ];

  let isDragging = false;
  let previousMousePosition = { x: 0 };
  const anchorState = []; 
  const accentPalette = ['#ff4b12', '#00e0ff', '#ffb400', '#ff4b12', '#00e0ff'];

  function buildOctagonFrame(color) {
    const frame = document.createElement('a-entity');
    frame.setAttribute('visible', 'false');
    frame.setAttribute('position', '0 0.1 0.02');
    const sides = 8; const rX = 0.52; const rY = 0.65; const points = [];
    for (let i = 0; i < sides; i++) {
      const angle = (i / sides) * Math.PI * 2 + Math.PI / 8;
      points.push([Math.cos(angle) * rX, Math.sin(angle) * rY]);
    }
    for (let i = 0; i < sides; i++) {
      const p1 = points[i]; const p2 = points[(i + 1) % sides];
      const edge = document.createElement('a-entity');
      edge.setAttribute('line', `start: ${p1[0]} ${p1[1]} 0; end: ${p2[0]} ${p2[1]} 0; color: ${color}`);
      frame.appendChild(edge);
    }
    return frame;
  }

  function buildGlbFrame(color) {
    const frame = document.createElement('a-entity');
    frame.setAttribute('visible', 'false');
    frame.setAttribute('gltf-model', '#frame-model');
    frame.setAttribute('scale', '1.15 1.15 1.15');
    frame.setAttribute('position', '0 0.05 -0.05'); 
    frame.addEventListener('model-loaded', () => {
      const mesh = frame.getObject3D('mesh');
      if (mesh) {
        mesh.traverse((node) => {
          if (node.isMesh && node.material) {
            node.material = node.material.clone();
            if(node.material.color) node.material.color.set(color);
            if(node.material.emissive) node.material.emissive.set(color);
          }
        });
      }
    });
    return frame;
  }

  function buildFrame(color) {
    return USE_GLB_FRAME ? buildGlbFrame(color) : buildOctagonFrame(color);
  }

  // Converts a '#rrggbb' accent color into an rgba() string at a given alpha
  function accentRgba(hex, alpha) {
    const h = hex.replace('#', '');
    const r = parseInt(h.substring(0, 2), 16);
    const g = parseInt(h.substring(2, 4), 16);
    const b = parseInt(h.substring(4, 6), 16);
    return `rgba(${r}, ${g}, ${b}, ${alpha})`;
  }

  // 🎨 Bakes a "moto-poster" style banner texture per spec card:
  // component photo bleeding in from the left (angled cut), a translucent
  // glass-tinted accent panel on the right carrying bold black spec text —
  // same visual language as the reference "BRUTE POWER" banner, duplicated
  // per spec, now with a frosted-glass transparency finish.
  function createSpecBannerTexture(imgEl, title, desc, accent) {
    const SCALE = 2; // higher-res bake for crisper text/edges in AR
    const W = 720 * SCALE, H = 340 * SCALE;
    const canvas = document.createElement('canvas');
    canvas.width = W; canvas.height = H;
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, W, H); // keep canvas alpha channel transparent by default

    // ---- photo panel, clipped to an angled quad on the left ----
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(W * 0.48, 0);
    ctx.lineTo(W * 0.36, H);
    ctx.lineTo(0, H);
    ctx.closePath();
    ctx.clip();
    if (imgEl && imgEl.naturalWidth) {
      const iw = imgEl.naturalWidth, ih = imgEl.naturalHeight;
      const scale = Math.max((W * 0.5) / iw, H / ih);
      const dw = iw * scale, dh = ih * scale;
      ctx.filter = 'saturate(1.15) contrast(1.08)';
      ctx.globalAlpha = 0.92; // slight see-through even over the photo
      ctx.drawImage(imgEl, (W * 0.28 - dw) / 2, (H - dh) / 2, dw, dh);
      ctx.filter = 'none';
      ctx.globalAlpha = 1;
    } else {
      ctx.fillStyle = accentRgba(accent, 0.35);
      ctx.fillRect(0, 0, W * 0.5, H);
    }
    // subtle accent-tinted glass wash over the photo for cohesion
    ctx.fillStyle = accentRgba(accent, 0.12);
    ctx.fillRect(0, 0, W * 0.5, H);
    // fade the photo edge into the banner for a seamless blend
    const edgeGrad = ctx.createLinearGradient(W * 0.22, 0, W * 0.48, 0);
    edgeGrad.addColorStop(0, 'rgba(0,0,0,0)');
    edgeGrad.addColorStop(1, 'rgba(0,0,0,0.55)');
    ctx.fillStyle = edgeGrad;
    ctx.fillRect(0, 0, W * 0.5, H);
    ctx.restore();

    // ---- angled accent panel on the right — translucent frosted glass ----
    ctx.save();
    ctx.shadowColor = 'rgba(0,0,0,0.5)';
    ctx.shadowBlur = 22 * SCALE / 2;
    ctx.shadowOffsetX = -4;
    ctx.beginPath();
    ctx.moveTo(W * 0.36, 0);
    ctx.lineTo(W, 0);
    ctx.lineTo(W, H);
    ctx.lineTo(W * 0.24, H);
    ctx.closePath();
    // base dark-glass fill, then an accent tint on top — gives a glassmorphism look
    ctx.fillStyle = 'rgba(10, 10, 14, 0.55)';
    ctx.fill();
    ctx.fillStyle = accentRgba(accent, 0.62);
    ctx.fill();
    // faint top highlight streak for a glossy glass feel
    const glossGrad = ctx.createLinearGradient(0, 0, 0, H * 0.4);
    glossGrad.addColorStop(0, 'rgba(255,255,255,0.22)');
    glossGrad.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = glossGrad;
    ctx.fill();
    ctx.restore();

    // thin seam along the diagonal cut
    ctx.strokeStyle = 'rgba(10,10,10,0.35)';
    ctx.lineWidth = 5 * SCALE / 2;
    ctx.beginPath();
    ctx.moveTo(W * 0.36, 0);
    ctx.lineTo(W * 0.24, H);
    ctx.stroke();

    // outer border for a crisp poster edge
    ctx.strokeStyle = 'rgba(255,255,255,0.18)';
    ctx.lineWidth = 3 * SCALE / 2;
    ctx.strokeRect(2, 2, W - 4, H - 4);

    // ---- bold title ----
    ctx.fillStyle = '#0a0a0a';
    ctx.textBaseline = 'top';
    ctx.font = `900 ${58 * SCALE}px Arial, sans-serif`;
    ctx.fillText(title.toUpperCase(), W * 0.45, 34 * SCALE);

    // divider under the title
    ctx.fillRect(W * 0.45, 108 * SCALE, 130 * SCALE, 5 * SCALE);

    // ---- spec description lines ----
    ctx.font = `800 ${38 * SCALE}px Arial, sans-serif`;
    const lines = desc.split('\n');
    lines.forEach((line, i) => {
      ctx.fillText(line, W * 0.45, (140 + i * 48) * SCALE);
    });

    return canvas.toDataURL('image/png');
  }

  function buildCards(specsContainer, bikeData) {
    const cardsData = bikeData.arSeparateCards;
    const totalCards = cardsData.length;
    const radius = 1.12; // pushed out to fit the larger poster cards without overlap

    cardsData.forEach((card, index) => {
      const angle = (index / totalCards) * Math.PI * 2;
      const posX = Math.cos(angle) * radius;
      const posY = Math.sin(angle) * radius;
      const accent = accentPalette[index % accentPalette.length];

      const cardEntity = document.createElement('a-entity');
      cardEntity.setAttribute('class', 'spec-card');
      cardEntity.setAttribute('position', `${posX} ${posY} 0.1`);
      cardEntity.setAttribute('rotation', `0 0 ${(angle * 180 / Math.PI) - 90}`);

      // soft glow plate behind the poster for depth
      const glowPlate = document.createElement('a-plane');
      glowPlate.setAttribute('width', '0.72');
      glowPlate.setAttribute('height', '0.36');
      glowPlate.setAttribute('color', accent);
      glowPlate.setAttribute('opacity', '0.22');
      glowPlate.setAttribute('position', '0.012 -0.014 0.004');
      glowPlate.setAttribute('material', 'shader: flat; side: double; transparent: true');
      cardEntity.appendChild(glowPlate);

      // poster plane — texture gets baked in once the source photo is ready.
      // transparent + opacity < 1 gives the whole card a frosted-glass HUD feel.
      const posterPlane = document.createElement('a-plane');
      posterPlane.setAttribute('width', '0.7');
      posterPlane.setAttribute('height', '0.33');
      posterPlane.setAttribute('position', '0 0 0.01');
      posterPlane.setAttribute('material', 'shader: flat; side: double; transparent: true; opacity: 0.93; alphaTest: 0.02');
      cardEntity.appendChild(posterPlane);

      const applyTexture = () => {
        const imgEl = document.querySelector(card.imgSrc);
        const dataUrl = createSpecBannerTexture(imgEl, card.title, card.desc, accent);
        posterPlane.setAttribute('material', 'src', dataUrl);
      };

      const sourceImg = document.querySelector(card.imgSrc);
      if (sourceImg && sourceImg.complete && sourceImg.naturalWidth) {
        applyTexture();
      } else if (sourceImg) {
        sourceImg.addEventListener('load', applyTexture, { once: true });
        sourceImg.addEventListener('error', applyTexture, { once: true });
      } else {
        applyTexture();
      }

      specsContainer.appendChild(cardEntity);
    });
  }

  function buildBrandTitle(bikeData) {
    const brandTitleEntity = document.createElement('a-entity');
    brandTitleEntity.setAttribute('position', '0 1.05 0.02');

    const brandBg = document.createElement('a-plane');
    brandBg.setAttribute('width', '0.75');
    brandBg.setAttribute('height', '0.16');
    brandBg.setAttribute('color', '#0a0d12');
    brandBg.setAttribute('opacity', '0.85');

    const brandText = document.createElement('a-text');
    brandText.setAttribute('value', `${bikeData.modelName.toUpperCase()} / ${bikeData.systemTag.toUpperCase()}`);
    brandText.setAttribute('color', '#f3efe6');
    brandText.setAttribute('align', 'center');
    brandText.setAttribute('width', '1.3');
    brandText.setAttribute('font', 'roboto');

    brandTitleEntity.appendChild(brandBg);
    brandTitleEntity.appendChild(brandText);
    return brandTitleEntity;
  }

  document.addEventListener("DOMContentLoaded", () => {
    const baseBike = bikeDatabase[0];
    document.getElementById("app-eyebrow").innerText = baseBike.systemTag;
    document.getElementById("app-title").innerHTML = `${baseBike.brandName} <span class="accent">${baseBike.modelName}</span>`;

    const gridContainer = document.getElementById("json-stats-container");
    gridContainer.innerHTML = "";
    baseBike.dashboardSpecs.forEach(spec => {
      const statBlock = document.createElement("div");
      statBlock.className = "stat";
      statBlock.innerHTML = `<span class="stat-value">${spec.value}</span><span class="stat-label">${spec.label}</span>`;
      gridContainer.appendChild(statBlock);
    });

    const arScene = document.getElementById('ar-scene');

    bikeDatabase.forEach((bikeData, idx) => {
      const actualData = bikeData.useSameAs !== undefined ? bikeDatabase[bikeData.useSameAs] : bikeData;
      
      const anchor = document.createElement('a-entity');
      anchor.setAttribute('mindar-image-target', `targetIndex: ${idx}`);

      const accent = accentPalette[idx % accentPalette.length];
      const frameEntity = buildFrame(accent);
      const brandTitle = buildBrandTitle(actualData);

      const specsContainer = document.createElement('a-entity');
      specsContainer.setAttribute('position', '0 0 0');
      buildCards(specsContainer, actualData);

      anchor.appendChild(frameEntity);
      anchor.appendChild(brandTitle);
      anchor.appendChild(specsContainer);
      arScene.appendChild(anchor);

      const state = { specsContainer, frameEntity, tracked: false };
      anchorState[idx] = state;

      anchor.addEventListener("targetFound", () => {
        state.tracked = true;
        frameEntity.setAttribute('visible', 'true');
        document.getElementById("scan-hint").style.display = "none";
      });
      anchor.addEventListener("targetLost", () => {
        state.tracked = false;
        frameEntity.setAttribute('visible', 'false');
        if (!anchorState.some(s => s && s.tracked)) {
          document.getElementById("scan-hint").style.display = "block";
        }
      });
    });

    autoSpin();
  });

  // Turntable dragging engine
  const startDrag = (clientX) => { isDragging = true; previousMousePosition.x = clientX; };
  const updateDrag = (clientX) => {
    if (!isDragging) return;
    const deltaX = clientX - previousMousePosition.x;
    anchorState.forEach(state => {
      if (!state || !state.tracked) return;
      const currentRotation = state.specsContainer.getAttribute('rotation') || { x: 0, y: 0, z: 0 };
      state.specsContainer.setAttribute('rotation', { x: currentRotation.x, y: currentRotation.y, z: currentRotation.z + deltaX * 0.4 });
    });
    previousMousePosition.x = clientX;
  };
  const endDrag = () => { isDragging = false; };

  window.addEventListener('mousedown', (e) => startDrag(e.clientX));
  window.addEventListener('mousemove', (e) => updateDrag(e.clientX));
  window.addEventListener('mouseup', endDrag);
  window.addEventListener('touchstart', (e) => { if(e.touches.length === 1) startDrag(e.touches[0].clientX); });
  window.addEventListener('touchmove', (e) => { if(e.touches.length === 1) updateDrag(e.touches[0].clientX); });
  window.addEventListener('touchend', endDrag);

  function autoSpin() {
    requestAnimationFrame(autoSpin);
    anchorState.forEach(state => {
      if (!state || !state.tracked) return;
      if (!isDragging) {
        // Rotate on Z (in-plane, like a clock hand) — same axis as the drag
        // gesture below — so every poster card keeps facing the camera and
        // never swings through Y into showing its mirrored back face.
        const currentRot = state.specsContainer.getAttribute('rotation') || { x: 0, y: 0, z: 0 };
        state.specsContainer.setAttribute('rotation', { x: currentRot.x, y: currentRot.y, z: currentRot.z + 0.2 });
      }
    });
  }

  function showArError(message) {
    const hint = document.getElementById('scan-hint');
    hint.innerText = message;
    hint.style.borderColor = '#ff2b2b';
    hint.style.color = '#ffbcbc';
    hint.style.display = 'block';
    console.error('[AR ERROR]', message);
  }

  function startScanner() {
    const overlay = document.getElementById('start-overlay');
    const scene = document.getElementById('ar-scene');

    const beginAr = () => {
      // Explicitly request camera permission first so we can catch the exact
      // failure reason (denied / no camera / insecure context / already in use)
      // instead of silently ending up on a blank white screen.
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        showArError('Camera API not available. Needs HTTPS + a modern browser.');
        return;
      }

      navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
        .then((stream) => {
          // permission confirmed — release this test stream, MindAR opens its own
          stream.getTracks().forEach((t) => t.stop());

          overlay.style.opacity = '0';
          overlay.style.transform = 'scale(1.05)';
          setTimeout(() => {
            overlay.style.display = 'none';
            try {
              scene.systems['mindar-image-system'].start();
            } catch (err) {
              showArError('AR failed to start: ' + err.message);
            }
          }, 800);
        })
        .catch((err) => {
          // Common err.name values: NotAllowedError, NotFoundError,
          // NotReadableError, OverconstrainedError, SecurityError
          showArError('Camera error (' + err.name + '): ' + err.message);
        });
    };

    if (scene.hasLoaded) {
      beginAr();
    } else {
      showArError('Scene still loading, tap again in a moment…');
      scene.addEventListener('loaded', beginAr, { once: true });
    }
  }

  document.addEventListener('DOMContentLoaded', () => {
    const scene = document.getElementById('ar-scene');
    scene.addEventListener('arError', () => {
      showArError('MindAR failed to initialize — check that targets.mind loaded correctly (open DevTools console for details).');
    });
  });
</script>
</body>
</html>
