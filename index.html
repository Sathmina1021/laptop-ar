<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Phone View Optimized AR Scanner</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <style>
        html, body { margin: 0; overflow: hidden; width: 100%; height: 100%; background-color: transparent; }
        a-scene { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        
        .mindar-ui-overlay { display: none !important; }
        
        /* Interactive Overlay to open camera securely on mobile */
        #start-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #0c1a30 0%, #020813 100%);
            z-index: 9999; display: flex; flex-direction: column;
            justify-content: center; align-items: center; font-family: sans-serif;
        }
        .scan-btn {
            background: linear-gradient(45deg, #00f0ff, #00ff9c);
            border: none; color: #020813; padding: 16px 45px; font-size: 18px;
            font-weight: bold; border-radius: 35px; cursor: pointer; letter-spacing: 1px;
            box-shadow: 0 0 25px rgba(0, 240, 255, 0.4); transition: 0.2s;
        }
        #status-txt { color: #00f0ff; margin-top: 22px; font-size: 13px; letter-spacing: 2px; }
        
        /* Mobile HUD Scan Guide Hint */
        #scan-hint {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            color: #00ff9c; background: rgba(2, 8, 19, 0.85); padding: 12px 25px;
            border-radius: 20px; font-size: 12px; font-family: sans-serif; z-index: 99;
            border: 1px solid #00ff9c; pointer-events: none; opacity: 0; transition: opacity 0.4s;
            text-align: center; width: 70%; max-width: 280px;
        }
    </style>
</head>
<body>

    <div id="start-overlay">
        <button class="scan-btn" id="activate-btn">START AR SCANNER</button>
        <div id="status-txt">TAP TO ACTIVATE MOBILE CAMERA</div>
    </div>

    <div id="scan-hint">POINT CAMERA AT LAPTOP OBJECT</div>

    <a-scene
        id="main-scene"
        embedded
        mindar-image="imageTargetSrc: targets.mind; autoStart: false; uiLoading: no; uiScanning: no; uiError: no;"
        color-space="sRGB"
        renderer="colorManagement: true; antialias: false; alpha: true; precision: mediump;"
        vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false"
    >
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="laptop-anchor" mindar-image-target="targetIndex: 0">
            
            <a-entity id="spatial-cards" scale="0.001 0.001 0.001"
                      animation__in="property: scale; to: 0.65 0.65 0.65; dur: 500; easing: easeOutBack; startEvents: animateFound"
                      animation__out="property: scale; to: 0.001 0.001 0.001; dur: 150; easing: linear; startEvents: animateLost">

                <a-ring color="#00f0ff" radius-inner="0.6" radius-outer="0.64" rotation="-90 0 0" position="0 -0.2 0" opacity="0.6" shader="flat"></a-ring>
                
                <a-entity position="0 0.7 -0.1" text="value: ASUS EXPERTBOOK; color: #00f0ff; align: center; width: 3.8; font: kelsonsans; bold: true"></a-entity>

                <a-entity position="-0.65 0.3 0.2" rotation="0 30 0">
                    <a-plane width="1.15" height="0.28" color="#030b18" opacity="0.9" shader="flat">
                        <a-text value="Intel Core i5\n11th Gen Processor" color="#00ff9c" align="center" width="2.0" position="0 0 0.01"></a-text>
                    </a-plane>
                </a-entity>

                <a-entity position="0.65 0.3 0.2" rotation="0 -30 0">
                    <a-plane width="1.05" height="0.28" color="#030b18" opacity="0.9" shader="flat">
                        <a-text value="8GB DDR4 RAM\nHigh-Speed Memory" color="#00ff9c" align="center" width="2.0" position="0 0 0.01"></a-text>
                    </a-plane>
                </a-entity>

                <a-entity position="-0.75 0.1 -0.3" rotation="0 55 0">
                    <a-plane width="1.1" height="0.28" color="#030b18" opacity="0.9" shader="flat">
                        <a-text value="512GB M.2 NVMe\nUltra-Fast SSD" color="#00f0ff" align="center" width="2.0" position="0 0 0.01"></a-text>
                    </a-plane>
                </a-entity>

                <a-entity position="0.75 0.1 -0.3" rotation="0 -55 0">
                    <a-plane width="1.15" height="0.28" color="#030b18" opacity="0.9" shader="flat">
                        <a-text value="14 FHD Display\nAnti-Glare Screen" color="#00f0ff" align="center" width="2.0" position="0 0 0.01"></a-text>
                    </a-plane>
                </a-entity>

                <a-entity position="0 0.98 -0.12" rotation="8 0 0">
                    <a-plane width="1.1" height="0.28" color="#030b18" opacity="0.9" shader="flat">
                        <a-text value="42Wh Battery\nLong-Life Runtime" color="#00ff9c" align="center" width="2.0" position="0 0 0.01"></a-text>
                    </a-plane>
                </a-entity>

            </a-entity>
        </a-entity>
    </a-scene>

    <script>
        const sceneEl = document.querySelector('#main-scene');
        const activateBtn = document.querySelector('#activate-btn');
        const overlay = document.querySelector('#start-overlay');
        const statusTxt = document.querySelector('#status-txt');
        const anchorEl = document.querySelector('#laptop-anchor');
        const cardsContainer = document.querySelector('#spatial-cards');
        const scanHint = document.querySelector('#scan-hint');

        activateBtn.addEventListener('click', async () => {
            statusTxt.innerText = "OPENING MOBILE CAMERA LAYER...";
            try {
                if (sceneEl.hasLoaded) {
                    await sceneEl.systems["mindar-image-system"].start();
                } else {
                    sceneEl.addEventListener('loaded', async () => {
                        await sceneEl.systems["mindar-image-system"].start();
                    });
                }
                overlay.style.display = 'none'; 
                scanHint.style.opacity = "1";
            } catch (err) {
                console.error(err);
                statusTxt.innerText = "ERROR: SYSTEM WEBCAM PERMISSION DENIED.";
            }
        });

        anchorEl.addEventListener('targetFound', () => {
            cardsContainer.emit('animateFound');
            scanHint.style.opacity = "0"; 
        });

        anchorEl.addEventListener('targetLost', () => {
            cardsContainer.emit('animateLost');
            scanHint.style.opacity = "1"; 
        });
    </script>
</body>
</html>
