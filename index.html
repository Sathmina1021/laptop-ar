<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Bajaj Pulsar NS200 — AR Spec Scanner</title>
<script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800;900&family=Rajdhani:wght@500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{
  --carbon:#0a0a0c;
  --carbon-2:#141416;
  --pulsar-orange:#ff4b12;
  --pulsar-amber:#ffb400;
  --telemetry-cyan:#00e0ff;
  --geo-silver:#d9dde1;
  --ink:#f3efe6;
  --ink-dim:#9a9a9e;
}
*{box-sizing:border-box;}
html,body{margin:0;overflow:hidden;width:100%;height:100%;background-color:transparent;font-family:'Rajdhani',sans-serif;}
a-scene{position:absolute;top:0;left:0;width:100%;height:100%;z-index:1;}

#mindar-ui-scanning, .mindar-ui-overlay { display: none !important; }

/* ============ MODERN LOADING SCREEN ============ */
#start-overlay{
  position:fixed;inset:0;width:100%;height:100%;z-index:9999;
  background:radial-gradient(circle at center, #141416 0%, #050506 100%);
  display:flex;flex-direction:column;
  transition:all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
  overflow:hidden;
}
.hero-photo-wrap{
  position:relative;width:100%;height:48%;min-height:240px;overflow:hidden;
  clip-path:polygon(0 0,100% 0,100% 86%,0 100%);
  border-bottom: 2px solid var(--pulsar-orange);
}
.hero-photo-wrap img{
  width:100%;height:100%;object-fit:cover;object-position:center 35%;
  filter:saturate(1.1) contrast(1.1);
  transition: transform 6s ease;
}
#start-overlay:hover .hero-photo-wrap img { transform: scale(1.06); }
.hero-photo-wrap::after{
  content:"";position:absolute;inset:0;
  background:linear-gradient(180deg, rgba(5,5,6,0) 30%, rgba(5,5,6,0.98) 98%),
             linear-gradient(90deg, rgba(5,5,6,0.5) 0%, rgba(5,5,6,0) 50%);
}

.content-wrap{
  flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;
  padding:20px max(26px, 5%) max(26px, env(safe-area-inset-bottom)) max(26px, 5%);
  text-align:center;
}
.eyebrow-row{ display:flex;align-items:center;gap:10px;margin-bottom:12px; }
.led-dot{width:9px;height:9px;border-radius:50%;background:var(--pulsar-orange);
  box-shadow:0 0 12px var(--pulsar-orange);animation:pulse 1.4s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.3;transform:scale(0.85);}}
.eyebrow{
  font-family:'JetBrains Mono',monospace;font-size:clamp(10px, 2.5vw, 13px);letter-spacing:4px;
  color:var(--telemetry-cyan);text-transform:uppercase;
}
.brand-title{
  font-family:'Orbitron',sans-serif;font-weight:900;color:var(--ink);
  font-size:clamp(30px, 8vw, 52px);line-height:1.1;letter-spacing:2px;
  text-transform:uppercase;margin:0;
  text-shadow: 0 4px 20px rgba(0,0,0,0.6);
}
.brand-title .accent{ color:var(--pulsar-orange); }

.stat-strip{
  display:grid;grid-template-columns:repeat(3, 1fr);gap:12px;
  width:100%;max-width:640px;margin:28px 0;
  background:rgba(255,255,255,0.03);border-radius:14px;
  border:1px solid rgba(255,255,255,0.08);padding:16px;
}
.stat{ text-align:center;border-right:1px solid rgba(255,255,255,0.08); }
.stat:last-child{border-right:none;}
.stat-value{
  font-family:'Orbitron',sans-serif;font-weight:800;font-size:clamp(16px, 4.5vw, 24px);color:var(--ink);
  display:block;
}
.stat-label{
  font-family:'JetBrains Mono',monospace;font-size:clamp(9px, 2.3vw, 11px);letter-spacing:1.5px;
  color:var(--ink-dim);text-transform:uppercase;display:block;margin-top:6px;
}

.scan-btn{
  position:relative;overflow:hidden;
  background:linear-gradient(135deg,var(--pulsar-orange),var(--pulsar-amber));
  border:none;color:#0a0a0a;padding:18px 45px;font-size:clamp(13px, 3.5vw, 16px);font-weight:900;
  font-family:'Orbitron',sans-serif;border-radius:50px;cursor:pointer;letter-spacing:3px;text-transform:uppercase;
  box-shadow:0 8px 32px rgba(255,75,18,0.45);width:100%;max-width:340px;transition:all 0.3s ease;
}
.scan-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(255,75,18,0.6); }
.scan-btn::after{
  content:"";position:absolute;top:0;left:-100%;width:50%;height:100%;
  background:linear-gradient(120deg, transparent, rgba(255,255,255,0.6), transparent);
  animation:sweep 3s ease-in-out infinite;
}
@keyframes sweep{ 0%{left:-100%;} 50%{left:200%;} 100%{left:200%;} }

#scan-hint{
  position:fixed;bottom:max(36px, env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);
  color:var(--ink);background:rgba(10,10,12,0.92);padding:14px 24px;border-radius:12px;
  font-family:'JetBrains Mono',monospace;font-size:clamp(10px,3vw,12px);font-weight:600;z-index:99;
  border:1px solid var(--pulsar-orange);pointer-events:none;text-align:center;letter-spacing:1.5px;
  backdrop-filter: blur(8px); max-width:90vw; width:max-content;
}
</style>
</head>
<body>

<div id="start-overlay">
  <div class="hero-photo-wrap">
    <img id="bike-hero-img" src="data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDAAcFBQYFBAcGBgYIBwcICxILCwoKCxYPEA0SGhYbGhkWGRgcICgiHB4mHhgZIzAkJiorLS4tGyIyNTEsNSgsLSz..." alt="Bajaj Pulsar NS200">
  </div>
  <div class="content-wrap">
    <div>
      <div class="eyebrow-row">
        <div class="led-dot"></div>
        <span id="app-eyebrow" class="eyebrow">AR Spec System</span>
      </div>
      <h1 id="app-title" class="brand-title">Pulsar <span class="accent">NS200</span></h1>
    </div>
    <div class="stat-strip" id="json-stats-container"></div>
    <button class="scan-btn" onclick="startScanner()">
      <span>Launch AR Telemetry</span>
    </button>
  </div>
</div>

<div id="scan-hint">Point Camera at the Marker to Begin</div>

<a-scene mindar-image="imageTargetSrc: ./targets.mind; filterMinCF: 0.0001; filterBeta: 10; warmupTolerance: 2; missTolerance: 3; uiScanning: no;" 
         color-space="sRGB" 
         renderer="colorManagement: true, physicallyCorrectLights" 
         vr-mode-ui="enabled: false" 
         device-orientation-permission-ui="enabled: false">
  
  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <a-entity id="target-anchor" mindar-image-target="targetIndex: 0">
    
    <a-entity id="brand-title" position="0 0.78 0.05"></a-entity>

    <a-entity id="specs-container" position="0 0 0" visible="true">
       </a-entity>

  </a-entity>
</a-scene>

<script>
  // Central JSON Database - Each item will generate a separate creative 3D card layout!
  const backendJsonData = {
    "brandName": "Pulsar",
    "modelName": "NS200",
    "systemTag": "AR Spec Telemetry",
    "dashboardSpecs": [
      { "value": "24.5 PS", "label": "Max Power" },
      { "value": "18.7 Nm", "label": "Max Torque" },
      { "value": "199.5 cc", "label": "Liquid Cooled" }
    ],
    // These items will instantly layout into separate cards floating around the target
    "arSeparateCards": [
      { "title": "ENGINE", "desc": "199.5 CC LIQUID COOLED" },
      { "title": "POWER", "desc": "24.5 PS @ 9750 RPM" },
      { "title": "TORQUE", "desc": "18.7 NM @ 8000 RPM" },
      { "title": "BRAKES", "desc": "DUAL CHANNEL ABS" },
      { "title": "GEARBOX", "desc": "6-SPEED TRANSMISSION" }
    ]
  };

  let targetTracked = false;
  let isDragging = false;
  let previousMousePosition = { x: 0 };
  const specsContainer = document.getElementById('specs-container');

  document.addEventListener("DOMContentLoaded", () => {
    // Inject UI Loading Screen Content
    document.getElementById("app-eyebrow").innerText = backendJsonData.systemTag;
    document.getElementById("app-title").innerHTML = `${backendJsonData.brandName} <span class="accent">${backendJsonData.modelName}</span>`;
    
    const gridContainer = document.getElementById("json-stats-container");
    gridContainer.innerHTML = "";
    backendJsonData.dashboardSpecs.forEach(spec => {
      const statBlock = document.createElement("div");
      statBlock.className = "stat";
      statBlock.innerHTML = `<span class="stat-value">${spec.value}</span><span class="stat-label">${spec.label}</span>`;
      gridContainer.appendChild(statBlock);
    });

    // FLOATING BRAND TITLE ABOVE OBJECT — glass treatment to match the spec cards
    const brandTitleEntity = document.getElementById('brand-title');

    const brandGlow = document.createElement('a-plane');
    brandGlow.setAttribute('width', '0.74');
    brandGlow.setAttribute('height', '0.2');
    brandGlow.setAttribute('color', '#ff4b12');
    brandGlow.setAttribute('opacity', '0.16');
    brandGlow.setAttribute('material', 'transparent: true; shader: flat; side: double');
    brandGlow.setAttribute('position', '0 0 -0.006');

    const brandGlass = document.createElement('a-plane');
    brandGlass.setAttribute('width', '0.64');
    brandGlass.setAttribute('height', '0.15');
    brandGlass.setAttribute('color', '#dbe7ee');
    brandGlass.setAttribute('opacity', '0.1');
    brandGlass.setAttribute('material', 'transparent: true; shader: flat; side: double');
    brandGlass.setAttribute('position', '0 0 -0.003');

    const brandBg = document.createElement('a-plane');
    brandBg.setAttribute('width', '0.64');
    brandBg.setAttribute('height', '0.15');
    brandBg.setAttribute('color', '#05070a');
    brandBg.setAttribute('opacity', '0.6');
    brandBg.setAttribute('material', 'transparent: true; side: double');
    brandBg.setAttribute('position', '0 0 -0.0015');

    const brandShine = document.createElement('a-plane');
    brandShine.setAttribute('width', '0.58');
    brandShine.setAttribute('height', '0.03');
    brandShine.setAttribute('color', '#ffffff');
    brandShine.setAttribute('opacity', '0.12');
    brandShine.setAttribute('material', 'transparent: true; shader: flat; side: double');
    brandShine.setAttribute('position', '0 0.052 0.0005');

    const brandAccentTop = document.createElement('a-entity');
    brandAccentTop.setAttribute('line', 'start: -0.32 0.075 0.001; end: 0.32 0.075 0.001; color: #ff4b12; opacity: 0.9');
    const brandAccentBottom = document.createElement('a-entity');
    brandAccentBottom.setAttribute('line', 'start: -0.32 -0.075 0.001; end: 0.32 -0.075 0.001; color: #00e0ff; opacity: 0.9');

    const brandText = document.createElement('a-text');
    brandText.setAttribute('value', `${backendJsonData.brandName.toUpperCase()} ${backendJsonData.modelName.toUpperCase()}`);
    brandText.setAttribute('color', '#ffb400');
    brandText.setAttribute('align', 'center');
    brandText.setAttribute('position', '0 -0.008 0.01');
    brandText.setAttribute('width', '1.1');
    brandText.setAttribute('font', 'roboto');
    brandText.setAttribute('letter-spacing', '2');

    brandTitleEntity.appendChild(brandGlow);
    brandTitleEntity.appendChild(brandGlass);
    brandTitleEntity.appendChild(brandBg);
    brandTitleEntity.appendChild(brandShine);
    brandTitleEntity.appendChild(brandAccentTop);
    brandTitleEntity.appendChild(brandAccentBottom);
    brandTitleEntity.appendChild(brandText);

    // AMBIENT STAGE GLOW — soft concentric rings beneath/around the object,
    // like a product spotlight, so the whole scene reads as a polished showcase.
    const stageGlowEntity = document.createElement('a-entity');
    stageGlowEntity.setAttribute('position', '0 0 -0.02');
    stageGlowEntity.setAttribute('rotation', '-90 0 0');
    [
      { r: 0.95, o: 0.05 },
      { r: 0.75, o: 0.07 },
      { r: 0.55, o: 0.09 }
    ].forEach(ring => {
      const glowRing = document.createElement('a-ring');
      glowRing.setAttribute('color', '#00e0ff');
      glowRing.setAttribute('radius-inner', (ring.r - 0.01).toString());
      glowRing.setAttribute('radius-outer', ring.r.toString());
      glowRing.setAttribute('opacity', ring.o.toString());
      glowRing.setAttribute('material', 'shader: flat; transparent: true; side: double');
      stageGlowEntity.appendChild(glowRing);
    });
    document.getElementById('target-anchor').appendChild(stageGlowEntity);

    // BUILD INDIVIDUAL 3D CARDS FROM JSON DATA — 360° HELIX AROUND THE OBJECT
    // Cards are spread around a horizontal circle (X-Z plane) AND staggered in
    // height (Y) so no two cards ever line up in front of each other on screen.
    // The whole ring spins around the Y-axis — like a turntable circling the bike —
    // which is what actually reads as "cards orbiting 360° around the object" to the eye.
    // The "BAJAJ PULSAR NS" title lives on its own fixed entity and never rotates.
    const cardsData = backendJsonData.arSeparateCards;
    const totalCards = cardsData.length;
    const ringRadius = 0.75;     // how far out the ring sits from the object
    const heightSpan = 0.95;     // total vertical spread of the helix (top card to bottom card)

    // Distinct accent colors per card, cycling through the brand + telemetry palette
    const accentPalette = ['#ff4b12', '#00e0ff', '#ffb400', '#ff4b12', '#00e0ff', '#ffb400'];

    cardsData.forEach((card, index) => {
      // Even angular spread all the way around (0° to 360°)
      const angle = (index / totalCards) * Math.PI * 2;

      // Height staggers from top to bottom across the set of cards so, even when
      // the ring spins, each card keeps its own vertical "lane" and never overlaps another.
      const t = totalCards > 1 ? index / (totalCards - 1) : 0.5;
      const posY = (0.5 - t) * heightSpan;

      const posX = Math.sin(angle) * ringRadius;
      const posZ = Math.cos(angle) * ringRadius;
      const accent = accentPalette[index % accentPalette.length];

      // Leader line from the object center out to this card (stops just short of the
      // card face so it never pokes through / z-fights with the glass panel while spinning)
      const leaderLine = document.createElement('a-entity');
      leaderLine.setAttribute('line', `start: 0 0 0; end: ${posX * 0.9} ${posY * 0.9} ${posZ * 0.9}; color: ${accent}; opacity: 0.5`);
      specsContainer.appendChild(leaderLine);

      // Small node dot where the line meets the object surface
      const nodeDot = document.createElement('a-circle');
      nodeDot.setAttribute('radius', '0.012');
      nodeDot.setAttribute('color', accent);
      nodeDot.setAttribute('position', `${posX * 0.62} ${posY * 0.62} ${posZ * 0.62}`);
      nodeDot.setAttribute('material', 'shader: flat');
      specsContainer.appendChild(nodeDot);

      // Outer Card Component Group
      const cardEntity = document.createElement('a-entity');
      cardEntity.setAttribute('class', 'spec-card');
      cardEntity.setAttribute('position', `${posX} ${posY} ${posZ}`);

      // Card always faces outward, away from the object (front side toward the viewer)
      cardEntity.setAttribute('look-at', '0 0 0');

      // GLASS TAG — built as two real, independent faces (front + back, 180° apart)
      // instead of one double-sided plane. This is what actually keeps the text
      // crisp and correctly readable (not mirrored/glitchy) no matter which side
      // of the ring is currently facing the camera as it spins past.
      const buildGlassFace = (rotY) => {
        const face = document.createElement('a-entity');
        face.setAttribute('rotation', `0 ${rotY} 0`);

        // Soft accent bloom behind the glass
        const glow = document.createElement('a-plane');
        glow.setAttribute('width', '0.54');
        glow.setAttribute('height', '0.26');
        glow.setAttribute('color', accent);
        glow.setAttribute('opacity', '0.15');
        glow.setAttribute('material', 'transparent: true; shader: flat; side: front');
        glow.setAttribute('position', '0 0 -0.006');
        face.appendChild(glow);

        // Frosted glass tint
        const glass = document.createElement('a-plane');
        glass.setAttribute('width', '0.46');
        glass.setAttribute('height', '0.2');
        glass.setAttribute('color', '#dbe7ee');
        glass.setAttribute('opacity', '0.12');
        glass.setAttribute('material', 'transparent: true; shader: flat; side: front');
        glass.setAttribute('position', '0 0 -0.003');
        face.appendChild(glass);

        // Dark backing so the text keeps contrast through the "glass"
        const tint = document.createElement('a-plane');
        tint.setAttribute('width', '0.46');
        tint.setAttribute('height', '0.2');
        tint.setAttribute('color', '#05070a');
        tint.setAttribute('opacity', '0.45');
        tint.setAttribute('material', 'transparent: true; shader: flat; side: front');
        tint.setAttribute('position', '0 0 -0.0015');
        face.appendChild(tint);

        // Glass shine sliver near the top edge
        const shine = document.createElement('a-plane');
        shine.setAttribute('width', '0.4');
        shine.setAttribute('height', '0.04');
        shine.setAttribute('color', '#ffffff');
        shine.setAttribute('opacity', '0.12');
        shine.setAttribute('material', 'transparent: true; shader: flat; side: front');
        shine.setAttribute('position', '0 0.072 0.0005');
        face.appendChild(shine);

        // Thin accent frame
        const mkLine = (x1, y1, x2, y2) => {
          const l = document.createElement('a-entity');
          l.setAttribute('line', `start: ${x1} ${y1} 0.003; end: ${x2} ${y2} 0.003; color: ${accent}; opacity: 0.85`);
          return l;
        };
        face.appendChild(mkLine(-0.21, 0.1, 0.21, 0.1));
        face.appendChild(mkLine(-0.21, -0.1, 0.21, -0.1));
        face.appendChild(mkLine(-0.23, -0.08, -0.23, 0.08));
        face.appendChild(mkLine(0.23, -0.08, 0.23, 0.08));

        // Telemetry accent chip
        const chip = document.createElement('a-circle');
        chip.setAttribute('radius', '0.011');
        chip.setAttribute('color', accent);
        chip.setAttribute('position', '-0.185 0.075 0.004');
        chip.setAttribute('material', 'shader: flat');
        face.appendChild(chip);

        // Header Text
        const titleText = document.createElement('a-text');
        titleText.setAttribute('value', card.title);
        titleText.setAttribute('color', accent);
        titleText.setAttribute('align', 'center');
        titleText.setAttribute('position', '0 0.045 0.006');
        titleText.setAttribute('width', '0.85');
        titleText.setAttribute('font', 'roboto');
        titleText.setAttribute('letter-spacing', '1');
        face.appendChild(titleText);

        // Description Text
        const descText = document.createElement('a-text');
        descText.setAttribute('value', card.desc);
        descText.setAttribute('color', '#f3efe6');
        descText.setAttribute('align', 'center');
        descText.setAttribute('position', '0 -0.035 0.006');
        descText.setAttribute('width', '0.68');
        descText.setAttribute('font', 'roboto');
        face.appendChild(descText);

        return face;
      };

      cardEntity.appendChild(buildGlassFace(0));    // front face — reads correctly toward the outside
      cardEntity.appendChild(buildGlassFace(180));  // back face — reads correctly from the opposite side
      specsContainer.appendChild(cardEntity);
    });

    // MindAR Trackers
    const targetAnchor = document.getElementById('target-anchor');
    targetAnchor.addEventListener("targetFound", () => { 
      targetTracked = true; 
      document.getElementById("scan-hint").style.display = "none";
    });
    targetAnchor.addEventListener("targetLost", () => { 
      targetTracked = false; 
      document.getElementById("scan-hint").style.display = "block";
    });

    // Run continuous spin framework loop
    autoSpin();
  });

  // Smooth Interactive Touch/Drag Orbit System — RING SPINS ON THE Y-AXIS (TURNTABLE)
  // Horizontal drag (left/right swipe) spins the ring around the object, like turning
  // a turntable. The BAJAJ PULSAR NS title lives on its own fixed entity and is untouched.
  let previousMousePositionFull = { x: 0 };
  const startDrag = (clientX) => { isDragging = true; previousMousePositionFull.x = clientX; };
  const updateDrag = (clientX) => {
    if (!isDragging || !targetTracked) return;
    const deltaX = clientX - previousMousePositionFull.x;
    const currentRotation = specsContainer.getAttribute('rotation') || { x: 0, y: 0, z: 0 };
    specsContainer.setAttribute('rotation', {
      x: currentRotation.x,
      y: currentRotation.y + deltaX * 0.4,
      z: currentRotation.z
    });
    previousMousePositionFull.x = clientX;
  };
  const endDrag = () => { isDragging = false; };

  window.addEventListener('mousedown', (e) => startDrag(e.clientX));
  window.addEventListener('mousemove', (e) => updateDrag(e.clientX));
  window.addEventListener('mouseup', endDrag);
  window.addEventListener('touchstart', (e) => { if(e.touches.length === 1) startDrag(e.touches[0].clientX); });
  window.addEventListener('touchmove', (e) => { if(e.touches.length === 1) updateDrag(e.touches[0].clientX); });
  window.addEventListener('touchend', endDrag);

  // Auto Orbit Engine Control — steady spin purely around the Y-axis,
  // so the ring of specs continuously circles the object left-to-right
  // while the brand title above stays perfectly still.
  function autoSpin() {
    requestAnimationFrame(autoSpin);
    if (!isDragging && targetTracked) {
      const currentRot = specsContainer.getAttribute('rotation') || { x: 0, y: 0, z: 0 };
      specsContainer.setAttribute('rotation', {
        x: currentRot.x,
        y: currentRot.y + 0.25,
        z: currentRot.z
      });
    }
  }

  function startScanner() {
    const overlay = document.getElementById('start-overlay');
    overlay.style.opacity = '0';
    overlay.style.transform = 'scale(1.05)';
    setTimeout(() => { overlay.style.display = 'none'; }, 800);
  }
</script>
</body>
</html>
