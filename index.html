<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>XQOM AR - Realistic Vehicle HUD</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">

<!-- A-Frame & MindAR Scripts -->
<script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Rajdhani', sans-serif; color: #fff; }

  /* ============ FIX CAMERA BLACK SCREEN / CANVAS STYLING ============ */
  .a-canvas {
    position: fixed !important;
    top: 0 !important;
    left: 0 !important;
    width: 100% !important;
    height: 100% !important;
    z-index: -1 !important;
    object-fit: cover !important;
  }

  /* ============ UI OVERLAY LAYER ============ */
  #ui-layer {
    position: absolute; inset: 0; z-index: 999; pointer-events: none;
  }

  /* ============ SPLASH SCREEN ============ */
  #splash {
    position: absolute; inset: 0; z-index: 1000; pointer-events: auto;
    background: radial-gradient(ellipse at center, #071018 0%, #000 85%);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; padding: 24px; cursor: pointer;
  }
  #splash .logo { font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 36px; letter-spacing: 5px; color: #00f0ff; text-shadow: 0 0 15px #00f0ff, 0 0 30px rgba(0,240,255,0.6); }
  #splash .logo span { color: #fff; }
  #splash .tagline { margin-top: 10px; font-size: 13px; letter-spacing: 3px; color: rgba(255,255,255,0.7); }
  #start-btn {
    margin-top: 50px; width: 80px; height: 80px; border-radius: 50%;
    border: 2px solid #00f0ff; background: rgba(0,240,255,0.1);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 20px rgba(0,240,255,0.6), inset 0 0 15px rgba(0,240,255,0.3);
    animation: pulseBtn 1.5s ease-in-out infinite;
  }
  #start-btn svg { width: 30px; height: 30px; }
  @keyframes pulseBtn {
    0%, 100% { transform: scale(1); box-shadow: 0 0 20px rgba(0,240,255,0.6), inset 0 0 15px rgba(0,240,255,0.3); }
    50% { transform: scale(1.08); box-shadow: 0 0 35px rgba(0,240,255,0.8), inset 0 0 20px rgba(0,240,255,0.5); }
  }
  #splash .hint { margin-top: 25px; font-family: 'Orbitron', sans-serif; font-size: 11px; letter-spacing: 2px; color: #9df9ff; }

  /* ============ LOADING ============ */
  #loading { position: absolute; inset: 0; z-index: 900; background: rgba(0,0,0,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; }
  #loading.show { display: flex; }
  .spinner { position: relative; width: 65px; height: 65px; }
  .spinner .ring { position: absolute; inset: 0; border-radius: 50%; border: 3px solid transparent; border-top-color: #00f0ff; border-right-color: #00f0ff; animation: spin 1s linear infinite; }
  .spinner .ring.r2 { inset: 10px; border-top-color: transparent; border-right-color: transparent; border-bottom-color: #ff2d55; border-left-color: #ff2d55; animation-duration: 1.5s; animation-direction: reverse; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading .txt { margin-top: 20px; font-family: 'Orbitron', sans-serif; font-size: 11px; letter-spacing: 2px; color: #9df9ff; text-shadow: 0 0 6px rgba(0,240,255,0.7); }

  /* ============ HEADER ============ */
  #header {
    position: absolute; top: 0; left: 0; width: 100%;
    padding: 20px 16px 30px; text-align: center;
    background: linear-gradient(180deg, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.4) 60%, rgba(0,0,0,0) 100%);
    opacity: 0; transition: opacity 0.6s ease;
  }
  #header.show { opacity: 1; }
  #header .h1 { font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 26px; letter-spacing: 4px; color: #00f0ff; text-shadow: 0 0 12px rgba(0,240,255,0.7); }
  #header .h2 { margin-top: 4px; font-family: 'Orbitron', sans-serif; font-size: 10px; letter-spacing: 3px; color: #fff; }

  /* ============ SCANNING RADAR EFFECT ============ */
  #radar-sweep {
    position: absolute; inset: 0; pointer-events: none; opacity: 0; transition: opacity 0.5s ease;
    background: linear-gradient(180deg, transparent 40%, rgba(0,240,255,0.15) 50%, transparent 60%);
    background-size: 100% 200%;
    animation: radarMove 3s linear infinite;
  }
  @keyframes radarMove { 0% { background-position: 0% -100%; } 100% { background-position: 0% 200%; } }
  #radar-sweep.show { opacity: 1; }

  /* ============ SCAN RETICLE ============ */
  #reticle {
    position: absolute; left: 50%; top: 48%; width: 55vw; max-width: 280px; aspect-ratio: 1.35/1;
    transform: translate(-50%, -50%); 
    opacity: 0; transition: opacity 0.5s ease;
  }
  #reticle.show { opacity: 1; }
  #reticle .chip {
    position: absolute; top: -30px; left: 50%; transform: translateX(-50%);
    display: flex; align-items: center; gap: 6px; padding: 4px 12px 4px 8px;
    background: rgba(4,10,14,0.85); border: 1px solid rgba(0,240,255,0.6); border-radius: 20px;
    font-family: 'Orbitron', sans-serif; font-size: 10px; letter-spacing: 1.5px; color: #9df9ff;
    box-shadow: 0 0 10px rgba(0,240,255,0.3);
    transition: all 0.4s ease;
  }
  #reticle .chip .dot { width: 6px; height: 6px; border-radius: 50%; background: #00f0ff; animation: dotPulse 1s ease-in-out infinite; }
  @keyframes dotPulse { 0%,100% { opacity: 1; } 50% { opacity: 0.2; } }
  
  #reticle.locked .chip { border-color: #39ffb0; color: #fff; background: rgba(57,255,176,0.2); box-shadow: 0 0 15px rgba(57,255,176,0.5); }
  #reticle.locked .chip .dot { background: #39ffb0; animation: none; box-shadow: 0 0 8px #39ffb0; }

  .r-corner { position: absolute; width: 22px; height: 22px; border: 2.5px solid #00f0ff; filter: drop-shadow(0 0 4px #00f0ff); transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
  .r-corner.tl { top: 0; left: 0; border-right: none; border-bottom: none; border-radius: 8px 0 0 0; }
  .r-corner.tr { top: 0; right: 0; border-left: none; border-bottom: none; border-radius: 0 8px 0 0; }
  .r-corner.bl { bottom: 0; left: 0; border-right: none; border-top: none; border-radius: 0 0 0 8px; }
  .r-corner.br { bottom: 0; right: 0; border-left: none; border-top: none; border-radius: 0 0 8px 0; }
  #reticle.locked .r-corner { border-color: #39ffb0; filter: drop-shadow(0 0 6px #39ffb0); width: 14px; height: 14px; }

  #reticle .scanline {
    position: absolute; left: 5%; right: 5%; top: 10%; height: 1px;
    background: linear-gradient(90deg, transparent, #00f0ff, transparent);
    box-shadow: 0 0 8px #00f0ff; animation: scanMove 1.5s linear infinite;
  }
  #reticle.locked .scanline { display: none; opacity: 0; }
  @keyframes scanMove { 0% { top: 10%; opacity: 0; } 15% { opacity: 1; } 85% { opacity: 1; } 100% { top: 90%; opacity: 0; } }

  /* ============ AR SCENE & CREATIVE IMAGE CARDS ============ */
  #ar-scene {
    position: absolute; inset: 0; 
    perspective: 1000px; transform-style: preserve-3d;
  }

  /* Connecting Lines */
  .spec-line {
    stroke-dasharray: 1000; stroke-dashoffset: 1000; opacity: 0;
    transition: stroke-dashoffset 0.9s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.5s ease;
  }
  .active-tracking .spec-line { stroke-dashoffset: 0; opacity: 1; }

  /* Target Markers */
  .target {
    position: absolute; width: 24px; height: 24px;
    transform: translate(-50%, -50%) scale(0.1); opacity: 0;
    transition: opacity 0.4s ease, transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .active-tracking .target { opacity: 1; transform: translate(-50%, -50%) scale(1); }
  
  .target .dot {
    position: absolute; top: 50%; left: 50%;
    width: 5px; height: 5px; background: #fff; border-radius: 50%;
    transform: translate(-50%, -50%); box-shadow: 0 0 10px #fff;
  }
  .target .arcs {
    position: absolute; inset: 0; border: 1.5px solid rgba(0,240,255,0.9); border-radius: 50%;
    border-top-color: transparent; border-bottom-color: transparent;
    animation: spinTarget 2.5s linear infinite;
  }
  @keyframes spinTarget { 100% { transform: rotate(360deg); } }

  /* --- The Compact & Creative Image Cards --- */
  .spec-card {
    position: absolute;
    width: 120px; 
    opacity: 0;
    transform: translateY(30px) scale(0.7) translateZ(-40px) rotateX(-10deg);
    transition: all 0.6s cubic-bezier(0.25, 1, 0.5, 1);
    filter: drop-shadow(0 8px 16px rgba(0,0,0,0.8));
  }
  
  .active-tracking .spec-card { 
    opacity: 1; 
    transform: translateY(0) scale(1) translateZ(0) rotateX(0deg); 
  }
  
  .active-tracking .card-delay-1 { transition-delay: 0.1s; }
  .active-tracking .card-delay-2 { transition-delay: 0.2s; }
  .active-tracking .card-delay-3 { transition-delay: 0.3s; }
  .active-tracking .card-delay-4 { transition-delay: 0.4s; }

  .spec-label {
    font-family: 'Orbitron', sans-serif; font-size: 8px; font-weight: 700;
    color: #00f0ff; letter-spacing: 1px; margin-bottom: 5px;
    text-shadow: 0 0 5px rgba(0,240,255,0.6);
    display: flex; align-items: center; gap: 5px;
  }
  .spec-label::before {
    content: ''; display: inline-block; width: 4px; height: 4px;
    background: #00f0ff; border-radius: 50%; box-shadow: 0 0 6px #00f0ff;
  }

  .spec-image-box {
    width: 100%;
    border: 1px solid rgba(0, 240, 255, 0.5);
    background: rgba(5, 10, 15, 0.75);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border-radius: 6px;
    padding: 4px;
    box-shadow: 0 0 15px rgba(0, 240, 255, 0.2), inset 0 0 10px rgba(0, 240, 255, 0.15);
    position: relative;
    overflow: hidden;
  }
  
  .spec-image-box::after {
    content: ''; position: absolute; top: -100%; left: 0; width: 100%; height: 2px;
    background: rgba(0, 240, 255, 0.9);
    box-shadow: 0 0 8px #00f0ff;
    animation: techScan 3.5s ease-in-out infinite; z-index: 2;
  }
  @keyframes techScan { 0%, 100% { top: -10px; opacity: 0; } 50% { top: 110%; opacity: 1; } }

  .spec-image-box img {
    width: 100%; height: auto; display: block; border-radius: 3px;
  }

  /* ============ BOTTOM STATUS ============ */
  #found-bar {
    position: absolute; bottom: 0; left: 0; width: 100%; padding: 15px 20px 25px; 
    background: linear-gradient(0deg, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0) 100%);
    text-align: center; opacity: 0; transform: translateY(15px);
    transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  #found-bar.show { opacity: 1; transform: translateY(0); }
  #found-bar .title { font-family: 'Orbitron', sans-serif; font-size: 13px; letter-spacing: 2px; color: #fff; }
  #found-bar .title span { color: #39ffb0; text-shadow: 0 0 8px rgba(57,255,176,0.8); }
  #found-bar .sub { margin-top: 4px; font-size: 10px; letter-spacing: 1.5px; color: rgba(255,255,255,0.5); }
</style>
</head>
<body>

<!-- UI OVERLAY -->
<div id="ui-layer">
  
  <div id="splash">
    <div class="logo">XQOM <span>AR</span></div>
    <div class="tagline">VEHICLE SPEC SCANNER</div>
    <div id="start-btn">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M4 8V6a2 2 0 0 1 2-2h2M4 16v2a2 2 0 0 0 2 2h2M20 8V6a2 2 0 0 0-2-2h-2M20 16v2a2 2 0 0 1-2 2h-2" stroke="#00f0ff" stroke-width="2" stroke-linecap="round"/>
        <circle cx="12" cy="12" r="3.4" stroke="#00f0ff" stroke-width="2"/>
      </svg>
    </div>
    <div class="hint">TAP ANYWHERE TO START</div>
  </div>

  <div id="loading">
    <div class="spinner"><div class="ring"></div><div class="ring r2"></div></div>
    <div class="txt">INITIALIZING SYSTEM<span>...</span></div>
  </div>

  <div id="header">
    <div class="h1">VEHICLE SPECS</div>
    <div class="h2">[ LIVE TELEMETRY ]</div>
  </div>

  <!-- Radar Scanning Effect Background -->
  <div id="radar-sweep"></div>

  <div id="reticle">
    <div class="chip"><span class="dot"></span><span class="chip-text">SCANNING</span></div>
    <div class="r-corner tl"></div>
    <div class="r-corner tr"></div>
    <div class="r-corner bl"></div>
    <div class="r-corner br"></div>
    <div class="scanline"></div>
  </div>

  <!-- HUD Animation Wrapper -->
  <div id="ar-scene">
    
    <svg id="ar-lines" style="position: absolute; inset: 0; width: 100%; height: 100%; z-index: 1;">
      <line x1="26%" y1="26%" x2="42%" y2="40%" stroke="rgba(0,240,255,0.6)" stroke-width="1.5" class="spec-line"/>
      <line x1="26%" y1="65%" x2="48%" y2="60%" stroke="rgba(0,240,255,0.6)" stroke-width="1.5" class="spec-line card-delay-1"/>
      <line x1="74%" y1="26%" x2="58%" y2="45%" stroke="rgba(0,240,255,0.6)" stroke-width="1.5" class="spec-line card-delay-2"/>
      <line x1="74%" y1="50%" x2="55%" y2="50%" stroke="rgba(0,240,255,0.6)" stroke-width="1.5" class="spec-line card-delay-3"/>
      <line x1="74%" y1="75%" x2="62%" y2="65%" stroke="rgba(0,240,255,0.6)" stroke-width="1.5" class="spec-line card-delay-4"/>
    </svg>

    <div class="target" style="left: 42%; top: 40%;"><div class="dot"></div><div class="arcs"></div></div>
    <div class="target card-delay-1" style="left: 48%; top: 60%;"><div class="dot"></div><div class="arcs"></div></div>
    <div class="target card-delay-2" style="left: 58%; top: 45%;"><div class="dot"></div><div class="arcs"></div></div>
    <div class="target card-delay-3" style="left: 55%; top: 50%;"><div class="dot"></div><div class="arcs"></div></div>
    <div class="target card-delay-4" style="left: 62%; top: 65%;"><div class="dot"></div><div class="arcs"></div></div>

    <div class="spec-card" style="left: 10%; top: 20%;">
      <div class="spec-label">SYS.01 // OPTICS</div>
      <div class="spec-image-box"><img src="image/led-system.png" alt="LED System"></div>
    </div>

    <div class="spec-card card-delay-1" style="left: 10%; top: 58%;">
      <div class="spec-label">SYS.02 // POWER</div>
      <div class="spec-image-box"><img src="image/engine.png" alt="Engine"></div>
    </div>

    <div class="spec-card card-delay-2" style="left: 65%; top: 20%;">
      <div class="spec-label">SYS.03 // SUSPENSION</div>
      <div class="spec-image-box"><img src="image/frok.png" alt="Front Fork"></div>
    </div>

    <div class="spec-card card-delay-3" style="left: 65%; top: 45%;">
      <div class="spec-label">SYS.04 // AERO</div>
      <div class="spec-image-box"><img src="image/styling.png" alt="Styling"></div>
    </div>

    <div class="spec-card card-delay-4" style="left: 65%; top: 70%;">
      <div class="spec-label">SYS.05 // CHASSIS</div>
      <div class="spec-image-box"><img src="image/frame.png" alt="Perimeter Frame"></div>
    </div>

  </div>

  <div id="found-bar">
    <div class="title">TARGET LOCKED <span>&mdash; DATA STREAM ACTIVE</span></div>
    <div class="sub">Holographic modules displaying live telemetry</div>
  </div>

</div>

<!-- MIND AR SCENE -->
<a-scene mindar-image="imageTargetSrc: targets.mind; autoStart: false; uiLoading: no; uiError: no; uiScanning: no;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
  <a-entity id="tracking-target" mindar-image-target="targetIndex: 0"></a-entity>
</a-scene>

<script>
  const splash = document.getElementById('splash');
  const loading = document.getElementById('loading');
  const header = document.getElementById('header');
  const reticle = document.getElementById('reticle');
  const radarSweep = document.getElementById('radar-sweep');
  const chipText = document.querySelector('#reticle .chip-text');
  const foundBar = document.getElementById('found-bar');
  const arScene = document.getElementById('ar-scene');

  const sceneEl = document.querySelector('a-scene');
  const trackingTarget = document.getElementById('tracking-target');

  // Parallax Smoothing Variables
  let baseBeta = null, baseGamma = null;
  let smoothBeta = 0, smoothGamma = 0; 
  const SMOOTHING = 0.12; 

  // 1. Click to Start AR Engine
  splash.addEventListener('click', async () => {
    splash.style.display = 'none';
    loading.classList.add('show');
    
    // Request Motion Permissions for Parallax Effect (iOS 13+ requirement)
    if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
      try {
        const response = await DeviceOrientationEvent.requestPermission();
        if (response === 'granted') {
          window.addEventListener('deviceorientation', handleOrientation);
        }
      } catch (err) {
        console.warn("Motion tracking permission denied.");
      }
    } else {
      window.addEventListener('deviceorientation', handleOrientation);
    }

    // Start MindAR Engine
    sceneEl.systems["mindar-image-system"].start();
  });

  // 2. Camera Ready -> Show UI
  sceneEl.addEventListener("arReady", () => {
    loading.classList.remove('show');
    header.classList.add('show');
    reticle.classList.add('show');
    radarSweep.classList.add('show');
  });

  // 3. ACTUAL TRACKING - Target Found
  trackingTarget.addEventListener("targetFound", () => {
    radarSweep.classList.remove('show');
    reticle.classList.add('locked');
    chipText.textContent = 'LOCKED';
    foundBar.classList.add('show');
    arScene.classList.add('active-tracking');
  });

  // 4. ACTUAL TRACKING - Target Lost
  trackingTarget.addEventListener("targetLost", () => {
    radarSweep.classList.add('show');
    reticle.classList.remove('locked');
    chipText.textContent = 'SCANNING';
    foundBar.classList.remove('show');
    arScene.classList.remove('active-tracking');
  });

  // 5. Gyro Parallax Effect
  function handleOrientation(e) {
    if (e.beta === null || e.gamma === null) return;

    if (baseBeta === null) { baseBeta = e.beta; baseGamma = e.gamma; return; }

    smoothBeta += ((e.beta - baseBeta) - smoothBeta) * SMOOTHING;
    smoothGamma += ((e.gamma - baseGamma) - smoothGamma) * SMOOTHING;

    const rotY = smoothGamma * 0.4; 
    const rotX = smoothBeta * -0.4; 
    arScene.style.transform = `rotateY(${rotY}deg) rotateX(${rotX}deg)`;
  }
</script>

</body>
</html>
