<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Bajaj Pulsar NS200 AR Interactive Scanner</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
        :root {
            --brand-orange: #ff4500;
            --brand-amber: #ffb100;
        }
        html, body { margin: 0; overflow: hidden; width: 100%; height: 100%; background-color: transparent; font-family: system-ui, sans-serif; }
        a-scene { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

        /* START SCREEN OVERLAY */
        #start-overlay {
            position: fixed; inset: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #140701 0%, #000000 100%);
            z-index: 9999; display: flex; flex-direction: column;
            justify-content: center; align-items: center; padding: 20px; box-sizing: border-box;
            transition: opacity 0.5s ease;
        }
        .brand-title { color: #fff; font-size: 28px; letter-spacing: 4px; font-weight: 900; text-align: center; text-transform: uppercase; margin-bottom: 30px; }
        .brand-title span { color: var(--brand-orange); text-shadow: 0 0 10px var(--brand-orange); }
        
        .scan-btn { 
            background: linear-gradient(135deg, var(--brand-orange), var(--brand-amber)); 
            border: none; color: #000; padding: 16px 40px; font-size: 15px; font-weight: 800; 
            border-radius: 50px; cursor: pointer; letter-spacing: 2px; box-shadow: 0 0 25px rgba(255, 69, 0, 0.4); 
        }

        /* BOTTOM SCAN HINT */
        #scan-hint { 
            position: fixed; bottom: max(40px, env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%); 
            color: #fff; background: rgba(0, 0, 0, 0.85); padding: 14px 30px; border-radius: 30px; 
            font-size: 13px; font-weight: 700; z-index: 99; border: 2px solid var(--brand-orange); 
            pointer-events: none; text-align: center; letter-spacing: 2px;
            box-shadow: 0 0 20px rgba(255, 69, 0, 0.5);
        }

        /* INTERACTIVE HINT */
        #interaction-hint {
            position: fixed; top: 40px; left: 50%; transform: translateX(-50%);
            color: var(--brand-amber); background: rgba(0, 0, 0, 0.6); padding: 8px 20px;
            border-radius: 20px; font-size: 11px; font-weight: 600; letter-spacing: 1px;
            z-index: 99; pointer-events: none; display: none; text-transform: uppercase;
        }
    </style>
</head>
<body>

    <!-- Onboarding Screen -->
    <div id="start-overlay">
        <div class="brand-title">PULSAR NS200<br><span>AR SCANNER</span></div>
        <button class="scan-btn" id="activate-btn">START SCANNER</button>
    </div>

    <!-- Scan Hint Overlay -->
    <div id="scan-hint">ALIGN CAMERA WITH THE PULSAR IMAGE</div>
    <div id="interaction-hint">← Swipe / Drag to Rotate Specs 360° →</div>

    <!-- AR Scene -->
    <a-scene
        id="main-scene"
        mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiScanning: no; uiLoading: no;"
        color-space="sRGB"
        renderer="colorManagement: true; antialias: true; alpha: true;"
        vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false"
    >
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <!-- AR Target Anchor (Bike Center) -->
        <a-entity id="bike-anchor" mindar-image-target="targetIndex: 0">
            
            <!-- MAIN ANIMATED TOP TITLE -->
            <a-entity position="0 0.65 0" id="main-title-group" scale="0 0 0">
                <a-plane width="0.9" height="0.16" color="#ff4500" shader="flat" opacity="0.8"></a-plane>
                <a-plane width="0.86" height="0.12" color="#050201" shader="flat" position="0 0 0.001"></a-plane>
                <a-text id="main-bike-title" value="" color="#ffffff" align="center" width="2.2" font="exo2bold" position="0 0 0.002"
                        animation="property: scale; to: 1.05 1.05 1.05; dir: alternate; dur: 1000; loop: true; easing: easeInOutQuad">
                </a-text>
            </a-entity>

            <!-- Tech HUD Center Circle -->
            <a-circle radius="0.4" color="#ffb100" opacity="0.15" shader="flat" position="0 0 -0.01"
                      animation="property: rotation; to: 0 0 360; dur: 15000; loop: true; easing: linear">
            </a-circle>

            <!-- 360 DEGREE DYNAMIC SPECIFICATION CONTAINER -->
            <a-entity id="specs-container" position="0 0 0"></a-entity>

        </a-entity>
    </a-scene>

    <script>
        // 1. Your Provided JSON Data connected to the script
        const bikeData = {
          "targetImage": {
            "width": 800,
            "height": 600,
            "status": "connected"
          },
          "motorcycle": {
            "brand": "Bajaj",
            "model": "Pulsar NS200",
            "specifications": {
              "engine": {
                "type": "Liquid Cooled, 4-valve FI 6-speed",
                "displacement": "199.5 cc",
                "max_power": "18 kW (24.5 PS) @ 9750rpm",
                "max_torque": "18.74 Nm @ 8000 rpm"
              },
              "brakes": {
                "front": "Dual Channel ABS, 300 mm Disc",
                "rear": "230 mm Disc (ABS)"
              },
              "suspension": {
                "front": "37 mm USD",
                "rear": "Nitrox Monoshock"
              },
              "tyres": {
                "front": "100/80-17 52 P Tubeless",
                "rear": "130/70-17 62 P Tubeless"
              },
              "dimensions": {
                "length": "2017 mm",
                "width": "804 mm",
                "height": "1075 mm",
                "ground_clearance": "168 mm",
                "wheelbase": "1363 mm",
                "kerb_weight": "158 kg",
                "fuel_tank_capacity": "12 L"
              },
              "electricals": {
                "console_features": [
                  "Turn-by-turn navigation",
                  "Bluetooth Connectivity",
                  "Gear position indicator",
                  "Distance-to-empty-indicator",
                  "IFE",
                  "AFE"
                ],
                "headlamp": "LED DRLs, LED HeadLamps, & LED Turn Indicators",
                "mobile_charger": "USB Connectivity"
              }
            }
          }
        };

        const sceneEl = document.querySelector('#main-scene');
        const activateBtn = document.querySelector('#activate-btn');
        const overlay = document.querySelector('#start-overlay');
        const scanHint = document.querySelector('#scan-hint');
        const interactHint = document.querySelector('#interaction-hint');
        const anchor = document.querySelector('#bike-anchor');
        const mainTitle = document.querySelector('#main-title-group');
        const specsContainer = document.querySelector('#specs-container');

        let isDragging = false;
        let previousMousePosition = { x: 0 };
        let targetTracked = false;

        // 2. Generate and Inject 360° Specs Dynamically from JSON
        function generate360Specs() {
            // Set Main Title Header from JSON
            document.querySelector('#main-bike-title').setAttribute('value', `${bikeData.motorcycle.brand} ${bikeData.motorcycle.model}`.toUpperCase());

            const specs = [
                {
                    title: "ENGINE",
                    info: `Type: ${bikeData.motorcycle.specifications.engine.type}\nDisp: ${bikeData.motorcycle.specifications.engine.displacement}\nPower: ${bikeData.motorcycle.specifications.engine.max_power}\nTorque: ${bikeData.motorcycle.specifications.engine.max_torque}`
                },
                {
                    title: "BRAKES & TYRES",
                    info: `Front: ${bikeData.motorcycle.specifications.brakes.front}\nRear: ${bikeData.motorcycle.specifications.brakes.rear}\nTyre F: ${bikeData.motorcycle.specifications.tyres.front}\nTyre R: ${bikeData.motorcycle.specifications.tyres.rear}`
                },
                {
                    title: "SUSPENSION",
                    info: `Front: ${bikeData.motorcycle.specifications.suspension.front}\nRear: ${bikeData.motorcycle.specifications.suspension.rear}`
                },
                {
                    title: "ELECTRICALS",
                    info: `Lights: ${bikeData.motorcycle.specifications.electricals.headlamp.split(',')[0]}\nUSB: ${bikeData.motorcycle.specifications.electricals.mobile_charger}\nSmart: Bluetooth, Navigation\n${bikeData.motorcycle.specifications.electricals.console_features[2]}`
                },
                {
                    title: "DIMENSIONS",
                    info: `L x W x H: ${bikeData.motorcycle.specifications.dimensions.length} x ${bikeData.motorcycle.specifications.dimensions.width}\nClearance: ${bikeData.motorcycle.specifications.dimensions.ground_clearance}\nWeight: ${bikeData.motorcycle.specifications.dimensions.kerb_weight}\nTank: ${bikeData.motorcycle.specifications.dimensions.fuel_tank_capacity}`
                }
            ];

            const radius = 0.65; // Distance from center
            const totalCards = specs.length;

            specs.forEach((spec, index) => {
                const angle = (index / totalCards) * Math.PI * 2;
                const x = Math.sin(angle) * radius;
                const z = Math.cos(angle) * radius;
                const rotY = (angle * 180) / Math.PI;

                // Card Base Entity
                const cardEntity = document.createElement('a-entity');
                cardEntity.setAttribute('class', 'spec-card');
                cardEntity.setAttribute('position', `${x} ${index % 2 === 0 ? 0.15 : -0.15} ${z}`);
                cardEntity.setAttribute('rotation', `0 ${rotY} 0`);
                cardEntity.setAttribute('scale', '0 0 0');

                // Tech Line Pointer connecting to the bike center
                const line = document.createElement('a-line');
                line.setAttribute('start', '0 0 0');
                line.setAttribute('end', `${-x} ${index % 2 === 0 ? -0.15 : 0.15} ${-z}`);
                line.setAttribute('color', index % 2 === 0 ? '#ff4500' : '#ffb100');
                line.setAttribute('opacity', '0.4');
                cardEntity.appendChild(line);

                // UI Plate
                const basePlane = document.createElement('a-plane');
                basePlane.setAttribute('width', '0.52');
                basePlane.setAttribute('height', '0.24');
                basePlane.setAttribute('color', '#0a0401');
                basePlane.setAttribute('opacity', '0.92');
                basePlane.setAttribute('shader', 'flat');

                // Glowing Top Border
                const border = document.createElement('a-plane');
                border.setAttribute('width', '0.52');
                border.setAttribute('height', '0.015');
                border.setAttribute('color', index % 2 === 0 ? '#ff4500' : '#ffb100');
                border.setAttribute('position', '0 0.1125 0.001');
                basePlane.appendChild(border);

                // Spec Title
                const titleText = document.createElement('a-text');
                titleText.setAttribute('value', spec.title);
                titleText.setAttribute('color', index % 2 === 0 ? '#ffb100' : '#ff4500');
                titleText.setAttribute('align', 'center');
                titleText.setAttribute('width', '1.3');
                titleText.setAttribute('position', '0 0.07 0.002');
                titleText.setAttribute('font', 'exo2bold');
                basePlane.appendChild(titleText);

                // Spec Details
                const bodyText = document.createElement('a-text');
                bodyText.setAttribute('value', spec.info);
                bodyText.setAttribute('color', '#ffffff');
                bodyText.setAttribute('align', 'center');
                bodyText.setAttribute('width', '0.85');
                bodyText.setAttribute('position', '0 -0.03 0.002');
                basePlane.appendChild(bodyText);

                cardEntity.appendChild(basePlane);
                specsContainer.appendChild(cardEntity);
            });
        }

        // Initialize dynamic specification setup
        generate360Specs();

        // Start AR System
        activateBtn.addEventListener('click', async () => {
            try {
                if (!sceneEl.hasLoaded) {
                    await new Promise(resolve => sceneEl.addEventListener('loaded', resolve, { once: true }));
                }
                await sceneEl.systems['mindar-image-system'].start();
                overlay.style.opacity = '0';
                setTimeout(() => { overlay.style.display = 'none'; }, 500);
            } catch (err) {
                console.error(err);
                alert("Camera access is required for AR!");
            }
        });

        // Target Found Handlers
        anchor.addEventListener('targetFound', () => {
            scanHint.style.display = 'none';
            interactHint.style.display = 'block';
            targetTracked = true;
            
            mainTitle.setAttribute('animation', {
                property: 'scale', from: '0 0 0', to: '1 1 1', dur: 600, easing: 'easeOutBack'
            });

            document.querySelectorAll('.spec-card').forEach((card, index) => {
                card.setAttribute('animation', {
                    property: 'scale', from: '0 0 0', to: '1 1 1', dur: 600, delay: index * 150, easing: 'easeOutElastic'
                });
            });
        });

        // Target Lost Handlers
        anchor.addEventListener('targetLost', () => {
            scanHint.style.display = 'block';
            interactHint.style.display = 'none';
            targetTracked = false;
            mainTitle.setAttribute('scale', '0 0 0');
            mainTitle.removeAttribute('animation');
            document.querySelectorAll('.spec-card').forEach(card => {
                card.setAttribute('scale', '0 0 0');
                card.removeAttribute('animation');
            });
        });

        // 3. 360° Interaction Logic (Mouse & Touch Dragging)
        const startDrag = (clientX) => {
            isDragging = true;
            previousMousePosition.x = clientX;
        };

        const updateDrag = (clientX) => {
            if (!isDragging || !targetTracked) return;
            const deltaX = clientX - previousMousePosition.x;
            const currentRotation = specsContainer.getAttribute('rotation') || { x: 0, y: 0, z: 0 };
            
            specsContainer.setAttribute('rotation', {
                x: currentRotation.x,
                y: currentRotation.y + deltaX * 0.4, // Sensitivity controller
                z: currentRotation.z
            });
            previousMousePosition.x = clientX;
        };

        const endDrag = () => { isDragging = false; };

        // Mouse Events
        window.addEventListener('mousedown', (e) => startDrag(e.clientX));
        window.addEventListener('mousemove', (e) => updateDrag(e.clientX));
        window.addEventListener('mouseup', endDrag);

        // Touch Events (Mobile)
        window.addEventListener('touchstart', (e) => { if(e.touches.length === 1) startDrag(e.touches[0].clientX); });
        window.addEventListener('touchmove', (e) => { if(e.touches.length === 1) updateDrag(e.touches[0].clientX); });
        window.addEventListener('touchend', endDrag);

        // Slow Elegant Auto-Rotation when not user-interacting
        function autoSpin() {
            requestAnimationFrame(autoSpin);
            if (!isDragging && targetTracked) {
                const currentRot = specsContainer.getAttribute('rotation') || { x: 0, y: 0, z: 0 };
                specsContainer.setAttribute('rotation', {
                    x: currentRot.x,
                    y: currentRot.y + 0.15, // Smooth spin speed
                    z: currentRot.z
                });
            }
        }
        autoSpin();
    </script>
</body>
</html>
