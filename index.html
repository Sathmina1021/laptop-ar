<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Bajaj Pulsar NS400 AR Scanner</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <style>

        /* ==========================================================================
           CALIBRATION NOTE (read before editing):
           This file currently tracks the generic sample "targets.mind" marker.
           To scan YOUR real bike:
             1. Take a clean, well-lit, straight-on photo of your bike (side profile
                works best -- MindAR tracks a flat image, not a full 3D object).
             2. Compile it into a target file at:
                https://hiukim.github.io/mind-ar-js-doc/tools/compile
             3. Replace targets.mind with the new file (same name, or update
                imageTargetSrc below).
             4. The card position="x y z" values under #spatial-cards were tuned
                for the sample marker. With your own photo, nudge the x/y/z numbers
                (small steps like 0.05 at a time) until each arrow lands on the
                right part (engine, wheel, etc.) of YOUR bike's photo.
           ========================================================================== */

        :root{
            --brand-amber:#ffb100;
            --brand-orange:#ff6a00;
            --brand-dark:#150800;
        }
        html, body { margin: 0; overflow: hidden; width: 100%; height: 100%; background-color: transparent;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
        a-scene { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        .mindar-ui-overlay { display: none !important; }

        /* ================= RESPONSIVE LOADING / START SCREEN ================= */
        #start-overlay {
            position: fixed; inset: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 40%, #241205 0%, #0a0402 70%, #030201 100%);
            z-index: 9999; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            padding: 24px; box-sizing: border-box;
            transition: opacity 0.5s ease;
        }

        .brand-mark{
            display:flex; align-items:center; gap: clamp(8px,2vw,14px);
            margin-bottom: clamp(18px, 4vh, 34px);
        }
        .gear-icon{
            width: clamp(38px,7vw,56px); height: clamp(38px,7vw,56px);
            animation: spinGear 3.2s linear infinite;
            filter: drop-shadow(0 0 8px rgba(255,177,0,0.55));
        }
        @keyframes spinGear{ from{transform:rotate(0)} to{transform:rotate(360deg)} }
        .brand-title{
            color: var(--brand-amber);
            font-size: clamp(15px, 3vw, 20px);
            letter-spacing: 3px;
            font-weight: 700;
        }
        .brand-title span{ color: var(--brand-orange); }

        .scan-ring-wrap{
            position: relative;
            width: clamp(150px, 32vw, 230px);
            height: clamp(150px, 32vw, 230px);
            display:flex; align-items:center; justify-content:center;
            margin-bottom: clamp(20px, 4vh, 32px);
        }
        .scan-ring-wrap svg{ position:absolute; inset:0; width:100%; height:100%; }
        .scan-ring-bg{ fill:none; stroke: rgba(255,177,0,0.12); stroke-width: 4; }
        .scan-ring-fg{ fill:none; stroke: url(#ringGrad); stroke-width: 4; stroke-linecap: round;
            stroke-dasharray: 500; stroke-dashoffset: 500;
            animation: ringSweep 2.6s ease-in-out infinite; }
        @keyframes ringSweep{
            0%{ stroke-dashoffset: 500; }
            50%{ stroke-dashoffset: 90; }
            100%{ stroke-dashoffset: 500; }
        }
        .scan-bike-emoji{
            font-size: clamp(38px, 8vw, 60px);
            animation: floatBike 2.2s ease-in-out infinite;
        }
        @keyframes floatBike{
            0%,100%{ transform: translateY(0); }
            50%{ transform: translateY(-8px); }
        }

        .scan-btn {
            background: linear-gradient(45deg, #ff3d1a, #ffb100);
            border: none; color: #150800;
            padding: clamp(13px,2.6vh,17px) clamp(32px,8vw,50px);
            font-size: clamp(14px, 2.4vw, 18px);
            font-weight: bold; border-radius: 40px; cursor: pointer; letter-spacing: 1.5px;
            box-shadow: 0 0 25px rgba(255, 61, 26, 0.45); transition: 0.2s;
            animation: pulseBtn 1.8s ease-in-out infinite;
            max-width: 90vw;
        }
        @keyframes pulseBtn {
            0%, 100% { box-shadow: 0 0 25px rgba(255, 61, 26, 0.45); transform: scale(1); }
            50% { box-shadow: 0 0 40px rgba(255, 177, 0, 0.65); transform: scale(1.03); }
        }
        #status-txt {
            color: #ffb100; margin-top: clamp(16px,3vh,22px);
            font-size: clamp(11px, 2vw, 13px); letter-spacing: 2px; text-align: center;
            min-height: 18px;
        }
        #status-sub{
            color: rgba(255,177,0,0.55); margin-top: 8px;
            font-size: clamp(10px, 1.6vw, 12px); letter-spacing: 1px; text-align:center;
            max-width: 320px;
        }

        /* progress bar shown right after tap, while camera/AR initializes */
        #boot-progress{
            width: min(260px, 70vw); height: 4px; border-radius: 4px;
            background: rgba(255,177,0,0.15); overflow: hidden; margin-top: 18px;
            display: none;
        }
        #boot-progress-fill{
            width: 0%; height: 100%; border-radius: 4px;
            background: linear-gradient(90deg, #ff6a00, #ffb100);
            transition: width 0.25s ease;
        }

        /* ================= SCAN HINT (responsive) ================= */
        #scan-hint {
            position: fixed; bottom: max(24px, env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%);
            color: #ffb100; background: rgba(21, 8, 0, 0.85);
            padding: clamp(9px,1.6vh,13px) clamp(16px,4vw,26px);
            border-radius: 20px; font-size: clamp(11px,1.8vw,13px); z-index: 99;
            border: 1px solid #ffb100; pointer-events: none; opacity: 0; transition: opacity 0.4s;
            text-align: center; width: 75%; max-width: 300px;
            animation: hintFloat 2.4s ease-in-out infinite;
        }
        @keyframes hintFloat {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(-6px); }
        }

        /* ================= BREAKPOINTS ================= */
        @media (min-width: 600px){
            #scan-hint{ font-size: 14px; max-width: 380px; }
        }
        @media (min-width: 1024px){
            .brand-title{ font-size: 22px; letter-spacing: 4px; }
            #scan-hint{ max-width: 420px; bottom: 40px; }
            .scan-btn{ padding: 18px 56px; font-size: 19px; }
        }
        @media (max-height: 480px){
            .scan-ring-wrap{ width: 110px; height: 110px; margin-bottom: 12px; }
            .brand-mark{ margin-bottom: 10px; }
            #status-sub{ display:none; }
        }
    </style>
</head>
<body>

    <div id="start-overlay">
        <div class="brand-mark">
            <svg class="gear-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 8a4 4 0 100 8 4 4 0 000-8z" stroke="#ffb100" stroke-width="1.6"/>
                <path d="M12 2.5v2.2M12 19.3v2.2M21.5 12h-2.2M4.7 12H2.5M18.4 5.6l-1.55 1.55M7.15 16.85L5.6 18.4M18.4 18.4l-1.55-1.55M7.15 7.15L5.6 5.6"
                      stroke="#ff6a00" stroke-width="1.6" stroke-linecap="round"/>
            </svg>
            <div class="brand-title">BAJAJ <span>AR SCANNER</span></div>
        </div>

        <div class="scan-ring-wrap">
            <svg viewBox="0 0 100 100">
                <defs>
                    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#ff3d1a"/>
                        <stop offset="100%" stop-color="#ffb100"/>
                    </linearGradient>
                </defs>
                <circle class="scan-ring-bg" cx="50" cy="50" r="44"/>
                <circle class="scan-ring-fg" cx="50" cy="50" r="44" pathLength="500"/>
            </svg>
            <div class="scan-bike-emoji">🏍️</div>
        </div>

        <button class="scan-btn" id="activate-btn">START BIKE SCANNER</button>
        <div id="status-txt">TAP TO ACTIVATE BIKE AR SCANNER</div>
        <div id="status-sub">Point your camera at the bike once the scanner is live</div>
        <div id="boot-progress"><div id="boot-progress-fill"></div></div>
    </div>

    <div id="scan-hint">POINT CAMERA AT THE BIKE TO SCAN</div>

    <a-scene
        id="main-scene"
        embedded
        mindar-image="imageTargetSrc: targets.mind; autoStart: false; uiLoading: no; uiScanning: no; uiError: no; filterMinCF: 0.0003; filterBeta: 0.06;"
        color-space="sRGB"
        renderer="colorManagement: true; antialias: true; alpha: true; precision: mediump;"
        vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false"
    >
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="bike-anchor" mindar-image-target="targetIndex: 0">

            <a-entity id="spatial-cards" scale="0.001 0.001 0.001"
                      animation__scale="property: scale; to: 0.65 0.65 0.65; dur: 900; easing: easeOutElastic; startEvents: animateFound"
                      animation__out="property: scale; to: 0.001 0.001 0.001; dur: 200; easing: linear; startEvents: animateLost">

                <a-ring color="#ff6a00" radius-inner="0.63" radius-outer="0.7" rotation="-90 0 0" position="0 -0.35 0" opacity="0.45" shader="flat"
                        animation="property: rotation; to: -90 0 360; loop: true; dur: 6000; easing: linear"></a-ring>
                <a-ring color="#ffb100" radius-inner="0.72" radius-outer="0.74" rotation="-90 0 0" position="0 -0.35 0" opacity="0.25" shader="flat"
                        animation="property: rotation; to: -90 0 -360; loop: true; dur: 9000; easing: linear"></a-ring>

                <!-- ================= FLOATING HEADER BADGE ================= -->
                <a-entity id="title-float" position="0 1.35 -0.05"
                          animation__bob="property: position; from: 0 1.35 -0.05; to: 0 1.45 -0.05; dir: alternate; loop: true; dur: 1800; easing: easeInOutSine">
                    <a-plane width="2.2" height="0.5" color="#ff6a00" opacity="0" shader="flat" position="0 0 -0.02"
                             animation__fade="property: material.opacity; from: 0; to: 0.3; dur: 500; startEvents: animateFound"
                             animation__glow="property: material.opacity; from: 0.15; to: 0.4; dir: alternate; loop: true; dur: 1600; startEvents: animateFound"></a-plane>
                    <a-entity geometry="primitive: plane; width: 1.9; height: 0.42" material="color: #150800; opacity: 0; shader: flat"
                              animation__fade="property: material.opacity; from: 0; to: 0.88; dur: 400; delay: 60; startEvents: animateFound"></a-entity>
                    <a-plane width="1.9" height="0.014" color="#ffb100" opacity="0" position="0 0.205 0.01" shader="flat"
                              animation__fade="property: material.opacity; from: 0; to: 0.9; dur: 350; delay: 150; startEvents: animateFound"></a-plane>
                    <a-plane width="1.9" height="0.014" color="#ff6a00" opacity="0" position="0 -0.205 0.01" shader="flat"
                              animation__fade="property: material.opacity; from: 0; to: 0.9; dur: 350; delay: 150; startEvents: animateFound"></a-plane>
                    <a-plane width="0.05" height="0.42" color="#ffb100" opacity="0" position="-0.975 0 0.01" shader="flat"
                              animation__fade="property: material.opacity; from: 0; to: 0.8; dur: 300; delay: 200; startEvents: animateFound"></a-plane>
                    <a-plane width="0.05" height="0.42" color="#ffb100" opacity="0" position="0.975 0 0.01" shader="flat"
                              animation__fade="property: material.opacity; from: 0; to: 0.8; dur: 300; delay: 200; startEvents: animateFound"></a-plane>
                    <a-text value="BAJAJ PULSAR NS400" color="#ffb100" align="center" width="3.55" position="0 0.075 0.02" font="kelsonsans"
                            animation__pulse="property: color; from: #ffb100; to: #ff6a00; dir: alternate; loop: true; dur: 1600"></a-text>
                    <a-text value="· STREET NAKED · ADVENTURE SPORT ·" color="#ff9d3d" align="center" width="1.55" position="0 -0.095 0.02" opacity="0.9"></a-text>
                </a-entity>

                <!-- ================= ARROW CALLOUTS (line + cone arrowhead) ================= -->
                <!-- LEFT: ENGINE -->
                <a-entity line="start: -0.08 0.42 0.08; end: -0.55 0.45 0.2; color: #ffb100; opacity: 0.8"
                          animation__fade="property: material.opacity; from: 0; to: 0.8; dur: 400; delay: 250; startEvents: animateFound"></a-entity>
                <a-entity position="-0.62 0.45 0.22" rotation="0 0 -70">
                    <a-cone color="#ffb100" radius-bottom="0.035" radius-top="0" height="0.09" opacity="0" shader="flat"
                            animation__fade="property: material.opacity; from: 0; to: 0.95; dur: 300; delay: 300; startEvents: animateFound"></a-cone>
                </a-entity>

                <!-- LEFT: DIMENSIONS -->
                <a-entity line="start: -0.06 0.02 0.05; end: -0.55 0 0.12; color: #ff6a00; opacity: 0.8"
                          animation__fade="property: material.opacity; from: 0; to: 0.8; dur: 400; delay: 400; startEvents: animateFound"></a-entity>
                <a-entity position="-0.62 0 0.14" rotation="0 0 -90">
                    <a-cone color="#ff6a00" radius-bottom="0.035" radius-top="0" height="0.09" opacity="0" shader="flat"
                            animation__fade="property: material.opacity; from: 0; to: 0.95; dur: 300; delay: 450; startEvents: animateFound"></a-cone>
                </a-entity>

                <!-- LEFT: ELECTRONICS -->
                <a-entity line="start: -0.05 -0.28 0.08; end: -0.55 -0.45 0.2; color: #ffb100; opacity: 0.8"
                          animation__fade="property: material.opacity; from: 0; to: 0.8; dur: 400; delay: 550; startEvents: animateFound"></a-entity>
                <a-entity position="-0.62 -0.45 0.22" rotation="0 0 -110">
                    <a-cone color="#ffb100" radius-bottom="0.035" radius-top="0" height="0.09" opacity="0" shader="flat"
                            animation__fade="property: material.opacity; from: 0; to: 0.95; dur: 300; delay: 600; startEvents: animateFound"></a-cone>
                </a-entity>

                <!-- RIGHT: CHASSIS -->
                <a-entity line="start: 0.08 0.42 0.08; end: 0.55 0.45 0.2; color: #ff6a00; opacity: 0.8"
                          animation__fade="property: material.opacity; from: 0; to: 0.8; dur: 400; delay: 325; startEvents: animateFound"></a-entity>
                <a-entity position="0.62 0.45 0.22" rotation="0 0 70">
                    <a-cone color="#ff6a00" radius-bottom="0.035" radius-top="0" height="0.09" opacity="0" shader="flat"
                            animation__fade="property: material.opacity; from: 0; to: 0.95; dur: 300; delay: 375; startEvents: animateFound"></a-cone>
                </a-entity>

                <!-- RIGHT: PERFORMANCE -->
                <a-entity line="start: 0.06 0.02 0.05; end: 0.55 0 0.12; color: #ffb100; opacity: 0.8"
                          animation__fade="property: material.opacity; from: 0; to: 0.8; dur: 400; delay: 475; startEvents: animateFound"></a-entity>
                <a-entity position="0.62 0 0.14" rotation="0 0 90">
                    <a-cone color="#ffb100" radius-bottom="0.035" radius-top="0" height="0.09" opacity="0" shader="flat"
                            animation__fade="property: material.opacity; from: 0; to: 0.95; dur: 300; delay: 525; startEvents: animateFound"></a-cone>
                </a-entity>

                <!-- RIGHT: WEIGHT -->
                <a-entity line="start: 0.05 -0.28 0.08; end: 0.55 -0.45 0.2; color: #ff6a00; opacity: 0.8"
                          animation__fade="property: material.opacity; from: 0; to: 0.8; dur: 400; delay: 625; startEvents: animateFound"></a-entity>
                <a-entity position="0.62 -0.45 0.22" rotation="0 0 110">
                    <a-cone color="#ff6a00" radius-bottom="0.035" radius-top="0" height="0.09" opacity="0" shader="flat"
                            animation__fade="property: material.opacity; from: 0; to: 0.95; dur: 300; delay: 675; startEvents: animateFound"></a-cone>
                </a-entity>

                <!-- Glowing anchor node dots -->
                <a-entity position="-0.08 0.42 0.08">
                    <a-ring color="#ffb100" radius-inner="0.018" radius-outer="0.03" opacity="0" shader="flat"
                            animation__fade="property: material.opacity; from: 0; to: 0.95; dur: 300; delay: 250; startEvents: animateFound"
                            animation__pulse="property: scale; from: 1 1 1; to: 1.9 1.9 1.9; dir: alternate; loop: true; dur: 1000; startEvents: animateFound"></a-ring>
                </a-entity>
                <a-entity position="-0.06 0.02 0.05">
                    <a-ring color="#ff6a00" radius-inner="0.018" radius-outer="0.03" opacity="0" shader="flat"
                            animation__fade="property: material.opacity; from: 0; to: 0.95; dur: 300; delay: 400; startEvents: animateFound"
                            animation__pulse="property: scale; from: 1 1 1; to: 1.9 1.9 1.9; dir: alternate; loop: true; dur: 1000; startEvents: animateFound"></a-ring>
                </a-entity>
                <a-entity position="-0.05 -0.28 0.08">
                    <a-ring color="#ffb100" radius-inner="0.018" radius-outer="0.03" opacity="0" shader="flat"
                            animation__fade="property: material.opacity; from: 0; to: 0.95; dur: 300; delay: 550; startEvents: animateFound"
                            animation__pulse="property: scale; from: 1 1 1; to: 1.9 1.9 1.9; dir: alternate; loop: true; dur: 1000; startEvents: animateFound"></a-ring>
                </a-entity>
                <a-entity position="0.08 0.42 0.08">
                    <a-ring color="#ff6a00" radius-inner="0.018" radius-outer="0.03" opacity="0" shader="flat"
                            animation__fade="property: material.opacity; from: 0; to: 0.95; dur: 300; delay: 325; startEvents: animateFound"
                            animation__pulse="property: scale; from: 1 1 1; to: 1.9 1.9 1.9; dir: alternate; loop: true; dur: 1000; startEvents: animateFound"></a-ring>
                </a-entity>
                <a-entity position="0.06 0.02 0.05">
                    <a-ring color="#ffb100" radius-inner="0.018" radius-outer="0.03" opacity="0" shader="flat"
                            animation__fade="property: material.opacity; from: 0; to: 0.95; dur: 300; delay: 475; startEvents: animateFound"
                            animation__pulse="property: scale; from: 1 1 1; to: 1.9 1.9 1.9; dir: alternate; loop: true; dur: 1000; startEvents: animateFound"></a-ring>
                </a-entity>
                <a-entity position="0.05 -0.28 0.08">
                    <a-ring color="#ff6a00" radius-inner="0.018" radius-outer="0.03" opacity="0" shader="flat"
                            animation__fade="property: material.opacity; from: 0; to: 0.95; dur: 300; delay: 625; startEvents: animateFound"
                            animation__pulse="property: scale; from: 1 1 1; to: 1.9 1.9 1.9; dir: alternate; loop: true; dur: 1000; startEvents: animateFound"></a-ring>
                </a-entity>

                <!-- ================= MODERN INFO CARDS ================= -->

                <!-- LEFT: ENGINE -->
                <a-entity position="-1.05 0.45 0.3" rotation="0 25 0">
                    <a-plane width="1.34" height="0.46" color="#000000" opacity="0" position="0.015 -0.11 -0.01" shader="flat"
                             animation__fade="property: material.opacity; from: 0; to: 0.35; dur: 500; delay: 90; startEvents: animateFound"></a-plane>
                    <a-plane width="1.3" height="0.42" color="#1a0e05" opacity="0" shader="flat" position="0 -0.09 -0.005"
                             animation__fade="property: material.opacity; from: 0; to: 0.94; dur: 500; delay: 100; startEvents: animateFound"
                             animation__slide="property: position; from: -0.35 0.45 0.3; to: 0 -0.09 -0.005; dur: 600; delay: 100; easing: easeOutCubic; startEvents: animateFound"></a-plane>
                    <a-plane width="1.3" height="0.055" color="#ffb100" opacity="0" position="0 0.155 0" shader="flat"
                             animation__fade="property: material.opacity; from: 0; to: 1; dur: 350; delay: 250; startEvents: animateFound"></a-plane>
                    <a-circle color="#150800" radius="0.045" position="-0.55 0.155 0.01" opacity="0"
                              animation__fade="property: material.opacity; from: 0; to: 1; dur: 300; delay: 260; startEvents: animateFound"></a-circle>
                    <a-text value="ENG" color="#ffb100" align="center" width="0.7" position="-0.55 0.14 0.02"></a-text>
                    <a-text value="ENGINE" color="#150800" align="center" width="1.5" position="0.06 0.155 0.01"></a-text>
                    <a-text value="373.27cc Liquid-Cooled\n40 HP (30kW) · 35 Nm\n6-Speed Gearbox" color="#ffb100" align="center" width="1.9" position="0 -0.09 0.02"></a-text>
                </a-entity>

                <!-- LEFT: DIMENSIONS -->
                <a-entity position="-1.05 0 0.18" rotation="0 25 0">
                    <a-plane width="1.34" height="0.46" color="#000000" opacity="0" position="0.015 -0.11 -0.01" shader="flat"
                             animation__fade="property: material.opacity; from: 0; to: 0.35; dur: 500; delay: 240; startEvents: animateFound"></a-plane>
                    <a-plane width="1.3" height="0.42" color="#1a0e05" opacity="0" shader="flat" position="0 -0.09 -0.005"
                             animation__fade="property: material.opacity; from: 0; to: 0.94; dur: 500; delay: 250; startEvents: animateFound"
                             animation__slide="property: position; from: -0.35 0 0.18; to: 0 -0.09 -0.005; dur: 600; delay: 250; easing: easeOutCubic; startEvents: animateFound"></a-plane>
                    <a-plane width="1.3" height="0.055" color="#ff6a00" opacity="0" position="0 0.155 0" shader="flat"
                             animation__fade="property: material.opacity; from: 0; to: 1; dur: 350; delay: 400; startEvents: animateFound"></a-plane>
                    <a-circle color="#150800" radius="0.045" position="-0.55 0.155 0.01" opacity="0"
                              animation__fade="property: material.opacity; from: 0; to: 1; dur: 300; delay: 410; startEvents: animateFound"></a-circle>
                    <a-text value="DIM" color="#ff6a00" align="center" width="0.7" position="-0.55 0.14 0.02"></a-text>
                    <a-text value="DIMENSIONS" color="#150800" align="center" width="1.5" position="0.09 0.155 0.01"></a-text>
                    <a-text value="Wheelbase 1344mm\nGround Clear. 168mm\nSeat Height 807mm" color="#ff6a00" align="center" width="1.9" position="0 -0.09 0.02"></a-text>
                </a-entity>

                <!-- LEFT: ELECTRONICS -->
                <a-entity position="-1.05 -0.45 0.3" rotation="0 25 0">
                    <a-plane width="1.34" height="0.36" color="#000000" opacity="0" position="0.015 -0.09 -0.01" shader="flat"
                             animation__fade="property: material.opacity; from: 0; to: 0.35; dur: 500; delay: 390; startEvents: animateFound"></a-plane>
                    <a-plane width="1.3" height="0.32" color="#1a0e05" opacity="0" shader="flat" position="0 -0.08 -0.005"
                             animation__fade="property: material.opacity; from: 0; to: 0.94; dur: 500; delay: 400; startEvents: animateFound"
                             animation__slide="property: position; from: -0.35 -0.45 0.3; to: 0 -0.08 -0.005; dur: 600; delay: 400; easing: easeOutCubic; startEvents: animateFound"></a-plane>
                    <a-plane width="1.3" height="0.055" color="#ffb100" opacity="0" position="0 0.125 0" shader="flat"

    <script>
        const sceneEl = document.querySelector('#main-scene');
        const activateBtn = document.querySelector('#activate-btn');
        const overlay = document.querySelector('#start-overlay');
        const statusTxt = document.querySelector('#status-txt');
        const statusSub = document.querySelector('#status-sub');
        const anchorEl = document.querySelector('#bike-anchor');
        const cardsContainer = document.querySelector('#spatial-cards');
        const scanHint = document.querySelector('#scan-hint');
        const bootProgress = document.querySelector('#boot-progress');
        const bootFill = document.querySelector('#boot-progress-fill');

        const bootMessages = [
            "INITIALIZING BIKE SCAN CORE...",
            "CALIBRATING OPTICS...",
            "WARMING UP AR ENGINE...",
            "LOCKING FRAME REFERENCE..."
        ];

        activateBtn.addEventListener('click', async () => {
            activateBtn.style.display = 'none';
            statusSub.style.display = 'none';
            bootProgress.style.display = 'block';

            let msgIndex = 0;
            statusTxt.innerText = bootMessages[0];
            const msgInterval = setInterval(() => {
                msgIndex = (msgIndex + 1) % bootMessages.length;
                statusTxt.innerText = bootMessages[msgIndex];
            }, 700);

            let pct = 0;
            const fillInterval = setInterval(() => {
                pct = Math.min(pct + Math.random() * 18, 92);
                bootFill.style.width = pct + '%';
            }, 220);

            try {
                if (sceneEl.hasLoaded) {
                    await sceneEl.systems["mindar-image-system"].start();
                } else {
                    await new Promise(resolve => sceneEl.addEventListener('loaded', resolve, { once: true }));
                    await sceneEl.systems["mindar-image-system"].start();
                }
                clearInterval(msgInterval);
                clearInterval(fillInterval);
                bootFill.style.width = '100%';
                setTimeout(() => {
                    overlay.style.opacity = '0';
                    setTimeout(() => { overlay.style.display = 'none'; }, 500);
                    scanHint.style.opacity = "1";
                }, 250);
            } catch (err) {
                console.error(err);
                clearInterval(msgInterval);
                clearInterval(fillInterval);
                statusTxt.innerText = "ERROR: CAMERA ACCESS DENIED.";
                bootProgress.style.display = 'none';
                activateBtn.style.display = 'inline-block';
                activateBtn.innerText = "RETRY SCANNER";
                statusSub.style.display = 'block';
                statusSub.innerText = "Please allow camera permission and try again";
            }
        });

        anchorEl.addEventListener('targetFound', () => {
            cardsContainer.emit('animateFound');
            scanHint.style.opacity = "0";
        });

        anchorEl.addEventListener('targetLost', () => {
            cardsContainer.emit('animateLost');
            scanHint.style.opacity = "1";
        });
    </script>
