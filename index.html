<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>XQOM AR - Realistic Vehicle HUD</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Rajdhani', sans-serif; color: #fff; }

  /* ============ LIVE CAMERA / BACKGROUND ============ */
  #camera-feed {
    position: fixed; inset: 0; width: 100%; height: 100%;
    object-fit: cover; z-index: 1;
    background: #000;
  }

  /* ============ SPLASH (Tap to start) ============ */
  #splash {
    position: fixed; inset: 0; z-index: 100;
    background: radial-gradient(ellipse at center, #071018 0%, #000 78%);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; padding: 24px; cursor: pointer;
  }
  #splash .logo { font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 32px; letter-spacing: 5px; color: #ff2d55; text-shadow: 0 0 10px #ff2d55, 0 0 26px rgba(255,45,85,0.65); }
  #splash .logo span { color: #fff; }
  #splash .tagline { margin-top: 10px; font-size: 14px; letter-spacing: 2px; color: rgba(255,255,255,0.6); }
  #start-btn {
    margin-top: 44px; width: 92px; height: 92px; border-radius: 50%;
    border: 2px solid #ff2d55; background: rgba(255,45,85,0.08);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 18px rgba(255,45,85,0.5), inset 0 0 14px rgba(255,45,85,0.25);
    animation: pulseBtn 1.8s ease-in-out infinite;
  }
  #start-btn svg { width: 34px; height: 34px; }
  @keyframes pulseBtn {
    0%, 100% { transform: scale(1); box-shadow: 0 0 18px rgba(255,45,85,0.5), inset 0 0 14px rgba(255,45,85,0.25); }
    50% { transform: scale(1.06); box-shadow: 0 0 30px rgba(255,45,85,0.75), inset 0 0 18px rgba(255,45,85,0.35); }
  }
  #splash .hint { margin-top: 22px; font-family: 'Orbitron', sans-serif; font-size: 12px; letter-spacing: 2px; color: #ff8ca3; }
  #splash .fineprint { position: absolute; bottom: 26px; left: 0; width: 100%; text-align: center; font-size: 11px; letter-spacing: 1px; color: rgba(255,255,255,0.35); }

  /* ============ LOADING ============ */
  #loading { position: fixed; inset: 0; z-index: 90; background: #000; display: none; flex-direction: column; align-items: center; justify-content: center; }
  #loading.show { display: flex; }
  .spinner { position: relative; width: 78px; height: 78px; }
  .spinner .ring { position: absolute; inset: 0; border-radius: 50%; border: 3px solid transparent; border-top-color: #ff2d55; border-right-color: #ff2d55; animation: spin 1.1s linear infinite; }
  .spinner .ring.r2 { inset: 12px; border-top-color: transparent; border-right-color: transparent; border-bottom-color: #00f0ff; border-left-color: #00f0ff; animation-duration: 1.6s; animation-direction: reverse; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading .txt { margin-top: 24px; font-family: 'Orbitron', sans-serif; font-size: 12px; letter-spacing: 2px; color: #ff8ca3; text-shadow: 0 0 6px rgba(255,45,85,0.7); }

  /* ============ HEADER ============ */
  #header {
    position: fixed; top: 0; left: 0; width: 100%; z-index: 20; pointer-events: none;
    padding: 18px 16px 26px; text-align: center;
    background: linear-gradient(180deg, rgba(0,0,0,0.82) 0%, rgba(0,0,0,0.35) 60%, rgba(0,0,0,0) 100%);
    opacity: 0; transition: opacity 0.6s ease;
  }
  #header.show { opacity: 1; }
  #header .h1 { font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 34px; letter-spacing: 4px; color: #ff2d55; text-shadow: 0 0 10px #ff2d55, 0 0 26px rgba(255,45,85,0.7); }
  #header .h2 { margin-top: 4px; font-family: 'Orbitron', sans-serif; font-size: 12px; letter-spacing: 3px; color: #00f0ff; text-shadow: 0 0 8px rgba(0,240,255,0.8); }

  /* ============ SCAN RETICLE ============ */
  #reticle {
    position: fixed; left: 50%; top: 48%; width: 62vw; max-width: 310px; aspect-ratio: 1.35/1;
    transform: translate(-50%, -50%); z-index: 10; pointer-events: none;
    opacity: 0; transition: opacity 0.5s ease;
  }
  #reticle.show { opacity: 1; }
  #reticle .chip {
    position: absolute; top: -34px; left: 50%; transform: translateX(-50%);
    display: flex; align-items: center; gap: 6px; padding: 5px 12px 5px 8px;
    background: rgba(4,10,14,0.72); border: 1px solid rgba(0,240,255,0.6); border-radius: 20px;
    font-family: 'Orbitron', sans-serif; font-size: 10px; letter-spacing: 1.5px; color: #9df9ff;
  }
  #reticle .chip .dot { width: 6px; height: 6px; border-radius: 50%; background: #00f0ff; animation: dotPulse 1s ease-in-out infinite; }
  @keyframes dotPulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
  #reticle.locked .chip { border-color: rgba(255,45,85,0.7); color: #ffb3c1; }
  #reticle.locked .chip .dot { background: #ff2d55; animation: none; }

  .r-corner { position: absolute; width: 26px; height: 26px; border: 3px solid #00f0ff; filter: drop-shadow(0 0 4px #00f0ff); transition: all 0.3s ease; }
  .r-corner.tl { top: 0; left: 0; border-right: none; border-bottom: none; border-radius: 8px 0 0 0; }
  .r-corner.tr { top: 0; right: 0; border-left: none; border-bottom: none; border-radius: 0 8px 0 0; }
  .r-corner.bl { bottom: 0; left: 0; border-right: none; border-top: none; border-radius: 0 0 0 8px; }
  .r-corner.br { bottom: 0; right: 0; border-left: none; border-top: none; border-radius: 0 0 8px 0; }
  #reticle.locked .r-corner { border-color: #ff2d55; filter: drop-shadow(0 0 6px #ff2d55); width: 15px; height: 15px; }

  #reticle .scanline {
    position: absolute; left: 5%; right: 5%; top: 10%; height: 2px;
    background: linear-gradient(90deg, transparent, #00f0ff, transparent);
    box-shadow: 0 0 8px #00f0ff; animation: scanMove 2s linear infinite;
  }
  #reticle.locked .scanline { display: none; }
  @keyframes scanMove { 0% { top: 10%; opacity: 0; } 15% { opacity: 1; } 85% { opacity: 1; } 100% { top: 90%; opacity: 0; } }

  /* ============ AR SCENE & IMAGE CARDS ============ */
  #ar-scene {
    position: fixed; inset: 0; z-index: 12;
    pointer-events: none; perspective: 1200px;
    transform-style: preserve-3d; transition: transform 0.18s ease-out;
  }

  /* Connecting Lines */
  .spec-line {
    stroke-dasharray: 1000; stroke-dashoffset: 1000; opacity: 0;
    transition: stroke-dashoffset 1s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.8s ease;
  }
  .active-tracking .spec-line { stroke-dashoffset: 0; opacity: 1; }

  /* Target Markers */
  .target {
    position: absolute; width: 32px; height: 32px;
    transform: translate(-50%, -50%) scale(0.4); opacity: 0;
    transition: opacity 0.5s ease, transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }
  .active-tracking .target { opacity: 1; transform: translate(-50%, -50%) scale(1); }
  
  .target .dot {
    position: absolute; top: 50%; left: 50%;
    width: 6px; height: 6px; background: #fff; border-radius: 50%;
    transform: translate(-50%, -50%); box-shadow: 0 0 12px rgba(255,255,255,0.9);
  }
  .target .arcs {
    position: absolute; inset: 0; border: 2px solid rgba(255,45,85,0.9); border-radius: 50%;
    border-top-color: transparent; border-bottom-color: transparent;
    animation: spinTarget 3s linear infinite;
  }
  @keyframes spinTarget { 100% { transform: rotate(360deg); } }

  /* Image Spec Cards */
  .spec-card {
    position: absolute;
    width: 170px;
    transform: translateY(30px) scale(0.9);
    opacity: 0;
    transition: opacity 0.6s ease, transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
    filter: drop-shadow(0 10px 20px rgba(0,0,0,0.8));
  }
  .active-tracking .spec-card { opacity: 1; transform: translateY(0) scale(1); }
  
  /* Staggered entrance animations */
  .active-tracking .card-delay-1 { transition-delay: 0.1s; }
  .active-tracking .card-delay-2 { transition-delay: 0.2s; }
  .active-tracking .card-delay-3 { transition-delay: 0.3s; }
  .active-tracking .card-delay-4 { transition-delay: 0.4s; }

  .spec-image-box {
    width: 100%;
    border: 2px solid rgba(255, 45, 85, 0.6);
    background: rgba(10, 10, 15, 0.85);
    border-radius: 8px;
    padding: 4px;
    box-shadow: 0 0 15px rgba(255, 45, 85, 0.3), inset 0 0 10px rgba(255, 45, 85, 0.2);
    position: relative;
    overflow: hidden;
  }
  
  .spec-image-box::before {
    content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 2px;
    background: linear-gradient(90deg, transparent, #ff2d55, transparent);
    animation: scanMove 3s linear infinite; z-index: 2;
  }

  .spec-image-box img {
    width: 100%;
    height: auto;
    display: block;
    border-radius: 4px;
  }

  /* ============ BOTTOM STATUS ============ */
  #found-bar {
    position: fixed; bottom: 0; left: 0; width: 100%; padding: 15px 20px 25px; z-index: 20;
    background: linear-gradient(0deg, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0) 100%);
    text-align: center; opacity: 0; transform: translateY(10px);
    transition: opacity 0.5s ease, transform 0.5s ease; pointer-events: none;
  }
  #found-bar.show { opacity: 1; transform: translateY(0); }
  #found-bar .title { font-family: 'Orbitron', sans-serif; font-size: 15px; letter-spacing: 2px; color: #fff; }
  #found-bar .title span { color: #ff2d55; text-shadow: 0 0 8px #ff2d55; }
  #found-bar .sub { margin-top: 4px; font-size: 12px; letter-spacing: 1px; color: rgba(255,255,255,0.6); }

  @media (orientation: landscape) {
    .spec-card { width: 15vw; max-width: 200px; }
  }
</style>
</head>
<body>

<video id="camera-feed" autoplay playsinline muted></video>

<div id="splash">
  <div class="logo">XQOM <span>AR</span></div>
  <div class="tagline">VEHICLE SPEC SCANNER</div>
  <div id="start-btn">
    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M4 8V6a2 2 0 0 1 2-2h2M4 16v2a2 2 0 0 0 2 2h2M20 8V6a2 2 0 0 0-2-2h-2M20 16v2a2 2 0 0 1-2 2h-2" stroke="#ff2d55" stroke-width="2" stroke-linecap="round"/>
      <circle cx="12" cy="12" r="3.4" stroke="#ff2d55" stroke-width="2"/>
    </svg>
  </div>
  <div class="hint">TAP ANYWHERE TO START</div>
  <div class="fineprint">Camera and motion access are required</div>
</div>

<div id="loading">
  <div class="spinner"><div class="ring"></div><div class="ring r2"></div></div>
  <div class="txt">INITIALIZING SYSTEM<span>...</span></div>
</div>

<div id="header">
  <div class="h1">VEHICLE SPECS</div>
  <div class="h2">[ LIVE TELEMETRY ]</div>
</div>

<div id="reticle">
  <div class="chip"><span class="dot"></span><span class="chip-text">SCANNING</span></div>
  <div class="r-corner tl"></div>
  <div class="r-corner tr"></div>
  <div class="r-corner bl"></div>
  <div class="r-corner br"></div>
  <div class="scanline"></div>
</div>

<div id="ar-scene">
  
  <!-- Dynamic SVG Lines Linking Image Cards to Targets -->
  <svg id="ar-lines" style="position: absolute; inset: 0; width: 100%; height: 100%; z-index: 1;">
    <line x1="22%" y1="20%" x2="42%" y2="40%" stroke="rgba(255,45,85,0.75)" stroke-width="1.5" class="spec-line"/>
    <line x1="22%" y1="65%" x2="48%" y2="60%" stroke="rgba(255,45,85,0.75)" stroke-width="1.5" class="spec-line card-delay-1"/>
    <line x1="78%" y1="20%" x2="58%" y2="45%" stroke="rgba(255,45,85,0.75)" stroke-width="1.5" class="spec-line card-delay-2"/>
    <line x1="78%" y1="50%" x2="55%" y2="50%" stroke="rgba(255,45,85,0.75)" stroke-width="1.5" class="spec-line card-delay-3"/>
    <line x1="78%" y1="80%" x2="62%" y2="65%" stroke="rgba(255,45,85,0.75)" stroke-width="1.5" class="spec-line card-delay-4"/>
  </svg>

  <!-- Tracked Target Points on the Vehicle -->
  <div class="target" style="left: 42%; top: 40%;"><div class="dot"></div><div class="arcs"></div></div>
  <div class="target card-delay-1" style="left: 48%; top: 60%;"><div class="dot"></div><div class="arcs"></div></div>
  <div class="target card-delay-2" style="left: 58%; top: 45%;"><div class="dot"></div><div class="arcs"></div></div>
  <div class="target card-delay-3" style="left: 55%; top: 50%;"><div class="dot"></div><div class="arcs"></div></div>
  <div class="target card-delay-4" style="left: 62%; top: 65%;"><div class="dot"></div><div class="arcs"></div></div>

  <!-- CARD 1: LED LIGHTING SYSTEM -->
  <div class="spec-card" style="left: 8%; top: 12%;">
    <div class="spec-image-box">
      <img src="image/led-system.png" alt="LED System">
    </div>
  </div>

  <!-- CARD 2: ENGINE -->
  <div class="spec-card card-delay-1" style="left: 8%; top: 55%;">
    <div class="spec-image-box">
      <img src="image/engine.png" alt="Engine">
    </div>
  </div>

  <!-- CARD 3: FROK / FRONT FORK -->
  <div class="spec-card card-delay-2" style="left: 70%; top: 12%;">
    <div class="spec-image-box">
      <img src="image/frok.png" alt="Front Fork">
    </div>
  </div>

  <!-- CARD 4: STYLING -->
  <div class="spec-card card-delay-3" style="left: 70%; top: 42%;">
    <div class="spec-image-box">
      <img src="image/styling.png" alt="Styling">
    </div>
  </div>

  <!-- CARD 5: PERIMETER FRAME -->
  <div class="spec-card card-delay-4" style="left: 70%; top: 72%;">
    <div class="spec-image-box">
      <img src="image/frame.png" alt="Perimeter Frame">
    </div>
  </div>

</div>

<div id="found-bar">
  <div class="title">TARGET LOCKED <span>&mdash; SPEC DATA ONLINE</span></div>
  <div class="sub">Holographic infographics established</div>
</div>

<script>
  const video      = document.getElementById('camera-feed');
  const splash     = document.getElementById('splash');
  const startBtn   = document.getElementById('start-btn');
  const loading    = document.getElementById('loading');
  const header     = document.getElementById('header');
  const reticle    = document.getElementById('reticle');
  const chipText   = document.querySelector('#reticle .chip-text');
  const foundBar   = document.getElementById('found-bar');
  const arScene    = document.getElementById('ar-scene');

  let isScanningActive = false;
  let isLocked = false;
  let baseBeta = null, baseGamma = null;
  let smoothBeta = 0, smoothGamma = 0; 
  const SMOOTHING = 0.15; 
  const LOSE_THRESHOLD = 20; 
  const REGAIN_THRESHOLD = 6;

  async function startSequence() {
    splash.style.display = 'none';
    loading.classList.add('show');
    
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: { ideal: 'environment' } }, audio: false
      });
      video.srcObject = stream;
      await video.play();
    } catch (err) {
      console.warn("Camera failed or unavailable.");
    }

    try {
      if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
        const response = await DeviceOrientationEvent.requestPermission();
        if (response === 'granted') {
          window.addEventListener('deviceorientation', handleOrientation);
        }
      } else {
        window.addEventListener('deviceorientation', handleOrientation);
      }
    } catch (err) {
      console.error("Tracking permission error.");
    }

    loading.classList.remove('show');
    header.classList.add('show');
    reticle.classList.add('show');
    isScanningActive = true;
    
    setTimeout(lockOnTarget, 2200);
  }

  function lockOnTarget() {
    if (isLocked || !isScanningActive) return;
    isLocked = true;
    
    reticle.classList.add('locked');
    chipText.textContent = 'LOCKED';
    foundBar.classList.add('show');
    
    arScene.classList.add('active-tracking');
  }

  function loseTargetTracking() {
    if (!isLocked) return;
    isLocked = false;
    
    reticle.classList.remove('locked');
    chipText.textContent = 'SCANNING';
    foundBar.classList.remove('show');
    arScene.classList.remove('active-tracking');
  }

  function handleOrientation(e) {
    if (!isScanningActive || e.beta === null || e.gamma === null) return;

    if (baseBeta === null) { baseBeta = e.beta; baseGamma = e.gamma; return; }

    smoothBeta += ((e.beta - baseBeta) - smoothBeta) * SMOOTHING;
    smoothGamma += ((e.gamma - baseGamma) - smoothGamma) * SMOOTHING;

    const driftAngle = Math.hypot(smoothBeta, smoothGamma);

    if (isLocked) {
      if (driftAngle > LOSE_THRESHOLD) {
        loseTargetTracking();
        return;
      }
      const rotY = smoothGamma * 0.45; 
      const rotX = smoothBeta * -0.45; 
      arScene.style.transform = `rotateY(${rotY}deg) rotateX(${rotX}deg)`;
    } else {
      if (driftAngle < REGAIN_THRESHOLD) { lockOnTarget(); }
    }
  }

  splash.addEventListener('click', startSequence);
  startBtn.addEventListener('click', startSequence);
</script>

</body>
</html>
