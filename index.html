<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Pulsar NS200 — AR HUD Scanner</title>
<script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800;900&family=Rajdhani:wght@500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{
  --carbon:#0a0a0c;
  --pulsar-orange:#ff4b12;
  --telemetry-cyan:#00e0ff;
  --ink:#f3efe6;
  --ink-dim:#9a9a9e;
}
*{box-sizing:border-box;}
html,body{margin:0;overflow:hidden;width:100%;height:100%;background-color:transparent;font-family:'Rajdhani',sans-serif;}
a-scene{position:absolute;top:0;left:0;width:100%;height:100%;z-index:1;}
#mindar-ui-scanning, .mindar-ui-overlay { display: none !important; }

/* LOADING SCREEN */
#start-overlay{
  position:fixed;inset:0;width:100%;height:100%;z-index:9999;
  background:radial-gradient(circle at center, #141416 0%, #050506 100%);
  display:flex;flex-direction:column;justify-content:center;align-items:center;
}
.scan-btn{
  background:linear-gradient(135deg,var(--pulsar-orange),#ffb400);
  border:none;color:#0a0a0a;padding:18px 45px;font-size:16px;font-weight:900;
  font-family:'Orbitron',sans-serif;border-radius:50px;cursor:pointer;letter-spacing:2px;
}
#scan-hint{
  position:fixed;bottom:36px;left:50%;transform:translateX(-50%);
  color:var(--ink);background:rgba(10,10,12,0.92);padding:14px 24px;border-radius:12px;
  font-family:'JetBrains Mono',monospace;font-size:12px;z-index:99;
  border:1px solid var(--pulsar-orange);pointer-events:none;
}
</style>
</head>
<body>

<div id="start-overlay">
  <button class="scan-btn" onclick="startScanner()">Launch AR Telemetry</button>
</div>

<div id="scan-hint">Aim Camera at Scooter Front Target</div>

<a-scene id="ar-scene" mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiScanning: no;" 
         color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false">
  
  <a-assets>
    <!-- බ්ලෙන්ඩර් එකෙන් එක්ස්පෝට් කරපු 3D Frame එක (scooter_hud.glb නමින් සේව් කරන්න) -->
    <a-asset-item id="blender-frame" src="scooter_hud.glb"></a-asset-item>
  </a-assets>

  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <!-- Image Marker එක අහුවුනාම ක්‍රියාත්මක වන කොටස -->
  <a-entity id="target-anchor" mindar-image-target="targetIndex: 0">
    
    <!-- TOP TITLE: NS200 / AR SPEC SCANNER (පින්තූරයේ ඉහළින්ම ඇති කොටස) -->
    <a-entity id="top-hud-title" position="0 0.8 0.05">
      <a-plane width="0.8" height="0.12" color="#ff4b12" opacity="0.15" material="transparent:true; shader:flat; side:double"></a-plane>
      <a-entity line="start: -0.4 0.06 0.001; end: 0.4 0.06 0.001; color: #ff4b12; opacity:0.9"></a-entity>
      <a-entity line="start: -0.4 -0.06 0.001; end: 0.4 -0.06 0.001; color: #ff4b12; opacity:0.9"></a-entity>
      <a-text value="NS200 / AR SPEC SCANNER" color="#ffffff" align="center" font="roboto" width="1.4" letter-spacing="2" position="0 -0.005 0.01"></a-text>
    </a-entity>

    <!-- CENTER BLENDER 3D FRAME: බ්ලෙන්ඩර් කූඩුව බයිසිකලය මත හරියටම පිහිටුවීම -->
    <a-entity id="3d-hud-mesh" gltf-model="#blender-frame" position="0 0.1 0.02" scale="1.3 1.3 1.3">
      <!-- Frame එක පිටුපසින් පෙනෙන ලස්සන Glowing Ring එක -->
      <a-ring color="#ff4b12" radius-inner="0.48" radius-outer="0.5" opacity="0.4" position="0 0 -0.01" rotation="0 0 0"></a-ring>
    </a-entity>

    <!-- FIXED UI CARDS: පින්තූරයේ පරිදි වටේට ඇති ස්ථාවර Spec Cards එකතු වන ස්ථානය -->
    <a-entity id="static-ui-container" position="0 0 0.05"></a-entity>

  </a-entity>
</a-scene>

<script>
  // පින්තූරයේ ඇති දත්ත වලට අනුව නිවැරදි කරන ලද UI Layout Data
  const fixedCardsData = [
    // වම් පස කාඩ්ස් (X අගය සෘණ වේ)
    { title: "ENGINE", desc: "199.5 CC\nLiquid Cooled\n\n199.5 CC\nJetBrains Mono\nMono", x: -0.65, y: 0.1, align: "left" },
    
    // මැද කාඩ් එක (බයිසිකලයේ මැදින්ම මතුවන POWER කාඩ් එක)
    { title: "POWER", desc: "Max Power: 24.5 PS\nMax Power: 24.5 PS\nMax Grand: 24.5 PS", x: 0.1, y: 0.12, align: "center", isCenter: true },
    
    // දකුණු පස කාඩ්ස් (X අගය ධන වේ)
    { title: "MOITER", desc: "Bajaj Pulsar NS200\nTelemetry: FIAR\nType: Stratent", x: 0.65, y: 0.25, align: "left" },
    { title: "HEET", desc: "Orbitron: 24.5 PS\nPower: 15.5 KM\nMachine: 2.5 PS", x: 0.65, y: -0.05, align: "left" },
    { title: "PLCK", desc: "MaxIrtvnc:\ner-bitztron\nPower: 15mp\nProcessor: 1mm", x: 0.65, y: -0.35, align: "left" }
  ];

  function buildFixedUI() {
    const container = document.getElementById('static-ui-container');
    
    fixedCardsData.forEach((card) => {
      const cardEntity = document.createElement('a-entity');
      cardEntity.setAttribute('position', `${card.x} ${card.y} 0`);
      
      // Card Background Box (පින්තූරයේ තියෙන වීදුරු ස්වභාවය ලබාදීමට)
      const bg = document.createElement('a-plane');
      bg.setAttribute('width', card.isCenter ? '0.38' : '0.34');
      bg.setAttribute('height', card.isCenter ? '0.22' : '0.24');
      bg.setAttribute('color', '#05070a');
      bg.setAttribute('opacity', '0.65');
      bg.setAttribute('material', 'transparent: true; side: double');
      cardEntity.appendChild(bg);

      // Neon Orange Borders (රතු/තැඹිලි පාට සිහින් දාර)
      const w = card.isCenter ? 0.19 : 0.17;
      const h = card.isCenter ? 0.11 : 0.12;
      const mkLine = (x1, y1, x2, y2) => {
        const l = document.createElement('a-entity');
        l.setAttribute('line', `start: ${x1} ${y1} 0.002; end: ${x2} ${y2} 0.002; color: #ff4b12; opacity: 0.85`);
        return l;
      };
      cardEntity.appendChild(mkLine(-w, h, w, h));
      cardEntity.appendChild(mkLine(-w, -h, w, -h));
      cardEntity.appendChild(mkLine(-w, -h, -w, h));
      cardEntity.appendChild(mkLine(w, -h, w, h));

      // Title Text
      const title = document.createElement('a-text');
      title.setAttribute('value', card.title);
      title.setAttribute('color', '#ffffff');
      title.setAttribute('align', 'center');
      title.setAttribute('position', `0 ${h - 0.03} 0.005`);
      title.setAttribute('width', '0.75');
      title.setAttribute('font', 'roboto');
      cardEntity.appendChild(title);

      // Description/Specs Text
      const desc = document.createElement('a-text');
      desc.setAttribute('value', card.desc);
      desc.setAttribute('color', card.isCenter ? '#ffffff' : '#d9dde1');
      desc.setAttribute('align', card.isCenter ? 'center' : 'left');
      desc.setAttribute('position', card.isCenter ? '0 -0.02 0.005' : `-0.14 -0.02 0.005`);
      desc.setAttribute('width', '0.52');
      desc.setAttribute('font', 'roboto');
      cardEntity.appendChild(desc);

      container.appendChild(cardEntity);
    });
  }

  document.addEventListener("DOMContentLoaded", () => {
    buildFixedUI();
    
    // Target එක හඳුනාගත් පසු Glow Ring එක කරකැවීමේ Animation එක
    const targetAnchor = document.getElementById('target-anchor');
    targetAnchor.addEventListener("targetFound", () => {
      document.getElementById("scan-hint").style.display = "none";
    });
    targetAnchor.addEventListener("targetLost", () => {
      document.getElementById("scan-hint").style.display = "block";
    });
  });

  function startScanner() {
    const overlay = document.getElementById('start-overlay');
    overlay.style.opacity = '0';
    setTimeout(() => { 
      overlay.style.display = 'none'; 
      document.getElementById('ar-scene').components['mindar-image'].start();
    }, 500);
  }
</script>
</body>
</html>
