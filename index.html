<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Bajaj Pulsar NS200 — AR Spec Scanner</title>
<script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800;900&family=Rajdhani:wght@500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{
  --carbon:#0a0a0c;
  --carbon-2:#141416;
  --pulsar-orange:#ff4b12;
  --pulsar-amber:#ffb400;
  --telemetry-cyan:#00e0ff;
  --geo-silver:#d9dde1;
  --ink:#f3efe6;
  --ink-dim:#9a9a9e;
}
*{box-sizing:border-box;}
html,body{margin:0;overflow:hidden;width:100%;height:100%;background-color:transparent;font-family:'Rajdhani',sans-serif;}
a-scene{position:absolute;top:0;left:0;width:100%;height:100%;z-index:1;}

/* ============ START / ONBOARDING SCREEN ============ */
#start-overlay{
  position:fixed;inset:0;width:100%;height:100%;z-index:9999;
  background:#050506;
  display:flex;flex-direction:column;
  transition:opacity .5s ease;
  overflow:hidden;
}
.hero-photo-wrap{
  position:relative;width:100%;height:46%;min-height:220px;overflow:hidden;
  clip-path:polygon(0 0,100% 0,100% 88%,0 100%);
}
.hero-photo-wrap img{
  width:100%;height:100%;object-fit:cover;object-position:center 35%;
  filter:saturate(1.08) contrast(1.05);
}
.hero-photo-wrap::after{
  content:"";position:absolute;inset:0;
  background:linear-gradient(180deg, rgba(5,5,6,0) 40%, rgba(5,5,6,0.96) 96%),
             linear-gradient(90deg, rgba(5,5,6,0.55) 0%, rgba(5,5,6,0) 45%);
}
.livery-stripe{
  position:absolute;top:0;right:12%;width:14px;height:100%;
  background:linear-gradient(180deg,var(--pulsar-orange),var(--pulsar-amber));
  transform:skewX(-12deg);opacity:.9;
}
.livery-stripe.two{right:calc(12% + 26px);width:6px;opacity:.55;}

.content-wrap{
  flex:1;display:flex;flex-direction:column;justify-content:space-between;
  padding:18px 26px max(22px, env(safe-area-inset-bottom)) 26px;
}
.eyebrow-row{
  display:flex;align-items:center;gap:8px;margin-bottom:6px;
}
.led-dot{width:7px;height:7px;border-radius:50%;background:var(--pulsar-orange);
  box-shadow:0 0 8px var(--pulsar-orange);animation:pulse 1.6s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.35;}}
.eyebrow{
  font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:3px;
  color:var(--telemetry-cyan);text-transform:uppercase;
}
.brand-title{
  font-family:'Orbitron',sans-serif;font-weight:900;color:var(--ink);
  font-size:clamp(26px,7vw,40px);line-height:1.05;letter-spacing:1px;
  text-transform:uppercase;margin:0;
}
.brand-title .accent{
  color:var(--pulsar-orange);
  -webkit-text-stroke:0.5px rgba(255,180,0,0.5);
}
.brand-sub{
  font-size:13px;letter-spacing:2px;color:var(--ink-dim);text-transform:uppercase;
  margin-top:6px;font-weight:600;
}

.stat-strip{
  display:flex;gap:0;margin:20px 0;border-top:1px solid rgba(255,255,255,0.12);
  border-bottom:1px solid rgba(255,255,255,0.12);
}
.stat{
  flex:1;padding:10px 6px;text-align:center;border-right:1px solid rgba(255,255,255,0.1);
}
.stat:last-child{border-right:none;}
.stat-value{
  font-family:'Orbitron',sans-serif;font-weight:700;font-size:15px;color:var(--ink);
  display:block;
}
.stat-label{
  font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:1.5px;
  color:var(--ink-dim);text-transform:uppercase;display:block;margin-top:4px;
}

.scan-btn{
  position:relative;overflow:hidden;
  background:linear-gradient(120deg,var(--pulsar-orange),var(--pulsar-amber));
  border:none;color:#0a0a0a;padding:17px 10px;font-size:14px;font-weight:800;
  font-family:'Orbitron',sans-serif;
  border-radius:8px;cursor:pointer;letter-spacing:3px;text-transform:uppercase;
  box-shadow:0 0 30px rgba(255,75,18,0.45), inset 0 1px 0 rgba(255,255,255,0.3);
  width:100%;
}
.scan-btn::after{
  content:"";position:absolute;top:0;left:-60%;width:40%;height:100%;
  background:linear-gradient(120deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.55) 50%, rgba(255,255,255,0) 100%);
  animation:sweep 2.6s ease-in-out infinite;
}
@keyframes sweep{
  0%{left:-60%;} 60%{left:120%;} 100%{left:120%;}
}
.scan-btn span{position:relative;z-index:1;}

/* ============ SCAN / INTERACTION HINTS ============ */
#scan-hint{
  position:fixed;bottom:max(36px, env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);
  color:var(--ink);background:rgba(6,6,7,0.88);padding:13px 26px;border-radius:8px;
  font-family:'JetBrains Mono',monospace;font-size:11.5px;font-weight:600;z-index:99;
  border:1px solid var(--pulsar-orange);pointer-events:none;text-align:center;letter-spacing:2px;
  box-shadow:0 0 20px rgba(255,75,18,0.35);text-transform:uppercase;
}
#interaction-hint{
  position:fixed;top:max(30px, env(safe-area-inset-top));left:50%;transform:translateX(-50%);
  color:var(--carbon);background:rgba(0,224,255,0.92);padding:9px 22px;
  border-radius:20px;font-family:'JetBrains Mono',monospace;font-size:10.5px;font-weight:700;letter-spacing:1.5px;
  z-index:99;pointer-events:none;display:none;text-transform:uppercase;
  box-shadow:0 0 18px rgba(0,224,255,0.5);
}
</style>
</head>

                    animation="property: rotation; to: 0 0 360; dur: 11000; loop: true; easing: linear"></a-ring>

<script>
// 1. JSON data — connected source of truth for every AR readout

    "height": 600,
    "status": "connected"

    "brand": "Bajaj",

        "rear": "230 mm Disc (ABS)"
      },
      "suspension": {
        "front": "37 mm USD",
        "rear": "Nitrox Monoshock"
      },
      "tyres": {

};

const M = bikeData.motorcycle;
const S = M.specifications;

const sceneEl = document.querySelector('#main-scene');
const activateBtn = document.querySelector('#activate-btn');
const overlay = document.querySelector('#start-overlay');
const scanHint = document.querySelector('#scan-hint');
const interactHint = document.querySelector('#interaction-hint');
const anchor = document.querySelector('#bike-anchor');
const mainTitle = document.querySelector('#main-title-group');
const specsContainer = document.querySelector('#specs-container');

let isDragging = false;
let previousMousePosition = { x: 0 };
let targetTracked = false;

// 2. Populate the 2D onboarding screen straight from JSON
function populateOverlay() {
    document.querySelector('#eyebrow-brand').textContent = `${M.brand.toUpperCase()} · ${bikeData.targetImage.status.toUpperCase()}`;
    document.querySelector('#hero-title').innerHTML =
        `${M.model.split(' ')[0].toUpperCase()} <span class="accent">${M.model.split(' ').slice(1).join(' ').toUpperCase()}</span>`;

    const powerVal = S.engine.max_power.match(/\(([^)]+)\)/);
    const strip = [
        { v: S.engine.displacement.replace(' cc',''), l: 'CC' },
        { v: powerVal ? powerVal[1].replace(' ','') : S.engine.max_power, l: 'POWER' },
        { v: S.engine.type.match(/(\d+)-speed/i) ? S.engine.type.match(/(\d+)-speed/i)[1] : '6', l: 'SPEED' },
        { v: S.dimensions.kerb_weight.replace(' kg',''), l: 'KG' },
    ];
    const stripEl = document.querySelector('#stat-strip');
    strip.forEach(s => {
        const d = document.createElement('div');
        d.className = 'stat';
        d.innerHTML = `<span class="stat-value">${s.v}</span><span class="stat-label">${s.l}</span>`;
        stripEl.appendChild(d);
    });
}
populateOverlay();

// 3. Generate and inject the 360° telemetry cards dynamically from JSON
function generate360Specs() {

    document.querySelector('#main-bike-title').setAttribute('value', `${M.brand} ${M.model}`.toUpperCase());
    document.querySelector('#main-bike-tagline').setAttribute('value',
        `${S.engine.max_power.split('@')[0].trim()}  /  ${S.engine.max_torque.split('@')[0].trim()}  /  ${S.engine.displacement}`);

    const channels = [
        {
            code: "CH.01", tag: "POWERTRAIN", title: "ENGINE", accent: "#ff4b12", lift: 0.22,
            lines: [
                `${S.engine.displacement}  ·  ${S.engine.max_power.split('@')[0].trim()}`
            ]
        },
        {
            code: "CH.02", tag: "CHASSIS", title: "BRAKES · SUSPENSION", accent: "#ffb400", lift: -0.28,
            lines: [
                `${S.brakes.front.match(/\d+ mm/)[0]} F  ·  ${S.brakes.rear.match(/\d+ mm/)[0]} R Disc`
            ]
        },
        {
            code: "CH.03", tag: "AVIONICS", title: "ELECTRICALS", accent: "#00e0ff", lift: 0.3,
            lines: [
                `${S.electricals.headlamp.split(',')[0]}  ·  ${S.electricals.mobile_charger}`
            ]
        },
        {
            code: "CH.04", tag: "GEOMETRY", title: "DIMENSIONS", accent: "#d9dde1", lift: -0.22,
            lines: [
                `${S.dimensions.kerb_weight}  ·  GC ${S.dimensions.ground_clearance}  ·  ${S.dimensions.fuel_tank_capacity} Tank`
            ]
        }
    ];

    const radius = 1.4;
    const totalCards = channels.length;

    channels.forEach((ch, index) => {
        const angle = (index / totalCards) * Math.PI * 2;
        const x = Math.sin(angle) * radius;
        const z = Math.cos(angle) * radius;
        const rotY = (angle * 180) / Math.PI;
        const y = ch.lift;

        const cardEntity = document.createElement('a-entity');
        cardEntity.setAttribute('class', 'spec-card');
        cardEntity.setAttribute('position', `${x} ${y} ${z}`);
        cardEntity.setAttribute('rotation', `0 ${rotY} 0`);
        cardEntity.setAttribute('scale', '0 0 0');

        // Telemetry link line back to the bike's true center point
        const line = document.createElement('a-line');
        line.setAttribute('start', '0 0 0');
        line.setAttribute('end', `${-x} ${-y} ${-z}`);
        line.setAttribute('color', ch.accent);
        line.setAttribute('opacity', '0.5');
        cardEntity.appendChild(line);

        // Small node marker where the line meets the bike
        const node = document.createElement('a-circle');
        node.setAttribute('radius', '0.013');
        node.setAttribute('color', ch.accent);
        node.setAttribute('shader', 'flat');
        node.setAttribute('position', `${-x} ${-y} ${-z + 0.001}`);
        cardEntity.appendChild(node);

        // Soft accent halo behind the card
        const glow = document.createElement('a-plane');
        glow.setAttribute('width', '0.68');
        glow.setAttribute('height', '0.26');
        glow.setAttribute('color', ch.accent);
        glow.setAttribute('opacity', '0.14');
        glow.setAttribute('shader', 'flat');
        glow.setAttribute('position', '0 0 -0.006');
        cardEntity.appendChild(glow);

        // Main dark plate — compact single-readout tag
        const basePlane = document.createElement('a-plane');
        basePlane.setAttribute('width', '0.6');
        basePlane.setAttribute('height', '0.2');
        basePlane.setAttribute('color', '#0d0d0f');
        basePlane.setAttribute('opacity', '0.95');
        basePlane.setAttribute('shader', 'flat');
        cardEntity.appendChild(basePlane);

        // Top accent bar
        const topBar = document.createElement('a-plane');
        topBar.setAttribute('width', '0.6');
        topBar.setAttribute('height', '0.014');
        topBar.setAttribute('color', ch.accent);
        topBar.setAttribute('shader', 'flat');
        topBar.setAttribute('position', '0 0.093 0.001');
        cardEntity.appendChild(topBar);

        // Channel code (small monospace-style eyebrow)
        const codeText = document.createElement('a-text');
        codeText.setAttribute('value', `${ch.code}  ${ch.tag}`);
        codeText.setAttribute('color', ch.accent);
        codeText.setAttribute('align', 'left');
        codeText.setAttribute('width', '1.55');
        codeText.setAttribute('wrap-count', '30');
        codeText.setAttribute('position', '-0.28 0.058 0.002');
        codeText.setAttribute('font', 'exo2bold');
        cardEntity.appendChild(codeText);

        // Title
        const titleText = document.createElement('a-text');
        titleText.setAttribute('value', ch.title);
        titleText.setAttribute('color', '#f3efe6');
        titleText.setAttribute('align', 'left');
        titleText.setAttribute('width', '1.75');
        titleText.setAttribute('wrap-count', '20');
        titleText.setAttribute('position', '-0.28 0.015 0.002');
        titleText.setAttribute('font', 'exo2bold');
        cardEntity.appendChild(titleText);

        // Thin divider
        const divider = document.createElement('a-plane');
        divider.setAttribute('width', '0.54');
        divider.setAttribute('height', '0.003');
        divider.setAttribute('color', ch.accent);
        divider.setAttribute('opacity', '0.3');
        divider.setAttribute('shader', 'flat');
        divider.setAttribute('position', '0 -0.018 0.001');
        cardEntity.appendChild(divider);

        // Single readout line
        const bodyText = document.createElement('a-text');
        bodyText.setAttribute('value', ch.lines[0]);
        bodyText.setAttribute('color', '#d6d6d9');
        bodyText.setAttribute('align', 'left');
        bodyText.setAttribute('width', '1.55');
        bodyText.setAttribute('wrap-count', '34');
        bodyText.setAttribute('position', '-0.28 -0.055 0.002');
        cardEntity.appendChild(bodyText);

        specsContainer.appendChild(cardEntity);
    });
}

generate360Specs();

// Start AR System
activateBtn.addEventListener('click', async () => {
    try {
        if (!sceneEl.hasLoaded) {
            await new Promise(resolve => sceneEl.addEventListener('loaded', resolve, { once: true }));
        }
        await sceneEl.systems['mindar-image-system'].start();
        overlay.style.opacity = '0';
        setTimeout(() => { overlay.style.display = 'none'; }, 500);
    } catch (err) {
        console.error(err);
        alert("Camera access is required for AR!");
    }
});

// Target Found Handlers
anchor.addEventListener('targetFound', () => {
    scanHint.style.display = 'none';
    interactHint.style.display = 'block';
    targetTracked = true;

    mainTitle.setAttribute('animation', {
        property: 'scale', from: '0 0 0', to: '1 1 1', dur: 600, easing: 'easeOutBack'
    });

    document.querySelectorAll('.spec-card').forEach((card, index) => {
        card.setAttribute('animation', {
            property: 'scale', from: '0 0 0', to: '1 1 1', dur: 600, delay: index * 150, easing: 'easeOutElastic'
        });
    });
});

// Target Lost Handlers
anchor.addEventListener('targetLost', () => {
    scanHint.style.display = 'block';
    interactHint.style.display = 'none';
    targetTracked = false;
    mainTitle.setAttribute('scale', '0 0 0');
    mainTitle.removeAttribute('animation');
    document.querySelectorAll('.spec-card').forEach(card => {
        card.setAttribute('scale', '0 0 0');
        card.removeAttribute('animation');
    });
});

// 4. 360° Interaction Logic (Mouse & Touch Dragging)
const startDrag = (clientX) => {
    isDragging = true;
    previousMousePosition.x = clientX;
};

const updateDrag = (clientX) => {
    if (!isDragging || !targetTracked) return;
    const deltaX = clientX - previousMousePosition.x;
    const currentRotation = specsContainer.getAttribute('rotation') || { x: 0, y: 0, z: 0 };

    specsContainer.setAttribute('rotation', {
        x: currentRotation.x,
        y: currentRotation.y + deltaX * 0.4,
        z: currentRotation.z
    });
    previousMousePosition.x = clientX;
};

const endDrag = () => { isDragging = false; };

window.addEventListener('mousedown', (e) => startDrag(e.clientX));
window.addEventListener('mousemove', (e) => updateDrag(e.clientX));
window.addEventListener('mouseup', endDrag);

window.addEventListener('touchstart', (e) => { if(e.touches.length === 1) startDrag(e.touches[0].clientX); });
window.addEventListener('touchmove', (e) => { if(e.touches.length === 1) updateDrag(e.touches[0].clientX); });
window.addEventListener('touchend', endDrag);

// Slow elegant auto-rotation when not user-interacting
function autoSpin() {
    requestAnimationFrame(autoSpin);
    if (!isDragging && targetTracked) {
        const currentRot = specsContainer.getAttribute('rotation') || { x: 0, y: 0, z: 0 };
        specsContainer.setAttribute('rotation', {
            x: currentRot.x,
            y: currentRot.y + 0.15,
            z: currentRot.z
        });
    }
}
autoSpin();
</script>
</body>
