<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>XQOM AR - Realistic Vehicle HUD</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Rajdhani', sans-serif; color: #fff; }

  /* ============ LIVE CAMERA / BACKGROUND ============ */
  #camera-feed {
    position: fixed; inset: 0; width: 100%; height: 100%;
    object-fit: cover; z-index: 1;
    background: #000;
  }

  /* ============ SPLASH SCREEN ============ */
  #splash {
    position: fixed; inset: 0; z-index: 100;
    background: radial-gradient(ellipse at center, #071018 0%, #000 78%);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; padding: 24px; cursor: pointer;
  }
  #splash .logo { font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 32px; letter-spacing: 5px; color: #ff2d55; text-shadow: 0 0 10px #ff2d55, 0 0 26px rgba(255,45,85,0.65); }
  #splash .logo span { color: #fff; }
  #splash .tagline { margin-top: 10px; font-size: 14px; letter-spacing: 2px; color: rgba(255,255,255,0.6); }
  #start-btn {
    margin-top: 44px; width: 92px; height: 92px; border-radius: 50%;
    border: 2px solid #ff2d55; background: rgba(255,45,85,0.08);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 18px rgba(255,45,85,0.5), inset 0 0 14px rgba(255,45,85,0.25);
    animation: pulseBtn 1.8s ease-in-out infinite;
  }
  #start-btn svg { width: 34px; height: 34px; }
  @keyframes pulseBtn {
    0%, 100% { transform: scale(1); box-shadow: 0 0 18px rgba(255,45,85,0.5), inset 0 0 14px rgba(255,45,85,0.25); }
    50% { transform: scale(1.06); box-shadow: 0 0 30px rgba(255,45,85,0.75), inset 0 0 18px rgba(255,45,85,0.35); }
  }
  #splash .hint { margin-top: 22px; font-family: 'Orbitron', sans-serif; font-size: 12px; letter-spacing: 2px; color: #ff8ca3; }

  /* ============ LOADING ============ */
  #loading { position: fixed; inset: 0; z-index: 90; background: #000; display: none; flex-direction: column; align-items: center; justify-content: center; }
  #loading.show { display: flex; }
  .spinner { position: relative; width: 78px; height: 78px; }
  .spinner .ring { position: absolute; inset: 0; border-radius: 50%; border: 3px solid transparent; border-top-color: #ff2d55; border-right-color: #ff2d55; animation: spin 1.1s linear infinite; }
  .spinner .ring.r2 { inset: 12px; border-top-color: transparent; border-right-color: transparent; border-bottom-color: #00f0ff; border-left-color: #00f0ff; animation-duration: 1.6s; animation-direction: reverse; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading .txt { margin-top: 24px; font-family: 'Orbitron', sans-serif; font-size: 12px; letter-spacing: 2px; color: #ff8ca3; text-shadow: 0 0 6px rgba(255,45,85,0.7); }

  /* ============ HEADER ============ */
  #header {
    position: fixed; top: 0; left: 0; width: 100%; z-index: 20; pointer-events: none;
    padding: 18px 16px 26px; text-align: center;
    background: linear-gradient(180deg, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.4) 60%, rgba(0,0,0,0) 100%);
    opacity: 0; transition: opacity 0.6s ease;
  }
  #header.show { opacity: 1; }
  #header .h1 { font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 28px; letter-spacing: 4px; color: #ff2d55; text-shadow: 0 0 10px rgba(255,45,85,0.8); }
  #header .h2 { margin-top: 2px; font-family: 'Orbitron', sans-serif; font-size: 10px; letter-spacing: 3px; color: #00f0ff; }

  /* ============ SCAN RETICLE ============ */
  #reticle {
    position: fixed; left: 50%; top: 48%; width: 55vw; max-width: 280px; aspect-ratio: 1.35/1;
    transform: translate(-50%, -50%); z-index: 10; pointer-events: none;
    opacity: 0; transition: opacity 0.5s ease;
  }
  #reticle.show { opacity: 1; }
  #reticle .chip {
    position: absolute; top: -30px; left: 50%; transform: translateX(-50%);
    display: flex; align-items: center; gap: 6px; padding: 4px 10px 4px 6px;
    background: rgba(4,10,14,0.8); border: 1px solid rgba(0,240,255,0.6); border-radius: 20px;
    font-family: 'Orbitron', sans-serif; font-size: 9px; letter-spacing: 1.5px; color: #9df9ff;
  }
  #reticle .chip .dot { width: 5px; height: 5px; border-radius: 50%; background: #00f0ff; animation: dotPulse 1s ease-in-out infinite; }
  @keyframes dotPulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
  
  #reticle.locked .chip { border-color: rgba(255,45,85,0.8); color: #fff; background: rgba(255,45,85,0.2); }
  #reticle.locked .chip .dot { background: #ff2d55; animation: none; box-shadow: 0 0 8px #ff2d55; }

  .r-corner { position: absolute; width: 20px; height: 20px; border: 2px solid #00f0ff; filter: drop-shadow(0 0 4px #00f0ff); transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
  .r-corner.tl { top: 0; left: 0; border-right: none; border-bottom: none; border-radius: 6px 0 0 0; }
  .r-corner.tr { top: 0; right: 0; border-left: none; border-bottom: none; border-radius: 0 6px 0 0; }
  .r-corner.bl { bottom: 0; left: 0; border-right: none; border-top: none; border-radius: 0 0 0 6px; }
  .r-corner.br { bottom: 0; right: 0; border-left: none; border-top: none; border-radius: 0 0 6px 0; }
  #reticle.locked .r-corner { border-color: #ff2d55; filter: drop-shadow(0 0 6px #ff2d55); width: 12px; height: 12px; }

  #reticle .scanline {
    position: absolute; left: 5%; right: 5%; top: 10%; height: 1px;
    background: linear-gradient(90deg, transparent, #00f0ff, transparent);
    box-shadow: 0 0 8px #00f0ff; animation: scanMove 1.5s linear infinite;
  }
  #reticle.locked .scanline { display: none; }
  @keyframes scanMove { 0% { top: 10%; opacity: 0; } 15% { opacity: 1; } 85% { opacity: 1; } 100% { top: 90%; opacity: 0; } }

  /* ============ AR SCENE & CREATIVE IMAGE CARDS ============ */
  #ar-scene {
    position: fixed; inset: 0; z-index: 12;
    pointer-events: none; perspective: 1000px;
    transform-style: preserve-3d; transition: transform 0.1s ease-out;
  }

  /* Connecting Lines */
  .spec-line {
    stroke-dasharray: 1000; stroke-dashoffset: 1000; opacity: 0;
    transition: stroke-dashoffset 0.8s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.6s ease;
  }
  .active-tracking .spec-line { stroke-dashoffset: 0; opacity: 1; }

  /* Target Markers */
  .target {
    position: absolute; width: 24px; height: 24px;
    transform: translate(-50%, -50%) scale(0.1); opacity: 0;
    transition: opacity 0.4s ease, transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .active-tracking .target { opacity: 1; transform: translate(-50%, -50%) scale(1); }
  
  .target .dot {
    position: absolute; top: 50%; left: 50%;
    width: 4px; height: 4px; background: #fff; border-radius: 50%;
    transform: translate(-50%, -50%); box-shadow: 0 0 10px #fff;
  }
  .target .arcs {
    position: absolute; inset: 0; border: 1.5px solid rgba(255,45,85,0.9); border-radius: 50%;
    border-top-color: transparent; border-bottom-color: transparent;
    animation: spinTarget 2s linear infinite;
  }

  /* --- The New Compact & Creative Image Cards --- */
  .spec-card {
    position: absolute;
    width: 120px; /* Perfectly sized small cards */
    /* Hide state */
    opacity: 0;
    transform: translateY(20px) scale(0.7) translateZ(-40px) rotateX(-15deg);
    transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    filter: drop-shadow(0 8px 16px rgba(0,0,0,0.9));
  }
  
  /* Show state (When target is locked) */
  .active-tracking .spec-card { 
    opacity: 1; 
    transform: translateY(0) scale(1) translateZ(0) rotateX(0deg); 
  }
  
  /* Delay for a cascading reveal effect */
  .active-tracking .card-delay-1 { transition-delay: 0.1s; }
  .active-tracking .card-delay-2 { transition-delay: 0.2s; }
  .active-tracking .card-delay-3 { transition-delay: 0.3s; }
  .active-tracking .card-delay-4 { transition-delay: 0.4s; }

  /* Techy Label above image */
  .spec-label {
    font-family: 'Orbitron', sans-serif; font-size: 8px; font-weight: 700;
    color: #ff2d55; letter-spacing: 1px; margin-bottom: 4px;
    text-shadow: 0 0 5px rgba(255,45,85,0.6);
    display: flex; align-items: center; gap: 4px;
  }
  .spec-label::before {
    content: ''; display: inline-block; width: 4px; height: 4px;
    background: #ff2d55; border-radius: 50%;
  }

  /* Glassmorphism Image Container */
  .spec-image-box {
    width: 100%;
    border: 1px solid rgba(255, 45, 85, 0.5);
    background: rgba(5, 5, 10, 0.6);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    border-radius: 6px;
    padding: 4px;
    box-shadow: 0 0 12px rgba(255, 45, 85, 0.2), inset 0 0 8px rgba(255, 45, 85, 0.15);
    position: relative;
    overflow: hidden;
  }
  
  /* Cyber scanning line inside image box */
  .spec-image-box::after {
    content: ''; position: absolute; top: -100%; left: 0; width: 100%; height: 2px;
    background: rgba(255, 45, 85, 0.8);
    box-shadow: 0 0 8px #ff2d55;
    animation: techScan 4s ease-in-out infinite; z-index: 2;
  }
  @keyframes techScan { 0%, 100% { top: -10px; opacity: 0; } 50% { top: 110%; opacity: 1; } }

  .spec-image-box img {
    width: 100%; height: auto; min-height: 70px; display: block; border-radius: 3px;
    object-fit: cover; background: rgba(255,255,255,0.03);
  }

  /* Fallback shown automatically if the real photo fails to load,
     so the card never collapses to an invisible sliver */
  .spec-image-box .fallback-icon {
    display: none; width: 100%; aspect-ratio: 4/3; align-items: center; justify-content: center;
    border-radius: 3px; background: rgba(255,255,255,0.03);
  }
  .spec-image-box .fallback-icon svg { width: 46%; height: 46%; }
  .spec-image-box.img-failed img { display: none; }
  .spec-image-box.img-failed .fallback-icon { display: flex; }

  /* ============ BOTTOM STATUS ============ */
  #found-bar {
    position: fixed; bottom: 0; left: 0; width: 100%; padding: 15px 20px 25px; z-index: 20;
    background: linear-gradient(0deg, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%);
    text-align: center; opacity: 0; transform: translateY(15px);
    transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); pointer-events: none;
  }
  #found-bar.show { opacity: 1; transform: translateY(0); }
  #found-bar .title { font-family: 'Orbitron', sans-serif; font-size: 13px; letter-spacing: 2px; color: #fff; }
  #found-bar .title span { color: #ff2d55; text-shadow: 0 0 8px #ff2d55; }
  #found-bar .sub { margin-top: 4px; font-size: 10px; letter-spacing: 1px; color: rgba(255,255,255,0.5); }

</style>
</head>
<body>

<video id="camera-feed" autoplay playsinline muted></video>

<div id="splash">
  <div class="logo">XQOM <span>AR</span></div>
  <div class="tagline">VEHICLE SPEC SCANNER</div>
  <div id="start-btn">
    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M4 8V6a2 2 0 0 1 2-2h2M4 16v2a2 2 0 0 0 2 2h2M20 8V6a2 2 0 0 0-2-2h-2M20 16v2a2 2 0 0 1-2 2h-2" stroke="#ff2d55" stroke-width="2" stroke-linecap="round"/>
      <circle cx="12" cy="12" r="3.4" stroke="#ff2d55" stroke-width="2"/>
    </svg>
  </div>
  <div class="hint">TAP ANYWHERE TO START</div>
</div>

<div id="loading">
  <div class="spinner"><div class="ring"></div><div class="ring r2"></div></div>
  <div class="txt">INITIALIZING SYSTEM<span>...</span></div>
</div>

<div id="header">
  <div class="h1">VEHICLE SPECS</div>
  <div class="h2">[ LIVE TELEMETRY ]</div>
</div>

<div id="reticle">
  <div class="chip"><span class="dot"></span><span class="chip-text">SCANNING</span></div>
  <div class="r-corner tl"></div>
  <div class="r-corner tr"></div>
  <div class="r-corner bl"></div>
  <div class="r-corner br"></div>
  <div class="scanline"></div>
</div>

<div id="ar-scene">
  
  <!-- Dynamic SVG Lines Linking Image Cards to Targets -->
  <svg id="ar-lines" style="position: absolute; inset: 0; width: 100%; height: 100%; z-index: 1;">
    <!-- Line start points now match each card's real left/top (card edge nearest its target) -->
    <line x1="30%" y1="23%" x2="42%" y2="40%" stroke="rgba(255,45,85,0.6)" stroke-width="1.5" class="spec-line" id="line1"/>
    <line x1="30%" y1="63%" x2="48%" y2="60%" stroke="rgba(255,45,85,0.6)" stroke-width="1.5" class="spec-line card-delay-1" id="line2"/>
    <line x1="65%" y1="23%" x2="58%" y2="45%" stroke="rgba(255,45,85,0.6)" stroke-width="1.5" class="spec-line card-delay-2" id="line3"/>
    <line x1="65%" y1="48%" x2="55%" y2="50%" stroke="rgba(255,45,85,0.6)" stroke-width="1.5" class="spec-line card-delay-3" id="line4"/>
    <line x1="65%" y1="73%" x2="62%" y2="65%" stroke="rgba(255,45,85,0.6)" stroke-width="1.5" class="spec-line card-delay-4" id="line5"/>
  </svg>

  <!-- Tracked Target Points on the Vehicle -->
  <div class="target" id="target1" style="left: 42%; top: 40%;"><div class="dot"></div><div class="arcs"></div></div>
  <div class="target card-delay-1" id="target2" style="left: 48%; top: 60%;"><div class="dot"></div><div class="arcs"></div></div>
  <div class="target card-delay-2" id="target3" style="left: 58%; top: 45%;"><div class="dot"></div><div class="arcs"></div></div>
  <div class="target card-delay-3" id="target4" style="left: 55%; top: 50%;"><div class="dot"></div><div class="arcs"></div></div>
  <div class="target card-delay-4" id="target5" style="left: 62%; top: 65%;"><div class="dot"></div><div class="arcs"></div></div>

  <!-- CARD 1: LED LIGHTING SYSTEM -->
  <div class="spec-card" id="card1" data-line="line1" data-target="target1" style="left: 8%; top: 18%;">
    <div class="spec-label">SYS.01 // OPTICS</div>
    <div class="spec-image-box">
      <img src="image/led-system.png" alt="LED System" onerror="this.parentElement.classList.add('img-failed')">
      <div class="fallback-icon"><svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M9 18h6M10 21h4M12 3a6 6 0 0 0-4 10.5c.7.6 1 1.4 1 2.5h6c0-1.1.3-1.9 1-2.5A6 6 0 0 0 12 3Z" stroke="#00f0ff" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
    </div>
  </div>

  <!-- CARD 2: ENGINE -->
  <div class="spec-card card-delay-1" id="card2" data-line="line2" data-target="target2" style="left: 8%; top: 58%;">
    <div class="spec-label">SYS.02 // POWER</div>
    <div class="spec-image-box">
      <img src="image/engine.png" alt="Engine" onerror="this.parentElement.classList.add('img-failed')">
      <div class="fallback-icon"><svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="3" y="9" width="9" height="7" rx="1" stroke="#00f0ff" stroke-width="1.4"/><path d="M12 11h3l3-3h2M12 14h3l3 3h2M6 9V6h4v3" stroke="#00f0ff" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
    </div>
  </div>

  <!-- CARD 3: FROK / FRONT FORK -->
  <div class="spec-card card-delay-2" id="card3" data-line="line3" data-target="target3" style="left: 65%; top: 18%;">
    <div class="spec-label">SYS.03 // SUSPENSION</div>
    <div class="spec-image-box">
      <img src="image/frok.png" alt="Front Fork" onerror="this.parentElement.classList.add('img-failed')">
      <div class="fallback-icon"><svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M8 3v7M16 3v7M8 10c0 3 2 3 2 6v5M16 10c0 3-2 3-2 6v5" stroke="#00f0ff" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
    </div>
  </div>

  <!-- CARD 4: STYLING -->
  <div class="spec-card card-delay-3" id="card4" data-line="line4" data-target="target4" style="left: 65%; top: 43%;">
    <div class="spec-label">SYS.04 // AERO</div>
    <div class="spec-image-box">
      <img src="image/styling.png" alt="Styling" onerror="this.parentElement.classList.add('img-failed')">
      <div class="fallback-icon"><svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M3 12h13M3 12a3 3 0 1 0 3 3M16 12a3 3 0 1 0-3-3M9 19h9a3 3 0 1 0-3-3" stroke="#00f0ff" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
    </div>
  </div>

  <!-- CARD 5: PERIMETER FRAME -->
  <div class="spec-card card-delay-4" id="card5" data-line="line5" data-target="target5" style="left: 65%; top: 68%;">
    <div class="spec-label">SYS.05 // CHASSIS</div>
    <div class="spec-image-box">
      <img src="image/frame.png" alt="Perimeter Frame" onerror="this.parentElement.classList.add('img-failed')">
      <div class="fallback-icon"><svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 2 3 7v10l9 5 9-5V7l-9-5Z" stroke="#00f0ff" stroke-width="1.4" stroke-linejoin="round"/><path d="M3 7l9 5 9-5M12 22V12" stroke="#00f0ff" stroke-width="1.4" stroke-linejoin="round"/></svg></div>
    </div>
  </div>

</div>

<div id="found-bar">
  <div class="title">TARGET LOCKED <span>&mdash; DATA STREAM ACTIVE</span></div>
  <div class="sub">Holographic modules displaying live telemetry</div>
</div>

<script>
  const video      = document.getElementById('camera-feed');
  const splash     = document.getElementById('splash');
  const loading    = document.getElementById('loading');
  const header     = document.getElementById('header');
  const reticle    = document.getElementById('reticle');
  const chipText   = document.querySelector('#reticle .chip-text');
  const foundBar   = document.getElementById('found-bar');
  const arScene    = document.getElementById('ar-scene');

  const arLinesSvg = document.getElementById('ar-lines');

  // --- Keep connector lines perfectly locked onto their card + target,
  // regardless of screen size / orientation ---
  function syncSpecLines() {
    const sceneRect = arScene.getBoundingClientRect();
    if (!sceneRect.width || !sceneRect.height) return;

    document.querySelectorAll('.spec-card').forEach(card => {
      const line = document.getElementById(card.dataset.line);
      const target = document.getElementById(card.dataset.target);
      const box = card.querySelector('.spec-image-box');
      if (!line || !target || !box) return;

      const boxRect = box.getBoundingClientRect();
      const targetRect = target.getBoundingClientRect();

      const targetX = targetRect.left + targetRect.width / 2 - sceneRect.left;
      const targetY = targetRect.top + targetRect.height / 2 - sceneRect.top;
      const boxCenterX = boxRect.left + boxRect.width / 2 - sceneRect.left;
      const boxCenterY = boxRect.top + boxRect.height / 2 - sceneRect.top;

      const startX = targetX > boxCenterX ? boxRect.right - sceneRect.left : boxRect.left - sceneRect.left;
      const startY = boxCenterY;

      line.setAttribute('x1', ((startX / sceneRect.width) * 100).toFixed(2) + '%');
      line.setAttribute('y1', ((startY / sceneRect.height) * 100).toFixed(2) + '%');
      line.setAttribute('x2', ((targetX / sceneRect.width) * 100).toFixed(2) + '%');
      line.setAttribute('y2', ((targetY / sceneRect.height) * 100).toFixed(2) + '%');
    });
  }

  window.addEventListener('resize', syncSpecLines);
  window.addEventListener('orientationchange', () => setTimeout(syncSpecLines, 300));

  let isScanningActive = false;
  let isLocked = false;
  let baseBeta = null, baseGamma = null;
  let smoothBeta = 0, smoothGamma = 0; 
  const SMOOTHING = 0.12; 
  const LOSE_THRESHOLD = 25; // How far device can move before tracking drops
  const REGAIN_THRESHOLD = 8;

  async function startSequence() {
    splash.style.display = 'none';
    loading.classList.add('show');
    
    // 1. Setup Camera
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: { ideal: 'environment' } }, audio: false
      });
      video.srcObject = stream;
      await video.play();
    } catch (err) {
      console.warn("Camera unavailable. Using fallback background.");
    }

    // 2. Setup Motion Tracking
    try {
      if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
        const response = await DeviceOrientationEvent.requestPermission();
        if (response === 'granted') {
          window.addEventListener('deviceorientation', handleOrientation);
        }
      } else {
        window.addEventListener('deviceorientation', handleOrientation);
      }
    } catch (err) {
      console.error("Motion tracking permission denied.");
    }

    // Start UI
    loading.classList.remove('show');
    header.classList.add('show');
    reticle.classList.add('show');
    isScanningActive = true;
    syncSpecLines();
    
    // Simulate finding the target after a few seconds
    setTimeout(lockOnTarget, 2000);
  }

  // --- Show Images when Tracking is Locked ---
  function lockOnTarget() {
    if (isLocked || !isScanningActive) return;
    isLocked = true;
    
    reticle.classList.add('locked');
    chipText.textContent = 'LOCKED';
    foundBar.classList.add('show');
    
    // Adding this class triggers all the CSS appearance animations
    arScene.classList.add('active-tracking');
    // Recalculate connector line endpoints once cards finish animating into place
    setTimeout(syncSpecLines, 950);
  }

  // --- Hide Images when Tracking is Lost ---
  function loseTargetTracking() {
    if (!isLocked) return;
    isLocked = false;
    
    reticle.classList.remove('locked');
    chipText.textContent = 'SCANNING';
    foundBar.classList.remove('show');
    
    // Removing this class seamlessly triggers the CSS disappearance animations
    arScene.classList.remove('active-tracking');
  }

  // --- Gyroscope Logic (Simulates losing/gaining tracking) ---
  function handleOrientation(e) {
    if (!isScanningActive || e.beta === null || e.gamma === null) return;

    if (baseBeta === null) { baseBeta = e.beta; baseGamma = e.gamma; return; }

    smoothBeta += ((e.beta - baseBeta) - smoothBeta) * SMOOTHING;
    smoothGamma += ((e.gamma - baseGamma) - smoothGamma) * SMOOTHING;

    const driftAngle = Math.hypot(smoothBeta, smoothGamma);

    // If locked and moved too much, lose tracking (hide images)
    if (isLocked) {
      if (driftAngle > LOSE_THRESHOLD) {
        loseTargetTracking();
        return;
      }
      // Parallax effect
      const rotY = smoothGamma * 0.5; 
      const rotX = smoothBeta * -0.5; 
      arScene.style.transform = `rotateY(${rotY}deg) rotateX(${rotX}deg)`;
    } 
    // If not locked and held steady, regain tracking (show images)
    else {
      if (driftAngle < REGAIN_THRESHOLD) { 
        lockOnTarget(); 
      }
    }
  }

  // Start on click anywhere
  splash.addEventListener('click', startSequence);
</script>
