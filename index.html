<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Pulsar NS200 — AR Spec Scanner</title>
<script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800;900&family=Rajdhani:wght@500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{
  --carbon:#0a0a0c;
  --carbon-2:#141416;
  --pulsar-orange:#ff3b00;
  --pulsar-amber:#ffaa00;
  --telemetry-cyan:#00f0ff;
  --geo-silver:#d9dde1;
  --ink:#f3efe6;
  --ink-dim:#9a9a9e;
}
*{box-sizing:border-box;}
html,body{margin:0;overflow:hidden;width:100%;height:100%;background-color:transparent;font-family:'Rajdhani',sans-serif;}
a-scene{position:absolute;top:0;left:0;width:100%;height:100%;z-index:1;}

#mindar-ui-scanning, .mindar-ui-overlay { display: none !important; }

/* ============ MODERN LOADING SCREEN ============ */
#start-overlay{
  position:fixed;inset:0;width:100%;height:100%;z-index:9999;
  background: radial-gradient(circle at top right, rgba(20,20,22,1) 0%, rgba(5,5,6,1) 100%);
  display:flex;flex-direction:column;
  transition:all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
  overflow:hidden;
}
.hero-photo-wrap{
  position:relative;width:100%;height:52%;min-height:260px;overflow:hidden;
  clip-path:polygon(0 0,100% 0,100% 90%,0 100%);
  border-bottom: 3px solid var(--pulsar-orange);
  box-shadow: 0 10px 30px rgba(255, 59, 0, 0.2);
}
.hero-photo-wrap img{
  width:100%;height:100%;object-fit:cover;object-position:center 35%;
  filter:saturate(1.2) contrast(1.15);
  transition: transform 6s ease;
}
#start-overlay:hover .hero-photo-wrap img { transform: scale(1.08); }

/* Sci-Fi Scanline overlay on image */
.hero-photo-wrap::before {
  content: "";
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    to bottom,
    transparent,
    transparent 2px,
    rgba(0, 240, 255, 0.05) 3px,
    transparent 4px
  );
  z-index: 2;
  pointer-events: none;
}

.hero-photo-wrap::after{
  content:"";position:absolute;inset:0;
  background:linear-gradient(180deg, rgba(5,5,6,0) 20%, rgba(5,5,6,0.98) 98%),
             linear-gradient(90deg, rgba(5,5,6,0.6) 0%, rgba(5,5,6,0) 50%);
  z-index: 3;
}

.content-wrap{
  flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;
  padding:20px max(26px, 5%) max(26px, env(safe-area-inset-bottom)) max(26px, 5%);
  text-align:center;
  position: relative;
  z-index: 5;
}
.eyebrow-row{ display:flex;align-items:center;gap:12px;margin-bottom:14px; }
.led-dot{width:10px;height:10px;border-radius:50%;background:var(--telemetry-cyan);
  box-shadow:0 0 15px var(--telemetry-cyan);animation:pulse 1.2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.4;transform:scale(0.8);}}
.eyebrow{
  font-family:'JetBrains Mono',monospace;font-size:clamp(11px, 2.8vw, 14px);letter-spacing:5px;
  color:var(--telemetry-cyan);text-transform:uppercase; font-weight: 700;
}
.brand-title{
  font-family:'Orbitron',sans-serif;font-weight:900;color:var(--ink);
  font-size:clamp(34px, 9vw, 58px);line-height:1.1;letter-spacing:3px;
  text-transform:uppercase;margin:0;
  text-shadow: 0 6px 25px rgba(0,0,0,0.8);
}
.brand-title .accent{ 
  background: -webkit-linear-gradient(135deg, var(--pulsar-orange), var(--pulsar-amber));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* Glassmorphism Stat Strip */
.stat-strip{
  display:grid;grid-template-columns:repeat(3, 1fr);gap:15px;
  width:100%;max-width:680px;margin:32px 0;
  background:rgba(255,255,255,0.04);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-radius:16px;
  border:1px solid rgba(255,255,255,0.1);
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  padding:20px;
}
.stat{ text-align:center;border-right:1px solid rgba(255,255,255,0.1); }
.stat:last-child{border-right:none;}
.stat-value{
  font-family:'Orbitron',sans-serif;font-weight:800;font-size:clamp(18px, 5vw, 26px);
  color:var(--telemetry-cyan);
  display:block;
  text-shadow: 0 0 10px rgba(0, 240, 255, 0.4);
}
.stat-label{
  font-family:'JetBrains Mono',monospace;font-size:clamp(10px, 2.5vw, 12px);letter-spacing:2px;
  color:var(--ink-dim);text-transform:uppercase;display:block;margin-top:8px;
}

.scan-btn{
  position:relative;overflow:hidden;
  background:linear-gradient(135deg,var(--pulsar-orange),var(--pulsar-amber));
  border:none;color:#050505;padding:20px 50px;font-size:clamp(14px, 4vw, 18px);font-weight:900;
  font-family:'Orbitron',sans-serif;border-radius:50px;cursor:pointer;letter-spacing:4px;text-transform:uppercase;
  box-shadow:0 10px 40px rgba(255,59,0,0.5);width:100%;max-width:380px;transition:all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
.scan-btn:hover { 
  transform: translateY(-4px) scale(1.02); 
  box-shadow: 0 15px 50px rgba(255,59,0,0.7); 
}
.scan-btn::after{
  content:"";position:absolute;top:0;left:-100%;width:50%;height:100%;
  background:linear-gradient(120deg, transparent, rgba(255,255,255,0.8), transparent);
  animation:sweep 2.5s ease-in-out infinite;
}
@keyframes sweep{ 0%{left:-100%;} 50%{left:200%;} 100%{left:200%;} }

#scan-hint{
  position:fixed;bottom:max(40px, env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);
  color:var(--telemetry-cyan);
  background:rgba(10,10,12,0.85);
  padding:16px 28px;border-radius:16px;
  font-family:'JetBrains Mono',monospace;font-size:clamp(11px,3.5vw,13px);font-weight:700;z-index:99;
  border:1px solid rgba(0, 240, 255, 0.4);
  box-shadow: 0 0 20px rgba(0, 240, 255, 0.2);
  pointer-events:none;text-align:center;letter-spacing:2px;
  backdrop-filter: blur(10px); max-width:90vw; width:max-content;
  text-transform: uppercase;
}
</style>
</head>
<body>

<div id="start-overlay">
  <div class="hero-photo-wrap">
    <img id="bike-hero-img" src="image/frame.png" alt="Pulsar NS200 Preview">
  </div>
  <div class="content-wrap">
    <div>
      <div class="eyebrow-row">
        <div class="led-dot"></div>
        <span id="app-eyebrow" class="eyebrow">AR Spec System</span>
      </div>
      <h1 id="app-title" class="brand-title">Pulsar <span class="accent">NS200</span></h1>
    </div>
    <div class="stat-strip" id="json-stats-container"></div>
    <button class="scan-btn" onclick="startScanner()">
      <span>Launch AR Telemetry</span>
    </button>
  </div>
</div>

<div id="scan-hint">Aim Camera at Scooter Target Image</div>

<a-scene id="ar-scene" mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; filterMinCF: 0.0001; filterBeta: 0.005; uiScanning: no;" 
         color-space="sRGB" 
         renderer="colorManagement: true, physicallyCorrectLights" 
         vr-mode-ui="enabled: false" 
         device-orientation-permission-ui="enabled: false">

  <a-assets>
    <a-asset-item id="frame-model" src="./scooter_hud.glb"></a-asset-item>
    <img id="img-engine" src="image/engine.png" crossorigin="anonymous">
    <img id="img-frame" src="image/frame.png" crossorigin="anonymous">
    <img id="img-frok" src="image/frok.png" crossorigin="anonymous">
    <img id="img-led" src="image/led%20system.png" crossorigin="anonymous">
    <img id="img-styling" src="image/styling.png" crossorigin="anonymous">
  </a-assets>

  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

</a-scene>

<script>
  const USE_GLB_FRAME = true;

  const bikeDatabase = [
    {
      "targetIdx": 0,
      "brandName": "Pulsar",
      "modelName": "NS200",
      "systemTag": "Holographic Telemetry",
      "dashboardSpecs": [
        { "value": "160 cc", "label": "Oil-Cooled" },
        { "value": "17 PS", "label": "Max Power" },
        { "value": "14.6 NM", "label": "Torque" }
      ],
      "arSeparateCards": [
        { "title": "BRUTE POWER", "imgSrc": "#img-engine", "desc": "OIL-COOLED 160CC\n17 PS @ 9000 RPM\n14.6 NM TORQUE" },
        { "title": "PERIMETER FRAME", "imgSrc": "#img-frame", "desc": "HIGH STIFFNESS\nLOW FLEX CHASSIS" },
        { "title": "USD FRONT FORK", "imgSrc": "#img-frok", "desc": "UPSIDE-DOWN FORK\nSHARP CORNERING" },
        { "title": "LED LIGHTING", "imgSrc": "#img-led", "desc": "LED HEADLAMP\n+ LED DRL" },
        { "title": "MUSCULAR STYLING", "imgSrc": "#img-styling", "desc": "STREET FIGHTER\nSPEED-LINE TANK" }
      ]
    },
    { "targetIdx": 1, "useSameAs": 0 },
    { "targetIdx": 2, "useSameAs": 0 },
    { "targetIdx": 3, "useSameAs": 0 }
  ];

  const anchorState = []; 
  // Futuristic Palette
  const accentPalette = ['#00f0ff', '#ff3b00', '#ffaa00', '#00ff66', '#d900ff'];

  function buildGlbFrame(color) {
    const frame = document.createElement('a-entity');
    frame.setAttribute('visible', 'false');
    frame.setAttribute('gltf-model', '#frame-model');
    frame.setAttribute('scale', '1.35 1.35 1.35');
    frame.setAttribute('position', '0 0.05 -0.05'); 
    
    // Add a slow rotation animation for the 3D HUD frame
    frame.setAttribute('animation', 'property: rotation; to: 0 360 0; loop: true; dur: 20000; easing: linear');

    frame.addEventListener('model-loaded', () => {
      const mesh = frame.getObject3D('mesh');
      if (mesh) {
        mesh.traverse((node) => {
          if (node.isMesh && node.material) {
            node.material = node.material.clone();
            if(node.material.color) node.material.color.set(color);
            if(node.material.emissive) node.material.emissive.set(color);
            node.material.emissiveIntensity = 1.5; // Make it pop
          }
        });
      }
    });
    return frame;
  }

  function buildFrame(color) {
    return buildGlbFrame(color);
  }

  function accentRgba(hex, alpha) {
    const h = hex.replace('#', '');
    const r = parseInt(h.substring(0, 2), 16);
    const g = parseInt(h.substring(2, 4), 16);
    const b = parseInt(h.substring(4, 6), 16);
    return `rgba(${r}, ${g}, ${b}, ${alpha})`;
  }

  // --- ARTISTIC SPEC CARDS (Holographic effect) ---
  function buildCards(specsContainer, bikeData) {
    const cardsData = bikeData.arSeparateCards;
    const totalCards = cardsData.length;
    const radius = 2.15; // Slightly pushed out
    const startAngle = -Math.PI / 2;
    const cardW = 1.45, cardH = 1.0; // Slightly wider for a modern cinematic ratio

    cardsData.forEach((card, index) => {
      const angle = startAngle + (index / totalCards) * Math.PI * 2;
      const posX = Math.cos(angle) * radius;
      const posY = Math.sin(angle) * radius * 0.65; 
      const accent = accentPalette[index % accentPalette.length];

      const cardEntity = document.createElement('a-entity');
      cardEntity.setAttribute('class', 'spec-card');
      cardEntity.setAttribute('position', `${posX} ${posY} 0.1`);
      cardEntity.setAttribute('look-at', '[camera]');

      // Floating animation for each card (staggered based on index)
      const floatY = posY + 0.1;
      const floatDur = 2500 + (index * 300);
      cardEntity.setAttribute('animation', `property: position; to: ${posX} ${floatY} 0.1; dir: alternate; dur: ${floatDur}; loop: true; easing: easeInOutSine`);

      // Deep glow background
      const haloPlate = document.createElement('a-plane');
      haloPlate.setAttribute('width', cardW + 0.3);
      haloPlate.setAttribute('height', cardH + 0.3);
      haloPlate.setAttribute('color', accent);
      haloPlate.setAttribute('opacity', '0.08');
      haloPlate.setAttribute('position', '0 0 -0.04');
      haloPlate.setAttribute('material', 'shader: flat; side: double; transparent: true');
      cardEntity.appendChild(haloPlate);

      // Tech/Cyber border (Solid glowing line)
      const framePlate = document.createElement('a-plane');
      framePlate.setAttribute('width', cardW + 0.04);
      framePlate.setAttribute('height', cardH + 0.04);
      framePlate.setAttribute('color', accent);
      framePlate.setAttribute('position', '0 0 -0.01');
      framePlate.setAttribute('material', 'shader: flat; side: double; transparent: true; opacity: 0.9');
      cardEntity.appendChild(framePlate);

      // Main Image
      const posterPlane = document.createElement('a-plane');
      posterPlane.setAttribute('width', cardW);
      posterPlane.setAttribute('height', cardH);
      posterPlane.setAttribute('position', '0 0 0.01');
      posterPlane.setAttribute('material', `shader: flat; side: double; src: ${card.imgSrc}`);
      cardEntity.appendChild(posterPlane);

      // High-tech lower gradient scrim for text clarity
      const scrimPlate = document.createElement('a-plane');
      scrimPlate.setAttribute('width', cardW);
      scrimPlate.setAttribute('height', cardH * 0.35); // Taller scrim
      scrimPlate.setAttribute('color', '#000000');
      scrimPlate.setAttribute('opacity', '0.75');
      scrimPlate.setAttribute('position', `0 ${-cardH / 2 + (cardH * 0.35) / 2} 0.02`);
      scrimPlate.setAttribute('material', 'shader: flat; side: double; transparent: true');
      cardEntity.appendChild(scrimPlate);

      // Accent line separating image and text area
      const accentLine = document.createElement('a-plane');
      accentLine.setAttribute('width', cardW);
      accentLine.setAttribute('height', 0.02);
      accentLine.setAttribute('color', accent);
      accentLine.setAttribute('position', `0 ${-cardH / 2 + (cardH * 0.35)} 0.025`);
      accentLine.setAttribute('material', 'shader: flat; transparent: true; opacity: 0.8');
      cardEntity.appendChild(accentLine);

      // Modern typography for the title
      const captionText = document.createElement('a-text');
      captionText.setAttribute('value', card.title.toUpperCase());
      captionText.setAttribute('align', 'center');
      captionText.setAttribute('font', 'kelsonsans');
      captionText.setAttribute('color', '#ffffff');
      captionText.setAttribute('width', '2.8');
      captionText.setAttribute('letter-spacing', '3');
      captionText.setAttribute('position', `0 ${-cardH / 2 + (cardH * 0.18)} 0.03`);
      cardEntity.appendChild(captionText);

      specsContainer.appendChild(cardEntity);
    });
  }

  // --- SCI-FI CANVAS BANNER ---
  function createTitleBannerTexture(modelName, systemTag, accent) {
    const SCALE = 2;
    const W = 1000 * SCALE, H = 260 * SCALE;
    const canvas = document.createElement('canvas');
    canvas.width = W; canvas.height = H;
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, W, H);

    // Futuristic angled background
    ctx.save();
    ctx.shadowColor = accentRgba(accent, 0.6);
    ctx.shadowBlur = 25 * SCALE / 2;
    ctx.beginPath();
    ctx.moveTo(W * 0.05, 0);
    ctx.lineTo(W * 0.95, 0);
    ctx.lineTo(W, H * 0.5);
    ctx.lineTo(W * 0.95, H);
    ctx.lineTo(W * 0.05, H);
    ctx.lineTo(0, H * 0.5);
    ctx.closePath();
    
    // Tech grid / scanline pattern for banner background
    const bgGrad = ctx.createLinearGradient(0, 0, 0, H);
    bgGrad.addColorStop(0, 'rgba(15, 15, 20, 0.9)');
    bgGrad.addColorStop(1, 'rgba(5, 5, 8, 0.95)');
    ctx.fillStyle = bgGrad;
    ctx.fill();
    ctx.restore();
    
    ctx.strokeStyle = accent;
    ctx.lineWidth = 6 * SCALE / 2;
    ctx.stroke();

    // Metallic Title
    const titleGrad = ctx.createLinearGradient(0, H * 0.2, 0, H * 0.7);
    titleGrad.addColorStop(0, '#ffffff');
    titleGrad.addColorStop(0.5, accent);
    titleGrad.addColorStop(1, '#111111');
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.font = `900 ${105 * SCALE}px 'Arial Black', sans-serif`;
    ctx.lineJoin = 'round';
    ctx.strokeStyle = 'rgba(0,0,0,0.9)';
    ctx.lineWidth = 12 * SCALE / 2;
    ctx.strokeText(modelName.toUpperCase(), W / 2, H * 0.42);
    ctx.fillStyle = titleGrad;
    ctx.fillText(modelName.toUpperCase(), W / 2, H * 0.42);

    // Tech Subtitle
    ctx.font = `800 ${36 * SCALE}px 'Courier New', monospace`;
    ctx.fillStyle = '#00f0ff';
    ctx.letterSpacing = "8px";
    ctx.fillText(`[ ${systemTag.toUpperCase()} ]`, W / 2, H * 0.78);

    return canvas.toDataURL('image/png');
  }

  function buildBrandTitle(bikeData) {
    const brandTitleEntity = document.createElement('a-entity');
    brandTitleEntity.setAttribute('position', '0 1.9 0.02'); // Moved slightly up
    brandTitleEntity.setAttribute('look-at', '[camera]');

    const brandPlane = document.createElement('a-plane');
    brandPlane.setAttribute('width', '1.2'); // Made wider for the new canvas
    brandPlane.setAttribute('height', '0.31');
    brandPlane.setAttribute('material', 'shader: flat; side: double; transparent: true; opacity: 1');
    brandPlane.setAttribute(
      'material',
      'src',
      createTitleBannerTexture(bikeData.modelName, bikeData.systemTag, accentPalette[0])
    );

    // Add a gentle hover float to the main title too
    brandTitleEntity.setAttribute('animation', 'property: position; to: 0 1.95 0.02; dir: alternate; dur: 3000; loop: true; easing: easeInOutSine');

    brandTitleEntity.appendChild(brandPlane);
    return brandTitleEntity;
  }

  document.addEventListener("DOMContentLoaded", () => {
    const baseBike = bikeDatabase[0];
    document.getElementById("app-eyebrow").innerText = baseBike.systemTag;
    document.getElementById("app-title").innerHTML = `${baseBike.brandName} <span class="accent">${baseBike.modelName}</span>`;

    const gridContainer = document.getElementById("json-stats-container");
    gridContainer.innerHTML = "";
    baseBike.dashboardSpecs.forEach(spec => {
      const statBlock = document.createElement("div");
      statBlock.className = "stat";
      statBlock.innerHTML = `<span class="stat-value">${spec.value}</span><span class="stat-label">${spec.label}</span>`;
      gridContainer.appendChild(statBlock);
    });

    const arScene = document.getElementById('ar-scene');

    bikeDatabase.forEach((bikeData, idx) => {
      const actualData = bikeData.useSameAs !== undefined ? bikeDatabase[bikeData.useSameAs] : bikeData;
      
      const anchor = document.createElement('a-entity');
      anchor.setAttribute('mindar-image-target', `targetIndex: ${idx}`);

      const accent = accentPalette[idx % accentPalette.length];
      const frameEntity = buildFrame(accent);
      const brandTitle = buildBrandTitle(actualData);

      const specsContainer = document.createElement('a-entity');
      specsContainer.setAttribute('position', '0 0 0');
      buildCards(specsContainer, actualData);

      anchor.appendChild(frameEntity);
      anchor.appendChild(brandTitle);
      anchor.appendChild(specsContainer);
      arScene.appendChild(anchor);

      const state = { specsContainer, frameEntity, tracked: false };
      anchorState[idx] = state;

      anchor.addEventListener("targetFound", () => {
        state.tracked = true;
        frameEntity.setAttribute('visible', 'true');
        document.getElementById("scan-hint").style.display = "none";
      });
      anchor.addEventListener("targetLost", () => {
        state.tracked = false;
        frameEntity.setAttribute('visible', 'false');
        if (!anchorState.some(s => s && s.tracked)) {
          document.getElementById("scan-hint").style.display = "block";
        }
      });
    });
  });

  function showArError(message) {
    const hint = document.getElementById('scan-hint');
    hint.innerText = message;
    hint.style.borderColor = '#ff2b2b';
    hint.style.color = '#ffbcbc';
    hint.style.boxShadow = '0 0 20px rgba(255, 43, 43, 0.4)';
    hint.style.display = 'block';
    console.error('[AR ERROR]', message);
  }

  function startScanner() {
    const overlay = document.getElementById('start-overlay');
    const scene = document.getElementById('ar-scene');

    const beginAr = () => {
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        showArError('Camera API not available. Needs HTTPS + a modern browser.');
        return;
      }

      navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
        .then((stream) => {
          stream.getTracks().forEach((t) => t.stop());

          overlay.style.opacity = '0';
          overlay.style.transform = 'scale(1.1)';
          overlay.style.filter = 'blur(10px)';
          setTimeout(() => {
            overlay.style.display = 'none';
            try {
              scene.systems['mindar-image-system'].start();
            } catch (err) {
              showArError('AR failed to start: ' + err.message);
            }
          }, 800);
        })
        .catch((err) => {
          showArError('Camera error (' + err.name + '): ' + err.message);
        });
    };

    if (scene.hasLoaded) {
      beginAr();
    } else {
      showArError('System booting up, please wait...');
      scene.addEventListener('loaded', beginAr, { once: true });
    }
  }

  document.addEventListener('DOMContentLoaded', () => {
    const scene = document.getElementById('ar-scene');
    scene.addEventListener('arError', () => {
      showArError('MindAR failed to initialize. Check targets.mind.');
    });
  });
</script>
</body>
</html>
