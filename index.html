<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Bajaj Pulsar NS400 Real-World AR Scanner</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <style>
        html, body { margin: 0; overflow: hidden; width: 100%; height: 100%; background-color: transparent; }
        a-scene { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

        .mindar-ui-overlay { display: none !important; }

        /* Premium Interactive Overlay */
        #start-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #1a0e05 0%, #030201 100%);
            z-index: 9999; display: flex; flex-direction: column;
            justify-content: center; align-items: center; font-family: sans-serif;
        }
        .scan-btn {
            background: linear-gradient(45deg, #ff3d1a, #ffb100);
            border: none; color: #150800; padding: 16px 45px; font-size: 18px;
            font-weight: bold; border-radius: 35px; cursor: pointer; letter-spacing: 1px;
            box-shadow: 0 0 25px rgba(255, 61, 26, 0.45); transition: 0.2s;
            animation: pulseBtn 1.8s ease-in-out infinite;
        }
        @keyframes pulseBtn {
            0%, 100% { box-shadow: 0 0 25px rgba(255, 61, 26, 0.45); transform: scale(1); }
            50% { box-shadow: 0 0 40px rgba(255, 177, 0, 0.65); transform: scale(1.03); }
        }
        #status-txt { color: #ffb100; margin-top: 22px; font-size: 13px; letter-spacing: 2px; }

        /* Tech HUD Target Box for Real-World Alignment */
        #hud-scanner-frame {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 85vw; height: 55vw; max-width: 360px; max-height: 240px;
            border: 2px dashed rgba(255, 177, 0, 0.4); border-radius: 12px;
            z-index: 99; pointer-events: none; opacity: 0; transition: all 0.4s ease;
        }
        #hud-scanner-frame::before, #hud-scanner-frame::after {
            content: ''; position: absolute; width: 20px; height: 20px; border-color: #ff3d1a; border-style: solid;
        }
        #hud-scanner-frame::before { top: -2px; left: -2px; border-width: 3px 0 0 3px; }
        #hud-scanner-frame::after { bottom: -2px; right: -2px; border-width: 0 3px 3px 0; }

        #scan-hint {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            color: #ffb100; background: rgba(21, 8, 0, 0.85); padding: 12px 25px;
            border-radius: 20px; font-size: 12px; font-family: sans-serif; z-index: 99;
            border: 1px solid #ffb100; pointer-events: none; opacity: 0; transition: opacity 0.4s;
            text-align: center; width: 75%; max-width: 280px;
            animation: hintFloat 2.4s ease-in-out infinite;
        }
        @keyframes hintFloat {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(-6px); }
        }
    </style>
</head>
<body>

    <div id="start-overlay">
        <button class="scan-btn" id="activate-btn">START BIKE SCANNER</button>
        <div id="status-txt">TAP TO ACTIVATE BIKE AR SCANNER</div>
    </div>

    <!-- Real World Guide HUD Box -->
    <div id="hud-scanner-frame"></div>
    <div id="scan-hint">ALIGN PULSAR NS400 SIDE-VIEW IN HUD BOX</div>

    <!-- Optimized WebAR Engine to reduce real-world tracking jitters -->
    <a-scene
        id="main-scene"
        embedded
        mindar-image="imageTargetSrc: targets.mind; autoStart: false; uiLoading: no; uiScanning: no; uiError: no; filterMinCF: 0.0001; filterBeta: 0.09;"
        color-space="sRGB"
        renderer="colorManagement: true; antialias: true; alpha: true; precision: mediump;"
        vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false"
    >
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="bike-anchor" mindar-image-target="targetIndex: 0">

            <!-- Scale calibrated to look proportionate against an actual physical motorcycle -->
            <a-entity id="spatial-cards" scale="0.001 0.001 0.001"
                      animation__scale="property: scale; to: 1 1 1; dur: 850; easing: easeOutElastic; startEvents: animateFound"
                      animation__out="property: scale; to: 0.001 0.001 0.001; dur: 200; easing: linear; startEvents: animateLost">

                <!-- Rotating energy rings sitting under the bike frame -->
                <a-ring color="#ff6a00" radius-inner="0.9" radius-outer="0.96" rotation="-90 0 0" position="0 -0.6 0" opacity="0.5" shader="flat"
                        animation="property: rotation; to: -90 0 360; loop: true; dur: 6000; easing: linear"></a-ring>
                <a-ring color="#ffb100" radius-inner="1.02" radius-outer="1.05" rotation="-90 0 0" position="0 -0.6 0" opacity="0.3" shader="flat"
                        animation="property: rotation; to: -90 0 -360; loop: true; dur: 9000; easing: linear"></a-ring>

                <!-- ================= FLOATING HEADER BADGE ================= -->
                <a-entity id="title-float" position="0 1.6 0"
                          animation__bob="property: position; from: 0 1.6 0; to: 0 1.7 0; dir: alternate; loop: true; dur: 1800; easing: easeInOutSine">
                    <a-plane width="2.4" height="0.5" color="#ff6a00" opacity="0.2" shader="flat" position="0 0 -0.02"></a-plane>
                    <a-entity geometry="primitive: plane; width: 2.1; height: 0.45" material="color: #150800; opacity: 0.9; shader: flat"></a-entity>
                    <a-text value="BAJAJ PULSAR NS400" color="#ffb100" align="center" width="4.0" position="0 0.08 0.02" font="kelsonsans"></a-text>
                    <a-text value="· STREET NAKED · ADVENTURE SPORT ·" color="#ff9d3d" align="center" width="1.8" position="0 -0.1 0.02" opacity="0.9"></a-text>
                </a-entity>

                <!-- ================= REAL WORLD CALIBRATED CALLOUT LINES ================= -->
                <!-- Lines extend accurately from bike engine/wheels outwards -->
                <a-entity line="start: -0.1 0.1 0.1; end: -1.0 0.4 0.3; color: #ffb100; opacity: 0.8" animation__fade="startEvents: animateFound"></a-entity>
                <a-entity line="start: -0.3 -0.3 0.1; end: -1.0 -0.1 0.2; color: #ff6a00; opacity: 0.8" animation__fade="startEvents: animateFound"></a-entity>
                <a-entity line="start: -0.4 -0.5 0.1; end: -1.0 -0.6 0.3; color: #ffb100; opacity: 0.8" animation__fade="startEvents: animateFound"></a-entity>

                <a-entity line="start: 0.3 0.4 0.1; end: 1.0 0.4 0.3; color: #ff6a00; opacity: 0.8" animation__fade="startEvents: animateFound"></a-entity>
                <a-entity line="start: 0.2 0.0 0.1; end: 1.0 -0.1 0.2; color: #ffb100; opacity: 0.8" animation__fade="startEvents: animateFound"></a-entity>
                <a-entity line="start: 0.4 -0.4 0.1; end: 1.0 -0.6 0.3; color: #ff6a00; opacity: 0.8" animation__fade="startEvents: animateFound"></a-entity>

                <!-- ================= INFO CALLOUT CARDS (POINTERS OUTSIDE BODY) ================= -->
                <!-- LEFT COLUMN -->
                <!-- ENGINE (Calibrated to real engine position) -->
                <a-entity position="-1.6 0.4 0.3" rotation="0 15 0">
                    <a-plane width="1.4" height="0.06" color="#ffb100" shader="flat" position="0 0.16 0.01"></a-plane>
                    <a-text value="ENGINE" color="#150800" align="center" width="1.8" position="0 0.16 0.02"></a-text>
                    <a-plane width="1.4" height="0.45" color="#1a0e05" opacity="0.9" shader="flat">
                        <a-text value="373.27cc Liquid-Cooled\n40 HP (30kW) · 35 Nm\n6-Speed Gearbox" color="#ffb100" align="center" width="2.0"></a-text>
                    </a-plane>
                </a-entity>

                <!-- DIMENSIONS -->
                <a-entity position="-1.6 -0.1 0.2" rotation="0 15 0">
                    <a-plane width="1.4" height="0.06" color="#ff6a00" shader="flat" position="0 0.16 0.01"></a-plane>
                    <a-text value="DIMENSIONS" color="#150800" align="center" width="1.8" position="0 0.16 0.02"></a-text>
                    <a-plane width="1.4" height="0.45" color="#1a0e05" opacity="0.9" shader="flat">
                        <a-text value="Wheelbase 1344mm\nGround Clear. 168mm\nSeat Height 807mm" color="#ff6a00" align="center" width="2.0"></a-text>
                    </a-plane>
                </a-entity>

                <!-- ELECTRONICS -->
                <a-entity position="-1.6 -0.6 0.3" rotation="0 15 0">
                    <a-plane width="1.4" height="0.06" color="#ffb100" shader="flat" position="0 0.13 0.01"></a-plane>
                    <a-text value="ELECTRONICS" color="#150800" align="center" width="1.8" position="0 0.13 0.02"></a-text>
                    <a-plane width="1.4" height="0.35" color="#1a0e05" opacity="0.9" shader="flat">
                        <a-text value="Full LCD Console\nFull-LED Lighting" color="#ffb100" align="center" width="1.9"></a-text>
                    </a-plane>
                </a-entity>

                <!-- RIGHT COLUMN -->
                <!-- CHASSIS -->
                <a-entity position="1.6 0.4 0.3" rotation="0 -15 0">
                    <a-plane width="1.4" height="0.06" color="#ff6a00" shader="flat" position="0 0.16 0.01"></a-plane>
                    <a-text value="CHASSIS" color="#150800" align="center" width="1.8" position="0 0.16 0.02"></a-text>
                    <a-plane width="1.4" height="0.45" color="#1a0e05" opacity="0.9" shader="flat">
                        <a-text value="Dual Channel ABS + TC\n320mm F · 230mm R Disc\n110/70-17 · 140/70-17" color="#ff6a00" align="center" width="2.0"></a-text>
                    </a-plane>
                </a-entity>

                <!-- PERFORMANCE -->
                <a-entity position="1.6 -0.1 0.2" rotation="0 -15 0">
                    <a-plane width="1.4" height="0.06" color="#ffb100" shader="flat" position="0 0.13 0.01"></a-plane>
                    <a-text value="PERFORMANCE" color="#150800" align="center" width="1.8" position="0 0.13 0.02"></a-text>
                    <a-plane width="1.4" height="0.35" color="#1a0e05" opacity="0.9" shader="flat">
                        <a-text value="12L Fuel Tank\nTop Speed 170 km/h" color="#ffb100" align="center" width="1.9"></a-text>
                    </a-plane>
                </a-entity>

                <!-- WEIGHT -->
                <a-entity position="1.6 -0.6 0.3" rotation="0 -15 0">
                    <a-plane width="1.4" height="0.06" color="#ff6a00" shader="flat" position="0 0.11 0.01"></a-plane>
                    <a-text value="WEIGHT" color="#150800" align="center" width="1.8" position="0 0.11 0.02"></a-text>
                    <a-plane width="1.4" height="0.3" color="#1a0e05" opacity="0.9" shader="flat">
                        <a-text value="Kerb Weight 174 kg" color="#ff6a00" align="center" width="1.8"></a-text>
                    </a-plane>
                </a-entity>

            </a-entity>
        </a-entity>
    </a-scene>

    <script>
        const sceneEl = document.querySelector('#main-scene');
        const activateBtn = document.querySelector('#activate-btn');
        const overlay = document.querySelector('#start-overlay');
        const statusTxt = document.querySelector('#status-txt');
        const anchorEl = document.querySelector('#bike-anchor');
        const cardsContainer = document.querySelector('#spatial-cards');
        const scanHint = document.querySelector('#scan-hint');
        const hudFrame = document.querySelector('#hud-scanner-frame');

        activateBtn.addEventListener('click', async () => {
            statusTxt.innerText = "INITIALIZING BIKE SCAN CORE...";
            try {
                if (sceneEl.hasLoaded) {
                    await sceneEl.systems["mindar-image-system"].start();
                } else {
                    sceneEl.addEventListener('loaded', async () => {
                        await sceneEl.systems["mindar-image-system"].start();
                    });
                }
                overlay.style.display = 'none';
                scanHint.style.opacity = "1";
                hudFrame.style.opacity = "1";
            } catch (err) {
                console.error(err);
                statusTxt.innerText = "ERROR: CAMERA LAYER DENIED.";
            }
        });

        anchorEl.addEventListener('targetFound', () => {
            cardsContainer.emit('animateFound');
            scanHint.style.opacity = "0";
            hudFrame.style.opacity = "0"; // HUD frame disappears smoothly upon tracking lock
        });

        anchorEl.addEventListener('targetLost', () => {
            cardsContainer.emit('animateLost');
            scanHint.style.opacity = "1";
            hudFrame.style.opacity = "1";
        });
    </script>
</body>
</html>
