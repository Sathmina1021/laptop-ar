<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>XQOM AR - Realistic Vehicle HUD</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">

<!-- A-Frame & MindAR Scripts -->
<script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Rajdhani', sans-serif; color: #fff; }

  /* ============ UI OVERLAY LAYER ============ */
  #ui-layer {
    position: fixed; inset: 0; z-index: 999; pointer-events: none;
  }

  /* ============ SPLASH SCREEN ============ */
  #splash {
    position: fixed; inset: 0; z-index: 1000; pointer-events: auto;
    background: radial-gradient(ellipse at center, #071018 0%, #000 78%);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; padding: 24px; cursor: pointer;
  }
  #splash .logo { font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 32px; letter-spacing: 5px; color: #ff2d55; text-shadow: 0 0 10px #ff2d55, 0 0 26px rgba(255,45,85,0.65); }
  #splash .logo span { color: #fff; }
  #splash .tagline { margin-top: 10px; font-size: 14px; letter-spacing: 2px; color: rgba(255,255,255,0.6); }
  #start-btn {
    margin-top: 44px; width: 92px; height: 92px; border-radius: 50%;
    border: 2px solid #ff2d55; background: rgba(255,45,85,0.08);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 18px rgba(255,45,85,0.5), inset 0 0 14px rgba(255,45,85,0.25);
    animation: pulseBtn 1.8s ease-in-out infinite;
  }
  #start-btn svg { width: 34px; height: 34px; }
  @keyframes pulseBtn {
    0%, 100% { transform: scale(1); box-shadow: 0 0 18px rgba(255,45,85,0.5), inset 0 0 14px rgba(255,45,85,0.25); }
    50% { transform: scale(1.06); box-shadow: 0 0 30px rgba(255,45,85,0.75), inset 0 0 18px rgba(255,45,85,0.35); }
  }
  #splash .hint { margin-top: 22px; font-family: 'Orbitron', sans-serif; font-size: 12px; letter-spacing: 2px; color: #ff8ca3; }

  /* ============ LOADING ============ */
  #loading { position: fixed; inset: 0; z-index: 900; background: #000; display: none; flex-direction: column; align-items: center; justify-content: center; pointer-events: none;}
  #loading.show { display: flex; }
  .spinner { position: relative; width: 78px; height: 78px; }
  .spinner .ring { position: absolute; inset: 0; border-radius: 50%; border: 3px solid transparent; border-top-color: #ff2d55; border-right-color: #ff2d55; animation: spin 1.1s linear infinite; }
  .spinner .ring.r2 { inset: 12px; border-top-color: transparent; border-right-color: transparent; border-bottom-color: #00f0ff; border-left-color: #00f0ff; animation-duration: 1.6s; animation-direction: reverse; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading .txt { margin-top: 24px; font-family: 'Orbitron', sans-serif; font-size: 12px; letter-spacing: 2px; color: #ff8ca3; text-shadow: 0 0 6px rgba(255,45,85,0.7); }

  /* ============ HEADER ============ */
  #header {
    position: absolute; top: 0; left: 0; width: 100%;
    padding: 18px 16px 26px; text-align: center;
    background: linear-gradient(180deg, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.4) 60%, rgba(0,0,0,0) 100%);
    opacity: 0; transition: opacity 0.6s ease;
  }
  #header.show { opacity: 1; }
  #header .h1 { font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 28px; letter-spacing: 4px; color: #ff2d55; text-shadow: 0 0 10px rgba(255,45,85,0.8); }
  #header .h2 { margin-top: 2px; font-family: 'Orbitron', sans-serif; font-size: 10px; letter-spacing: 3px; color: #00f0ff; }

  /* ============ SCAN RETICLE ============ */
  #reticle {
    position: absolute; left: 50%; top: 48%; width: 55vw; max-width: 280px; aspect-ratio: 1.35/1;
    transform: translate(-50%, -50%); 
    opacity: 0; transition: opacity 0.5s ease;
  }
  #reticle.show { opacity: 1; }
  #reticle .chip {
    position: absolute; top: -30px; left: 50%; transform: translateX(-50%);
    display: flex; align-items: center; gap: 6px; padding: 4px 10px 4px 6px;
    background: rgba(4,10,14,0.8); border: 1px solid rgba(0,240,255,0.6); border-radius: 20px;
    font-family: 'Orbitron', sans-serif; font-size: 9px; letter-spacing: 1.5px; color: #9df9ff;
  }
  #reticle .chip .dot { width: 5px; height: 5px; border-radius: 50%; background: #00f0ff; animation: dotPulse 1s ease-in-out infinite; }
  @keyframes dotPulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
  
  #reticle.locked .chip { border-color: rgba(255,45,85,0.8); color: #fff; background: rgba(255,45,85,0.2); }
  #reticle.locked .chip .dot { background: #ff2d55; animation: none; box-shadow: 0 0 8px #ff2d55; }

  .r-corner { position: absolute; width: 20px; height: 20px; border: 2px solid #00f0ff; filter: drop-shadow(0 0 4px #00f0ff); transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
  .r-corner.tl { top: 0; left: 0; border-right: none; border-bottom: none; border-radius: 6px 0 0 0; }
  .r-corner.tr { top: 0; right: 0; border-left: none; border-bottom: none; border-radius: 0 6px 0 0; }
  .r-corner.bl { bottom: 0; left: 0; border-right: none; border-top: none; border-radius: 0 0 0 6px; }
  .r-corner.br { bottom: 0; right: 0; border-left: none; border-top: none; border-radius: 0 0 6px 0; }
  #reticle.locked .r-corner { border-color: #ff2d55; filter: drop-shadow(0 0 6px #ff2d55); width: 12px; height: 12px; }

  #reticle .scanline {
    position: absolute; left: 5%; right: 5%; top: 10%; height: 1px;
    background: linear-gradient(90deg, transparent, #00f0ff, transparent);
    box-shadow: 0 0 8px #00f0ff; animation: scanMove 1.5s linear infinite;
  }
  #reticle.locked .scanline { display: none; }
  @keyframes scanMove { 0% { top: 10%; opacity: 0; } 15% { opacity: 1; } 85% { opacity: 1; } 100% { top: 90%; opacity: 0; } }

  /* ============ AR SCENE & CREATIVE IMAGE CARDS ============ */
  #ar-scene {
    position: absolute; inset: 0; 
    perspective: 1000px; transform-style: preserve-3d;
  }

  /* Connecting Lines */
  .spec-line {
    stroke-dasharray: 1000; stroke-dashoffset: 1000; opacity: 0;
    transition: stroke-dashoffset 0.8s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.6s ease;
  }
  .active-tracking .spec-line { stroke-dashoffset: 0; opacity: 1; }

  /* Target Markers */
  .target {
    position: absolute; width: 24px; height: 24px;
    transform: translate(-50%, -50%) scale(0.1); opacity: 0;
    transition: opacity 0.4s ease, transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .active-tracking .target { opacity: 1; transform: translate(-50%, -50%) scale(1); }
  
  .target .dot {
    position: absolute; top: 50%; left: 50%;
    width: 4px; height: 4px; background: #fff; border-radius: 50%;
    transform: translate(-50%, -50%); box-shadow: 0 0 10px #fff;
  }
  .target .arcs {
    position: absolute; inset: 0; border: 1.5px solid rgba(255,45,85,0.9); border-radius: 50%;
    border-top-color: transparent; border-bottom-color: transparent;
    animation: spinTarget 2s linear infinite;
  }
  @keyframes spinTarget { 100% { transform: rotate(360deg); } }

  /* --- The Compact & Creative Image Cards --- */
  .spec-card {
    position: absolute;
    width: 120px; 
    opacity: 0;
    transform: translateY(20px) scale(0.7) translateZ(-40px) rotateX(-15deg);
    transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    filter: drop-shadow(0 8px 16px rgba(0,0,0,0.9));
  }
  
  .active-tracking .spec-card { 
    opacity: 1; 
    transform: translateY(0) scale(1) translateZ(0) rotateX(0deg); 
  }
  
  .active-tracking .card-delay-1 { transition-delay: 0.1s; }
  .active-tracking .card-delay-2 { transition-delay: 0.2s; }
  .active-tracking .card-delay-3 { transition-delay: 0.3s; }
  .active-tracking .card-delay-4 { transition-delay: 0.4s; }

  .spec-label {
    font-family: 'Orbitron', sans-serif; font-size: 8px; font-weight: 700;
    color: #ff2d55; letter-spacing: 1px; margin-bottom: 4px;
    text-shadow: 0 0 5px rgba(255,45,85,0.6);
    display: flex; align-items: center; gap: 4px;
  }
  .spec-label::before {
    content: ''; display: inline-block; width: 4px; height: 4px;
    background: #ff2d55; border-radius: 50%;
  }

  .spec-image-box {
    width: 100%;
    border: 1px solid rgba(255, 45, 85, 0.5);
    background: rgba(5, 5, 10, 0.6);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    border-radius: 6px;
    padding: 4px;
    box-shadow: 0 0 12px rgba(255, 45, 85, 0.2), inset 0 0 8px rgba(255, 45, 85, 0.15);
    position: relative;
    overflow: hidden;
  }
  
  .spec-image-box::after {
    content: ''; position: absolute; top: -100%; left: 0; width: 100%; height: 2px;
    background: rgba(255, 45, 85, 0.8);
    box-shadow: 0 0 8px #ff2d55;
    animation: techScan 4s ease-in-out infinite; z-index: 2;
  }
  @keyframes techScan { 0%, 100% { top: -10px; opacity: 0; } 50% { top: 110%; opacity: 1; } }

  .spec-image-box img {
    width: 100%; height: auto; display: block; border-radius: 3px;
  }

  /* ============ BOTTOM STATUS ============ */
  #found-bar {
    position: absolute; bottom: 0; left: 0; width: 100%; padding: 15px 20px 25px; 
    background: linear-gradient(0deg, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%);
    text-align: center; opacity: 0; transform: translateY(15px);
    transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  #found-bar.show { opacity: 1; transform: translateY(0); }
  #found-bar .title { font-family: 'Orbitron', sans-serif; font-size: 13px; letter-spacing: 2px; color: #fff; }
  #found-bar .title span { color: #ff2d55; text-shadow: 0 0 8px #ff2d55; }
  #found-bar .sub { margin-top: 4px; font-size: 10px; letter-spacing: 1px; color: rgba(255,255,255,0.5); }

</style>
</head>
<body>

<!-- UI OVERLAY -->
<div id="ui-layer">
  
  <div id="splash">
    <div class="logo">XQOM <span>AR</span></div>
    <div class="tagline">VEHICLE SPEC SCANNER</div>
    <div id="start-btn">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M4 8V6a2 2 0 0 1 2-2h2M4 16v2a2 2 0 0 0 2 2h2M20 8V6a2 2 0 0 0-2-2h-2M20 16v2a2 2 0 0 1-2 2h-2" stroke="#ff2d55" stroke-width="2" stroke-linecap="round"/>
        <circle cx="12" cy="12" r="3.4" stroke="#ff2d55" stroke-width="2"/>
      </svg>
    </div>
    <div class="hint">TAP ANYWHERE TO START</div>
  </div>

  <div id="loading">
    <div class="spinner"><div class="ring"></div><div class="ring r2"></div></div>
    <div class="txt">INITIALIZING SYSTEM<span>...</span></div>
  </div>

  <div id="header">
    <div class="h1">VEHICLE SPECS</div>
    <div class="h2">[ LIVE TELEMETRY ]</div>
  </div>

  <div id="reticle">
    <div class="chip"><span class="dot"></span><span class="chip-text">SCANNING</span></div>
    <div class="r-corner tl"></div>
    <div class="r-corner tr"></div>
    <div class="r-corner bl"></div>
    <div class="r-corner br"></div>
    <div class="scanline"></div>
  </div>

  <!-- HUD Animation Wrapper -->
  <div id="ar-scene">
    
    <svg id="ar-lines" style="position: absolute; inset: 0; width: 100%; height: 100%; z-index: 1;">
      <line x1="25%" y1="25%" x2="42%" y2="40%" stroke="rgba(255,45,85,0.6)" stroke-width="1.5" class="spec-line"/>
      <line x1="25%" y1="65%" x2="48%" y2="60%" stroke="rgba(255,45,85,0.6)" stroke-width="1.5" class="spec-line card-delay-1"/>
      <line x1="75%" y1="25%" x2="58%" y2="45%" stroke="rgba(255,45,85,0.6)" stroke-width="1.5" class="spec-line card-delay-2"/>
      <line x1="75%" y1="50%" x2="55%" y2="50%" stroke="rgba(255,45,85,0.6)" stroke-width="1.5" class="spec-line card-delay-3"/>
      <line x1="75%" y1="75%" x2="62%" y2="65%" stroke="rgba(255,45,85,0.6)" stroke-width="1.5" class="spec-line card-delay-4"/>
    </svg>

    <div class="target" style="left: 42%; top: 40%;"><div class="dot"></div><div class="arcs"></div></div>
    <div class="target card-delay-1" style="left: 48%; top: 60%;"><div class="dot"></div><div class="arcs"></div></div>
    <div class="target card-delay-2" style="left: 58%; top: 45%;"><div class="dot"></div><div class="arcs"></div></div>
    <div class="target card-delay-3" style="left: 55%; top: 50%;"><div class="dot"></div><div class="arcs"></div></div>
    <div class="target card-delay-4" style="left: 62%; top: 65%;"><div class="dot"></div><div class="arcs"></div></div>

    <div class="spec-card" style="left: 8%; top: 18%;">
      <div class="spec-label">SYS.01 // OPTICS</div>
      <div class="spec-image-box"><img src="image/led-system.png" alt="LED System"></div>
    </div>

    <div class="spec-card card-delay-1" style="left: 8%; top: 58%;">
      <div class="spec-label">SYS.02 // POWER</div>
      <div class="spec-image-box"><img src="image/engine.png" alt="Engine"></div>
    </div>

    <div class="spec-card card-delay-2" style="left: 65%; top: 18%;">
      <div class="spec-label">SYS.03 // SUSPENSION</div>
      <div class="spec-image-box"><img src="image/frok.png" alt="Front Fork"></div>
    </div>

    <div class="spec-card card-delay-3" style="left: 65%; top: 43%;">
      <div class="spec-label">SYS.04 // AERO</div>
      <div class="spec-image-box"><img src="image/styling.png" alt="Styling"></div>
    </div>

    <div class="spec-card card-delay-4" style="left: 65%; top: 68%;">
      <div class="spec-label">SYS.05 // CHASSIS</div>
      <div class="spec-image-box"><img src="image/frame.png" alt="Perimeter Frame"></div>
    </div>

  </div>

  <div id="found-bar">
    <div class="title">TARGET LOCKED <span>&mdash; DATA STREAM ACTIVE</span></div>
    <div class="sub">Holographic modules displaying live telemetry</div>
  </div>

</div>

<!-- MIND AR SCENE -->
<a-scene mindar-image="imageTargetSrc: targets.mind; autoStart: false; uiLoading: no; uiError: no; uiScanning: no;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
  <a-entity id="tracking-target" mindar-image-target="targetIndex: 0"></a-entity>
</a-scene>

<script>
  const splash = document.getElementById('splash');
  const loading = document.getElementById('loading');
  const header = document.getElementById('header');
  const reticle = document.getElementById('reticle');
  const chipText = document.querySelector('#reticle .chip-text');
  const foundBar = document.getElementById('found-bar');
  const arScene = document.getElementById('ar-scene');

  const sceneEl = document.querySelector('a-scene');
  const trackingTarget = document.getElementById('tracking-target');

  // 1. Click to Start AR Engine
  splash.addEventListener('click', () => {
    splash.style.display = 'none';
    loading.classList.add('show');
    // Start MindAR Engine
    sceneEl.systems["mindar-image-system"].start();
  });

  // 2. Camera Ready -> Show UI
  sceneEl.addEventListener("arReady", () => {
    loading.classList.remove('show');
    header.classList.add('show');
    reticle.classList.add('show');
  });

  // 3. ACTUAL TRACKING - Target Found
  trackingTarget.addEventListener("targetFound", () => {
    reticle.classList.add('locked');
    chipText.textContent = 'LOCKED';
    foundBar.classList.add('show');
    
    // Animate specs UI in
    arScene.classList.add('active-tracking');
  });

  // 4. ACTUAL TRACKING - Target Lost
  trackingTarget.addEventListener("targetLost", () => {
    reticle.classList.remove('locked');
    chipText.textContent = 'SCANNING';
    foundBar.classList.remove('show');
    
    // Animate specs UI out
    arScene.classList.remove('active-tracking');
  });
</script>

</body>
</html>
